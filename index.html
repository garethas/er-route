<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elden Ring — Platinum Route Tracker</title>
<style>
:root{
  --gold:#c9a84c; --gold-dim:#7a6030; --gold-glow:rgba(201,168,76,.12);
  --bg:#0d0c0a; --surface:#141210; --surface2:#1c1a16; --border:#2a2620;
  --text:#d4cfc4; --text-dim:#6a6460; --text-bright:#ede8dc;
  --miss:#d24a4a; --miss-bg:#1c0808; --miss-border:#5a1e1e;
  --warn:#c4902a; --green:#4a9e5c; --blue:#5a8fc4; --plat:#8a6fc4;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;font-size:14px;line-height:1.5}
a{color:var(--gold)}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,#1a1610,#0d0c0a);
  border-bottom:1px solid var(--gold-dim);padding:12px 20px 10px}
.hrow{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
header h1{font-size:17px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;font-weight:normal;text-shadow:0 0 20px rgba(201,168,76,.4)}
.stats{display:flex;gap:18px;margin-left:auto;flex-wrap:wrap}
.stat{text-align:center;min-width:64px}
.stat .n{font-size:16px;color:var(--gold);font-weight:bold;display:block;line-height:1.1}
.stat .n.plat{color:var(--plat)}
.stat .l{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.09em}
.gbar{height:5px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}
.gbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));width:0;transition:width .3s}

/* TOOLBAR */
.toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:9px}
.chip{padding:4px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);
  cursor:pointer;font-size:11px;letter-spacing:.04em;border-radius:12px;font-family:inherit;user-select:none;white-space:nowrap;transition:all .1s}
.chip:hover{border-color:var(--gold-dim);color:var(--text)}
.chip.on{background:var(--gold-glow);border-color:var(--gold);color:var(--gold)}
.chip.miss.on{background:var(--miss-bg);border-color:var(--miss);color:var(--miss)}
.chip.plat.on{background:rgba(138,111,196,.14);border-color:var(--plat);color:var(--plat)}
.sep{width:1px;height:20px;background:var(--border);margin:0 3px}
#search{flex:1;min-width:140px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);
  color:var(--text);border-radius:3px;font-family:inherit;font-size:12px}
#search:focus{outline:none;border-color:var(--gold-dim)}
.btn{padding:4px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);
  cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-radius:2px;font-family:inherit}
.btn:hover{border-color:var(--gold-dim);color:var(--gold)}

/* LAYOUT */
.layout{display:flex;min-height:100vh}
.sidenav{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);
  position:sticky;top:0;align-self:flex-start;height:100vh;overflow-y:auto;padding:10px 0}
.sidenav::-webkit-scrollbar{width:5px}.sidenav::-webkit-scrollbar-thumb{background:var(--border)}
.sn-label{padding:9px 14px 3px;font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.11em}
.sn-item{padding:5px 14px;cursor:pointer;font-size:12px;color:var(--text-dim);border-left:2px solid transparent;
  display:flex;justify-content:space-between;gap:6px;align-items:center;transition:all .1s}
.sn-item:hover{background:var(--surface2);color:var(--text)}
.sn-item.done{color:var(--green)}
.sn-badge{font-size:9px;background:var(--surface2);color:var(--text-dim);padding:1px 5px;border-radius:8px;white-space:nowrap}
.main{flex:1;min-width:0;padding:0 0 60px}

/* SECTIONS / REGIONS */
.block{border-bottom:1px solid var(--border);scroll-margin-top:2px}
.bhead{padding:13px 20px;background:var(--surface);cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none}
.bhead:hover{background:var(--surface2)}
.bnum{background:var(--gold-dim);color:var(--bg);width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0}
.btitle{font-size:15px;color:var(--text-bright);letter-spacing:.03em}
.bprog{margin-left:auto;display:flex;align-items:center;gap:10px}
.bprog-t{font-size:11px;color:var(--text-dim);white-space:nowrap}
.bprog-bar{width:70px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.bprog-bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));width:0}
.caret{color:var(--text-dim);transition:transform .2s}
.block.open .caret{transform:rotate(90deg)}
.body{display:none;padding:6px 20px 18px}
.block.open .body{display:block}

/* GATE BANNER */
.gate{background:var(--miss-bg);border:1px solid var(--miss-border);border-left:4px solid var(--miss);
  padding:9px 12px;margin:10px 0;border-radius:3px;font-size:13px}
.gate b{color:var(--miss);text-transform:uppercase;letter-spacing:.04em;font-size:11px}
.gate .trig{color:var(--text-bright)}
.note-info{background:var(--surface);border-left:3px solid var(--gold);padding:8px 12px;margin:10px 0;border-radius:3px;font-size:12.5px}
.note-info b{color:var(--gold)}

/* CATEGORY + ITEM ROWS */
.cat{margin-top:14px}
.cat-h{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;
  border-bottom:1px solid var(--border);padding-bottom:3px;margin-bottom:2px;display:flex;justify-content:space-between}
.row{display:flex;gap:9px;padding:5px 4px;border-bottom:1px solid rgba(42,38,32,.5);align-items:baseline}
.row:hover{background:var(--surface)}
.row.miss{background:var(--miss-bg)}
.row.miss:hover{background:#230a0a}
.row.checked{opacity:.42}
.row.checked .nm{text-decoration:line-through}
.cbx{appearance:none;width:16px;height:16px;border:1px solid var(--gold-dim);border-radius:3px;
  background:var(--surface);cursor:pointer;flex-shrink:0;position:relative;top:2px}
.cbx:checked{background:var(--gold);border-color:var(--gold)}
.cbx:checked::after{content:'✓';position:absolute;color:var(--bg);font-size:12px;left:2px;top:-3px;font-weight:bold}
.itxt{flex:1;min-width:0}
.nm{color:var(--text-bright);font-size:13.5px}
.loc{color:var(--text-dim);font-size:12px}
.nt{color:var(--text-dim);font-size:11.5px;font-style:italic}
.grsn{color:var(--miss);font-size:11.5px;margin-top:1px}
.qgrp{margin:6px 0 10px;padding-left:8px;border-left:2px solid var(--blue)}
.qgrp-h{color:var(--blue);font-size:12.5px;letter-spacing:.03em;margin-bottom:1px}
.qgrp-c{font-size:10px;color:var(--text-dim);margin-left:5px}
.row.qstep{padding-left:2px}
.row.qstep .stepn{position:relative;top:0}
.tags{display:inline-flex;gap:4px;margin-left:6px;vertical-align:middle}
.tag{font-size:9px;padding:1px 5px;border-radius:3px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.t-leg{background:rgba(201,168,76,.16);color:var(--gold);border:1px solid var(--gold-dim)}
.t-miss{background:var(--miss-bg);color:var(--miss);border:1px solid var(--miss-border);font-weight:bold}
.t-plat{background:rgba(138,111,196,.16);color:var(--plat);border:1px solid #4a3a6a}
.t-ng{background:rgba(90,143,196,.14);color:var(--blue);border:1px solid #2a4a6a}
.t-buy{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}

/* QUESTS */
.quest{border:1px solid var(--border);border-radius:4px;margin:12px 0;background:var(--surface)}
.quest>summary{padding:10px 14px;cursor:pointer;font-size:14px;color:var(--text-bright);list-style:none;display:flex;gap:10px;align-items:center}
.quest>summary::-webkit-details-marker{display:none}
.quest[open]>summary{border-bottom:1px solid var(--border)}
.qreward{font-size:11px;color:var(--gold);margin-left:auto}
.qbody{padding:6px 14px 12px}
.step{display:flex;gap:9px;padding:5px 2px;border-bottom:1px solid rgba(42,38,32,.5);align-items:baseline}
.stepn{color:var(--gold-dim);font-size:11px;min-width:20px}

/* ENDINGS */
.ending{border:1px solid var(--gold-dim);border-radius:4px;padding:12px 16px;margin:12px 0;background:var(--surface)}
.ending h3{color:var(--gold);font-size:14px;font-weight:normal;letter-spacing:.05em;margin-bottom:5px}
.intro{margin:14px 20px 4px;padding:11px 14px;background:linear-gradient(180deg,rgba(138,111,196,.14),var(--surface));
  border:1px solid #4a3a6a;border-left:4px solid var(--plat);border-radius:4px;font-size:13px;color:var(--text)}
.intro b{color:var(--plat);text-transform:uppercase;letter-spacing:.05em;font-size:11px}
.hidden{display:none!important}
.empty{color:var(--text-dim);font-style:italic;padding:20px;text-align:center}
@media(max-width:760px){.sidenav{display:none}.stats{width:100%;justify-content:space-around;margin:6px 0 0}}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <h1>◈ Elden Ring — Platinum Route</h1>
    <div class="stats">
      <div class="stat"><span class="n" id="s-items">0/0</span><span class="l">Collectibles</span></div>
      <div class="stat"><span class="n" id="s-quests" style="color:var(--blue)">0/0</span><span class="l">Quest steps</span></div>
      <div class="stat"><span class="n plat" id="s-plat">0/42</span><span class="l">Trophies</span></div>
      <div class="stat"><span class="n miss" id="s-miss" style="color:var(--miss)">0</span><span class="l">Gated left</span></div>
    </div>
  </div>
  <div class="gbar"><i id="gbar-fill"></i></div>
  <div class="toolbar">
    <input id="search" placeholder="Search items, locations, notes…">
    <span class="chip plat" data-f="plat">★ Platinum only</span>
    <span class="chip miss" data-f="miss">⚠ Gated/missable only</span>
    <span class="chip" data-f="hidedone">Hide checked</span>
    <span class="chip" data-f="hidebuy">Hide merchant-buys</span>
    <span class="chip" data-f="hideng">Hide NG+ only</span>
    <span class="sep"></span>
    <span class="chip" id="catbtn">Categories ▾</span>
    <span class="sep"></span>
    <button class="btn" id="expand">Expand all</button>
    <button class="btn" id="collapse">Collapse all</button>
    <button class="btn" id="export">Export</button>
    <button class="btn" id="import">Import</button>
  </div>
  <div class="toolbar hidden" id="catrow"></div>
</header>
<div class="layout">
  <nav class="sidenav" id="sidenav"></nav>
  <main class="main" id="main"></main>
</div>

membrance of the Full Moon Queen", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "sorcery-rykard-s-rancor-roundtable-hold", "cat": "sorcery", "name": "Rykard's Rancor", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Purchased from Enia with the Remembrance of the Blasphemous", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "incantation-black-flame-s-protection-roundtable-hold", "cat": "incantation", "name": "Black Flame's Protection", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Given by Gideon Ofnier after telling him about the secret medalion", "method": "quest", "legendary": false, "platinumCritical": false}, {"id": "incantation-catch-flame-roundtable-hold", "cat": "incantation", "name": "Catch Flame", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Purchased from Brother Corhyn (also a starting item for the Prophet class)", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "incantation-cure-poison-roundtable-hold", "cat": "incantation", "name": "Cure Poison", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Purchased from Brother Corhyn", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "incantation-flame-fortification-roundtable-hold", "cat": "incantation", "name": "Flame Fortification", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Purchased from Brother Corhyn", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "incantation-flame-sling-roundtable-hold", "cat": "incantation", "name": "Flame Sling", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Purchased from Brother Corhyn", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "incantation-fortissax-s-lightning-spear-roun "name": "Mohg, the Omen", "requirement": "Defeat Mohg, the Omen"}, {"name": "Mimic Tear", "requirement": "Defeat Mimic Tear"}, {"name": "Loretta, Knight of the Haligtree", "requirement": "Defeat Loretta, Knight of the Haligtree"}, {"name": "Astel, Naturalborn of the Void", "requirement": "Defeat Astel, Naturalborn of the Void"}, {"name": "Leonine Misbegotten", "requirement": "Defeat Leonine Misbegotten"}, {"name": "Royal Knight Loretta", "requirement": "Defeat Royal Knight Loretta"}, {"name": "Elemer of the Briar", "requirement": "Defeat Elember of the Briar"}, {"name": "Ancestor Spirit", "requirement": "Defeat Ancestor Spirit"}, {"name": "Commander Niall", "requirement": "Defeat Commander Niall"}, {"name": "Roundtable Hold", "requirement": "Arrive at Roundtable Hold"}, {"name": "Great Rune", "requirement": "Restore power to a Great Rune at a Divine Tower"}, {"name": "Erdtree Aflame", "requirement": "Set the Erdtree aflame from East Mountaintops of the Giants"}], "quests": [{"giver": "White Mask Varré", "reward": "Bloody Finger (reusable), Pureblood Knight's Medal (Mohgwyn teleport), Lord of Blood's Favor", "gate": "Killing Varré makes it incompletable — his rewards are dialogue-given, not lootable. The Mohgwyn teleporter does NOT grant them; Varré is the only source. Needs one Great Rune to progress the Rose Church stage.", "steps": [{"id": "quest-white-mask-varre-0", "step": "1", "location": "The First Step Site of Grace in Limgrave", "text": "(Optional) Speak to him initially at The First Step Site of Grace", "region": "Limgrave", "subarea": "First Step"}, {"id": "quest-white-mask-varre-1", "step": "2", "location": "Castleward Tunnel Site of Grace in Stormhill", "text": "Defeat Margit, the Fell Omen or reach a Site of Grace outside of Limgrave and accept Melina's invitation to the Roundtable Hold", "region": "Stormhill", "subarea": "Castleward Tunnel"}, {"id": "quest-white-mask-varre-2", "step": "3", "location": "Roundtable Hold", "text": "Visit the Roundtable Hold at least one time", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-white-mask-varre-3", "step": "4", "location": "Secluded Cell Site of Grace in Stormveil Castle", "text": "Kill Godrick the Grafted (or any other Great Rune bearer)", "region": "Stormveil Castle", "subarea": "Secluded Cell"}, {"id": "quest-white-mask-varre-4", "step": "5", "location": "First Steps site of grace in Limgrave", "text": "(Optional) After defeating Godrick the Grafted, speak to Varré and he will tell you to meet the Two Fingers in the Roundtable Hold", "region": "Limgrave", "subarea": "First Steps"}, {"id": "quest-white-mask-varre-5", "step": "6", "location": "Roundtable Hold", "text": "Speak to Enia in the Two Fingers chamber", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-white-mask-varre-6", "step": "7", "location": "The First Step Site of Grace in Limgrave", "text": "(Optional) Before meeting Varré in Liurnia, return to his original location to recieve the Bravo! gesture from the message he left", "region": "Limgrave", "subarea": "First Step"}, {"id": "quest-white-mask-varre-7", "step": "8", "location": "Rose Church in Liurnia", "text": "Speak to Varré outside the entrance of the Rose Church and he will give you 3 Festering Bloody Fingers", "region": "Liurnia of the Lakes", "subarea": "Rose Church"}, {"id": "quest-white-mask-varre-8", "step": "9", "location": "Writheblood Ruins in Altus Plateau", "text": "Invade Magnus the Beast Claw at the Writheblood Ruins and deafeat him, or perform 3 invasions using the Festering Bloody Fingers he gave you (doesn't matter if the invasions are successful or not)", "region": "Altus Plateau", "subarea": "Writheblood Ruins"}, {"id": "quest-white-mask-varre-9", "step": "10", "location": "Rose Church in Liurnia", "text": "After performing 3 invasions or killing Magnus, speak to him and he will ask if you would like to join his order of the Lord of Blood, accept to receive the Lord of Blood's Favor item", "region": "Liurnia of the Lakes", "subarea": "Rose Church"}, {"id": "quest-white-mask-varre-10", "step": "11", "location": "Church of Inhibition in Liurnia", "text": "Soak the Lord of Blood's Favor in blood from the body of a maiden inside the Church of Inhibition, or inside the Church of Anticipation accessed through the second belfry at The Four Belfries", "region": "Liurnia of the Lakes", "subarea": "Church Inhibition"}, {"id": "quest-white-mask-varre-11", "step": "12", "location": "Rose Church in Liurnia", "text": "After soaking the cloth in blood, return to Varre and he will welcome you into the order and give you the Bloody Finger and the Pureblood Knight's Medal", "region": "Liurnia of the Lakes", "subarea": "Rose Church"}, {"id": "quest-white-mask-varre-12", "step": "13", "location": "Dynasty Mausoleum Midpoint Site of Grace in Mohgwyn Palace", "text": "After receiving the Pureblood Knight's Medal, a red invasion sign can be found at the Dynasty Mausoleum Midpoint Site of Grace, allowing you to invade Varré", "region": "Mohgwyn Palace", "subarea": "Dynasty Mausoleum Midpoint"}, {"id": "quest-white-mask-varre-13", "step": "14", "location": "Dynasty Mausoleum Midpoint Site of Grace in Mohgwyn Palace", "text": "After defeating Varré, you'll find him laying on the ground near where the invasion sign once was. Speak to him and exhaust his dialogue and he will die, leaving behind Varré's Bouquet", "region": "Mohgwyn Palace", "subarea": "Dynasty Mausoleum Midpoint"}]}, {"giver": "Blaidd & Ranni", "reward": "Dark Moon Greatsword (Legendary), Black Knife Tiche (Legendary Ash), Carian Filigreed Crest, Snow Witch Set + the Age of the Stars ending", "gate": "Long multi-region chain (Ranni → Nokron → Nokstella → Ainsel → Lake of Rot → Moonlight Altar). Must be fully complete (place the Dark Moon Ring, receive the greatsword) before the Elden Beast to keep Age of the Stars. Beat Radahn to open Nokron for the Fingerslayer Blade.", "steps": [{"id": "quest-blaidd-ranni-0", "step": "1", "location": "Church of Elleh in Limgrave", "text": "Ranni will appear in this church as \"Renna\" after you receive Torrent from Melina (nighttime only). Speak to her and she will give you the Spirit Calling Bell and the Lone Wolf Ashes*", "region": "Limgrave", "subarea": "Church Elleh"}, {"id": "quest-blaidd-ranni-1", "step": "2", "location": "Mistwood Ruins in Limgrave", "text": "Head to the Mistwood Ruins and wait until you hear howling", "region": "Limgrave", "subarea": "Mistwood Ruins"}, {"id": "quest-blaidd-ranni-2", "step": "3", "location": "Church of Elleh in Limgrave", "text": "After you've heard the howling, travel to the Church of Elleh and speak to the merchant Kalé, who will give you the Snap gesture and tell you to use it near the howling", "region": "Limgrave", "subarea": "Church Elleh"}, {"id": "quest-blaidd-ranni-3", "step": "4", "location": "Mistwood Ruins in Limgrave", "text": "Travel back to the ruins and use the Snap gesture near the tower and Blaidd will drop down and ask you to help him kill Bloodhound Knight Darriwil", "region": "Limgrave", "subarea": "Mistwood Ruins"}, {"id": "quest-blaidd-ranni-4", "step": "5", "location": "Forlorn Hound Evergaol in Limgrave", "text": "Summon Blaidd and defeat Darriwil, after the fight talk to Blaidd and he will thank you and tell you to mention him to War Counselor Iji in Liurnia", "region": "Limgrave", "subarea": "Forlorn Hound Evergaol"}, {"id": "quest-blaidd-ranni-5", "step": "6", "location": "Ranni's Rise in Liurnia", "text": "After speaking to Ranni or missing her first encounter entirely, she will move to Ranni's Rise in Liurnia", "region": "Liurnia of the Lakes", "subarea": "Ranni's Rise"}, {"id": "quest-blaidd-ranni-6", "step": "7", "location": "Ranni's Rise in Liurnia", "text": "If you are doing Rogier's questline then Ranni will tell you she doesn't have the cursemark and asks you to leave, otherwise skip to step 9", "region": "Liurnia of the Lakes", "subarea": "Ranni's Rise"}, {"id": "quest-blaidd-ranni-7", "step": "8", "location": "Roundtable Hold", "text": "Go back to Rogier and tell him what she said and he will suggest for you to enter her service", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-blaidd-ranni-8", "step": "9", "location": "Ranni's Rise in Liurnia", "text": "Return to Ranni and offer to join her cause, she will accept and ask to speak to her three other associates", "region": "Liurnia of the Lakes", "subarea": "Ranni's Rise"}, {"id": "quest-blaidd-ranni-9", "step": "10", "location": "Ranni's Rise in Liurnia", "text": "Three NPCs will spawn in her tower, all of which must be spoken to before speaking to Ranni again, who will then tell you to retrieve the \"hidden treasure of Nokron\" for her", "region": "Liurnia of the Lakes", "subarea": "Ranni's Rise"}, {"id": "quest-blaidd-ranni-10", "step": "11", "location": "Siofra River Bank Site of Grace in Lower Siofra River", "text": "Speak to Blaidd near the Spirit Spring and he will inform you of his troubles in reaching Nokron, and tell you that Seluvis might know something", "region": "Siofra River", "subarea": "Siofra River Bank"}, {"id": "quest-blaidd-ranni-11", "step": "12", "location": "Seluvis's Rise in Liurnia", "text": "Speak to Seluvis and he will tell you to speak with Sorceress Sellen about Nokron, and hands you Seluvis's Introduction to give to her", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}, {"id": "quest-blaidd-ranni-12", "step": "13", "location": "Waypoint Ruins in Limgrave", "text": "Speak to Sellen and give her the introduction and she will state that you must defeat Starscourge Radahn in order to reveal the entrance to Nokron", "region": "Limgrave", "subarea": "Waypoint Ruins"}, {"id": "quest-blaidd-ranni-13", "step": "14", "location": "Siofra River Bank Site of Grace in Lower Siofra River", "text": "Report back to Blaidd and he will ask that you meet him at Redmane Castle to help kill Starscourge Radahn", "region": "Siofra River", "subarea": "Siofra River Bank"}, {"id": "quest-blaidd-ranni-14", "step": "15", "location": "Redmane Castle in Caelid", "text": "Defeat Starscourge Radahn", "region": "Caelid", "subarea": "Redmane Castle"}, {"id": "quest-blaidd-ranni-15", "step": "16", "location": "Forlorn Hound Evergael in Limgrave", "text": "After defeating Radahn, travel to the Forlorn Hound Evergaol to find Blaidd, who is trapped inside. Interact with the evergaol to free him, and then speak with him", "region": "Limgrave", "subarea": "Forlorn Hound Evergael"}, {"id": "quest-blaidd-ranni-16", "step": "17", "location": "Fort Haight West Site of Grace in Limgrave", "text": "After Radahn is defeated, the southern portion of Mistwood will be a giant open crater that leads down into Nokron", "region": "Limgrave", "subarea": "Fort Haight West"}, {"id": "quest-blaidd-ranni-17", "step": "18", "location": "Night's Sacred Ground in Upper Siofra River", "text": "Retrieve the Fingerslayer Blade from the Night's Sacred Ground", "region": "Siofra River", "subarea": "Night's Sacred Ground Upper"}, {"id": "quest-blaidd-ranni-18", "step": "19", "location": "Ranni's Rise in Liurnia", "text": "Return to Ranni and give her the blade. She will reward the you with the Carian Inverted Statue", "region": "Liurnia of the Lakes", "subarea": "Ranni's Rise"}, {"id": "quest-blaidd-ranni-19", "step": "20", "location": "Seluvis's Rise in Liurnia", "text": "(Optional) Head back to Seluvis's Rise to find him dead, with his armor set on his body", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}, {"id": "quest-blaidd-ranni-20", "step": "21", "location": "Seluvis's Rise in Liurnia", "text": "(Optional) Go down into Pidia's puppet room to find his corpse among the now animate puppets. Loot his body for a puppet spirit based on who you gave Seluvis's Potion to during his questline", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}, {"id": "quest-blaidd-ranni-21", "step": "22", "location": "Carian Study Hall in Liurnia", "text": "Travel to the Carian Study Hall and use the statue on the pedestal in front of the globe. Make your way through the now inverted study hall to the Divine Tower of Liurnia", "region": "Liurnia of the Lakes", "subarea": "Carian Study Hall"}, {"id": "quest-blaidd-ranni-22", "step": "23", "location": "Divine Tower of Liurnia in Liurnia", "text": "Reach the top of the tower to find Ranni's original body and loot the Cursemark of Death", "region": "Liurnia of the Lakes", "subarea": "Divine Tower Liurnia"}, {"id": "quest-blaidd-ranni-23", "step": "24", "location": "Renna's Rise in Liurnia", "text": "Renna's Rise will now be open and contains a teleporter. Take the teleporter to Ainsel River Main and retrieve the Miniature Ranni doll", "region": "Liurnia of the Lakes", "subarea": "Renna's Rise"}, {"id": "quest-blaidd-ranni-24", "step": "25", "location": "Ainsel River Main Site of Grace in Ainsel River Main", "text": "Speak to the doll at the nearby Site of Grace until Ranni speaks to you through it and gives you a task to defeat the Baleful Shadow", "region": "Ainsel River", "subarea": "Ainsel River Main"}, {"id": "quest-blaidd-ranni-25", "step": "26", "location": "Nokstella, Eternal City in Ainsel River Main", "text": "Reach the end of Nokstella and the Baleful Shadow will be waiting for you. Defeat him for the Discarded Palace Key", "region": "Nokstella, Eternal City", "subarea": "Ainsel River Main"}, {"id": "quest-blaidd-ranni-26", "step": "27", "location": "Raya Lucaria Grand Library in Raya Lucaria Academy", "text": "Use the key to unlock the chest in the library next to Rennala to receive the Dark Moon Ring", "region": "Raya Lucaria Academy", "subarea": "Raya Lucaria Grand Library"}, {"id": "quest-blaidd-ranni-27", "step": "28", "location": "Grand Cloister in Lake of Rot", "text": "Use the coffin at the end of the Grand Cloister area to travel to the arena for Astel, Naturalborn of the Void", "region": "Lake of Rot", "subarea": "Grand Cloister"}, {"id": "quest-blaidd-ranni-28", "step": "29", "location": "Grand Cloister in Lake of Rot", "text": "Defeat Astel, Naturalborn of the Void and take the elevator in the back of the room", "region": "Lake of Rot", "subarea": "Grand Cloister"}, {"id": "quest-blaidd-ranni-29", "step": "30", "location": "Moonlight Altar Site of Grace in Liurnia", "text": "Defeat Glintstone Dragon Adula and head into the Cathedral of Manus Celes. Decend the pit located inside", "region": "Liurnia of the Lakes", "subarea": "Moonlight Altar"}, {"id": "quest-blaidd-ranni-30", "step": "31", "location": "Cathedral of Manus Celes in Liurnia", "text": "You'll find Ranni's body in front of a slaughtered Two Fingers, interact with her. She will reward you with the Dark Moon Greatsword**", "region": "Liurnia of the Lakes", "subarea": "Cathedral Manus Celes"}, {"id": "quest-blaidd-ranni-31", "step": "32", "location": "Ranni's Rise in Liurnia", "text": "Blaidd will be in Ranni's Rise and hostile. Kill him for his armor set and weapon. His mask can be found on top of the wall behind Seluvis's Rise afterward", "region": "Liurnia of the Lakes", "subarea": "Ranni's Rise"}, {"id": "quest-blaidd-ranni-32", "step": "33", "location": "Road to the Manor site of grace in Liurnia", "text": "After defeating Blaidd, speak to War Counselor Iji for a new dialogue option. Exaust this new dialogue and reload the area and loot his now dead body for Iji's Mirrorhelm and his Bell Bearing", "region": "Liurnia of the Lakes", "subarea": "Road Manor"}]}, {"giver": "Boc the Seamster", "reward": "Sewing Needle + Tailoring Tools (free armor alterations), 'My Lord' gesture", "gate": "Final branch at East Capital Rampart: use Prattling Pate 'You're Beautiful' so he lives (best outcome). Giving a Larval Tear or doing nothing kills/loses him. No unique corpse reward.", "steps": [{"id": "quest-boc-the-seamster-0", "step": "1", "location": "East of Limgrave Telescope", "text": "Listen for his voice coming from a tree near the Limgrave telescope - simply roll into the tree to reveal him, then exhaust his dialogue", "region": "Limgrave", "subarea": "East Telescope"}, {"id": "quest-boc-the-seamster-1", "step": "2", "location": "Coastal Cave in Limgrave", "text": "He will be found laying next to the Site of Grace", "region": "Limgrave", "subarea": "Coastal Cave"}, {"id": "quest-boc-the-seamster-2", "step": "3", "location": "Coastal Cave in Limgrave", "text": "Defeat the Demi-Human Chiefs to retrieve the belongings of Boc, you may also do this prior to meeting Boc and sending him to the cave", "region": "Limgrave", "subarea": "Coastal Cave"}, {"id": "quest-boc-the-seamster-3", "step": "4", "location": "Coastal Cave in Limgrave", "text": "Give Boc his belongings and he will pledge his service to you", "region": "Limgrave", "subarea": "Coastal Cave"}, {"id": "quest-boc-the-seamster-4", "step": "5", "location": "Lake-Facing Cliffs Site of Grace in Liurnia", "text": "After resting at the Site of Grace, Boc will appear and offer garmet alteration services to you at several different Sites of Grace*", "region": "Liurnia of the Lakes", "subarea": "Lake Facing Cliffs"}, {"id": "quest-boc-the-seamster-5", "step": "6", "location": "Church of Vows in Liurnia", "text": "Aquire the Gold Sewing Needle", "region": "Liurnia of the Lakes", "subarea": "Church Vows"}, {"id": "quest-boc-the-seamster-6", "step": "7", "location": "Roundtable Hold", "text": "Buy at least one piece of alterable shardbearer armor from Finger Reader Enia (2 Great Runes must be acquired for her to sell boss armor)**", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-boc-the-seamster-7", "step": "8", "location": "East Raya Lucaria Gate Site of Grace in Liurnia", "text": "(Optional) Rest at the East Raya Lucaria Gate Site of Grace and Boc will appear. Speak to Melina and she will comment on Boc", "region": "Raya Lucaria Academy", "subarea": "East Gate Liurnia"}, {"id": "quest-boc-the-seamster-8", "step": "9", "location": "East Capital Ramparts Site of Grace in Leyndell, Royal Capital", "text": "Rest at this site and Boc will appear. Speak to him and give him the Gold Sewing Needle. He will ask to call you lord, say yes to obtain the My Lord gesture", "region": "Leyndell, Royal Capital", "subarea": "East Capital Ramparts"}, {"id": "quest-boc-the-seamster-9", "step": "10", "location": "East Capital Ramparts Site of Grace in Leyndell, Royal Capital", "text": "After his dialogue about being ugly, you can now either give him a Larval Tear, or use the \"You're Beautiful\" Prattling Pate in front of him (found in Hermit Village in Mt. Gelmir)", "region": "Leyndell, Royal Capital", "subarea": "East Capital Ramparts"}, {"id": "quest-boc-the-seamster-10", "step": "11", "location": "Raya Lucaria Grand Library Site of Grace in Raya Lucaria Academy", "text": "(Optional) If you give him the Larval Tear, he will move to the Grand Library in his new human form and be unresponsive and die after resting at a Site of Grace", "region": "Raya Lucaria Academy", "subarea": "Raya Lucaria Grand Library"}, {"id": "quest-boc-the-seamster-11", "step": "12", "location": "East Capital Ramparts Site of Grace in Leyndell, Royal Capital", "text": "(Optional) If you use the \"You're Beautiful\" Prattling Pate in front of him, he will thank you for the kind words", "region": "Leyndell, Royal Capital", "subarea": "East Capital Ramparts"}]}, {"giver": "Queen of Limgrave", "reward": "Ash of War: Bloody Slash, Erdsteel Dagger (from Kenneth), + the 'Queen of Limgrave' outcome", "gate": "Killing Kenneth forfeits the Erdsteel Dagger (dialogue-gated). The ending outcome triggers after Morgott in Godrick's throne room; killing Nepheli/Gostoc or burning the Erdtree fails it.", "steps": [{"id": "quest-queen-of-limgrave-0", "step": "1", "location": "Mistwood Outskirts Site of Grace in Limgrave", "text": "You can find Kenneth standing on top of a large ruin structure acting as a bridge. Speak to him and he will ask you to clear Fort Haight for him, accept his request", "region": "Limgrave", "subarea": "Mistwood Outskirts"}, {"id": "quest-queen-of-limgrave-1", "step": "2", "location": "Fort Haight in Limgrave", "text": "Defeat the Godrick Knight at the top of the fort", "region": "Limgrave", "subarea": "Fort Haight"}, {"id": "quest-queen-of-limgrave-2", "step": "3", "location": "Mistwood Outskirts Site of Grace in Limgrave", "text": "Speak to him after clearing the fort and he will move to the fort", "region": "Limgrave", "subarea": "Mistwood Outskirts"}, {"id": "quest-queen-of-limgrave-3", "step": "4", "location": "Fort Haight in Limgrave", "text": "Going back to the fort you will find several demi-humans are now inside and Kenneth at the top of the fortress. Speak to him and exhaust his dialogue", "region": "Limgrave", "subarea": "Fort Haight"}, {"id": "quest-queen-of-limgrave-4", "step": "5", "location": "Secluded Cell Site of Grace in Stormveil Castle", "text": "(Optional) Southwest of the Site of Grace you'll find a building with Nepheli Loux in it, exhaust her dialogue and her sign will appear in front of Godrick's arena door", "region": "Stormveil Castle", "subarea": "Secluded Cell"}, {"id": "quest-queen-of-limgrave-5", "step": "6", "location": "Secluded Cell Site of Grace in Stormveil Castle", "text": "(Optional) Defeat Godrick the Grafted", "region": "Stormveil Castle", "subarea": "Secluded Cell"}, {"id": "quest-queen-of-limgrave-6", "step": "7", "location": "Roundtable Hold", "text": "After defeating Godrick or reaching Liurnia of the Lakes, regardless of whether she helped you or not, Nepheli will move to the Roundtable Hold, exhaust her dialogue", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-queen-of-limgrave-7", "step": "8", "location": "Village of the Albinaurics in Liurnia", "text": "After she leaves the Roundtable Hold you'll find her outside of the Village of the Albinaurics kneeling over several corpses. Speak to her", "region": "Liurnia of the Lakes", "subarea": "Village Albinaurics"}, {"id": "quest-queen-of-limgrave-8", "step": "9", "location": "Village of the Albinaurics in Liurnia", "text": "Defeat the Omenkiller in the village", "region": "Liurnia of the Lakes", "subarea": "Village Albinaurics"}, {"id": "quest-queen-of-limgrave-9", "step": "10", "location": "Roundtable Hold", "text": "Return to the Roundtable Hold and speak to Nepheli, who is now at the bottom of the stairs next to the blacksmith", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-queen-of-limgrave-10", "step": "11", "location": "Roundtable Hold", "text": "Speak to Gideon Ofnir and ask him about Nepheli", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-queen-of-limgrave-11", "step": "12", "location": "The Four Belfries in Liurnia", "text": "Use an Imbued Stonesword Key on the second Belfry to activate the teleporter to the Chapel of Anticipation", "region": "Liurnia of the Lakes", "subarea": "Four Belfries"}, {"id": "quest-queen-of-limgrave-12", "step": "13", "location": "Chapel of Anticipation in Limgrave", "text": "Kill the Grafted Scion and then head up to the chapel and loot The Stormhawk King from the corpse on the roof", "region": "Limgrave", "subarea": "Limgrave"}, {"id": "quest-queen-of-limgrave-13", "step": "14", "location": "Roundtable Hold", "text": "If you haven't already, complete Roderika's questline", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-queen-of-limgrave-14", "step": "15", "location": "Roundtable Hold", "text": "Speak to Nepheli, and give her The Stormhawk King", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-queen-of-limgrave-15", "step": "16", "location": "Queen's Bedchamber Site of Grace in Leyndell, Royal Capital", "text": "Defeat Morgott, The Omen King", "region": "Leyndell, Royal Capital", "subarea": "Queen's Bedchamber"}, {"id": "quest-queen-of-limgrave-16", "step": "17", "location": "Godrick the Grafted Site of Grace in Stormveil Castle", "text": "Rest at the Site of Grace near the throne room and Nepheli, Kenneth, and Gostoc will appear. Speak to Nepheli to receive an Ancient Dragon Smithing Stone and Kenneth for some dialogue", "region": "Stormveil Castle", "subarea": "Godrick Grafted"}]}, {"giver": "Sorceress Sellen", "reward": "Comet Azur, Stars of Ruin (Legendary, via Lusat), Witch's Glintstone Crown; then Glintstone Kris OR Sellen's Bell Bearing (finale is mutually exclusive)", "gate": "Order matters: beat Rennala, then Radahn + talk to Jerren, before the Primal Glintstone transplant appears. Get the Sellian Sealbreaker before her dialogue closes or Stars of Ruin is lost. Finale rewards are mutually exclusive (two runs for both).", "steps": [{"id": "quest-sorceress-sellen-0", "step": "1", "location": "Waypoint Ruins in Limgrave", "text": "After defeating the Mad Pumpkin Head, Sellen's spectral body will offer to teach you Sorceries, and if you accept she will sell you her wares", "region": "Limgrave", "subarea": "Waypoint Ruins"}, {"id": "quest-sorceress-sellen-1", "step": "2", "location": "Hermit Village in Mt. Gelmir", "text": "Travel to the Hermit Village and interact with Azur next to the Site of Grace, who will give you the Comet Azur Sorcery", "region": "Mt. Gelmir", "subarea": "Hermit Village"}, {"id": "quest-sorceress-sellen-2", "step": "3", "location": "Waypoint Ruins in Limgrave", "text": "Go back to Sellen and show her the Sorcery and she will offer you a proposition. Accept, and she will then ask you to find Master Lusat, and hands you a key to his prison", "region": "Limgrave", "subarea": "Waypoint Ruins"}, {"id": "quest-sorceress-sellen-3", "step": "4", "location": "Sellia Hideaway in Caelid", "text": "You'll find Lusat in a cave behind an illusory wall in the graveyard northeast of the Church of the Plague. Interact with him to receive the Stars of Ruin Sorcery", "region": "Caelid", "subarea": "Sellia Hideaway"}, {"id": "quest-sorceress-sellen-4", "step": "5", "location": "Redmane Castle in Caelid", "text": "Defeat Starscourge Radahn", "region": "Caelid", "subarea": "Redmane Castle"}, {"id": "quest-sorceress-sellen-5", "step": "6", "location": "Redmane Castle in Caelid", "text": "After defeating Radahn, go back to the church right before the elevator leading to his arena and speak to Witch Hunter Jerren and exhaust his dialogue", "region": "Caelid", "subarea": "Redmane Castle"}, {"id": "quest-sorceress-sellen-6", "step": "7", "location": "Waypoint Ruins in Limgrave", "text": "Return to Sellen after grabbing the Sorcery from Lusat and killing Radahn and she will request you to meet her in person at the Witchbane Ruins", "region": "Limgrave", "subarea": "Waypoint Ruins"}, {"id": "quest-sorceress-sellen-7", "step": "8", "location": "Witchbane Ruins in Weeping Peninsula", "text": "Speak to her at Witchbane Ruins and she will give you Sellen's Primal Glintstone. Reload the area", "region": "Weeping Peninsula", "subarea": "Witchbane Ruins"}, {"id": "quest-sorceress-sellen-8", "step": "9", "location": "Witchbane Ruins in Weeping Peninsula", "text": "Return to Witchbane Ruins and Witch Hunter Jerren will be there, exhaust his dialogue", "region": "Weeping Peninsula", "subarea": "Witchbane Ruins"}, {"id": "quest-sorceress-sellen-9", "step": "10", "location": "Ranni's Rise in Liurnia", "text": "Head to Seluvis's underground laboratory from his questline. A puppet of Sellen can be found behind an illusory wall inside, give the Primal Glintstone to it. Then speak to her and exhaust her dialogue", "region": "Liurnia of the Lakes", "subarea": "Ranni's Rise"}, {"id": "quest-sorceress-sellen-10", "step": "11", "location": "Raya Lucaria Grand Library in Raya Lucaria Academy", "text": "Travel to the Raya Lucaria Grand Library Site of Grace and exit the library. Outside you will find two summoning signs", "region": "Raya Lucaria Academy", "subarea": "Raya Lucaria Grand Library"}, {"id": "quest-sorceress-sellen-11", "step": "12", "location": "Raya Lucaria Grand Library in Raya Lucaria Academy", "text": "If you assist Sellen in defeating Jerren, you will get the Eccentric set, as well as the Glintstone Kris after speaking to Sellen. The Shard Spiral Sorcery will also be added to her wares", "region": "Raya Lucaria Academy", "subarea": "Raya Lucaria Grand Library"}, {"id": "quest-sorceress-sellen-12", "step": "13", "location": "Raya Lucaria Grand Library in Raya Lucaria Academy", "text": "Reload the area after speaking to her and the Witch's Glintstone Crown will also appear next to a now transformed Sellen", "region": "Raya Lucaria Academy", "subarea": "Raya Lucaria Grand Library"}, {"id": "quest-sorceress-sellen-13", "step": "14", "location": "Raya Lucaria Grand Library in Raya Lucaria Academy", "text": "(Optional) If you instead assisted Jerren in defeating Sellen, you will receive the Witch's Glintstone Crown, Sellen's Bell Bearing, and an Ancient Dragon Smithing Stone after speaking to Jerren", "region": "Raya Lucaria Academy", "subarea": "Raya Lucaria Grand Library"}, {"id": "quest-sorceress-sellen-14", "step": "15", "location": "Hermit Village in Mt. Gelmir", "text": "(Optional) After Sellen transforms, you can pick up Azur's Glintstone set from where his body used to be", "region": "Mt. Gelmir", "subarea": "Hermit Village"}, {"id": "quest-sorceress-sellen-15", "step": "16", "location": "Sellia Hideaway in Caelid", "text": "(Optional) You can also grab Lusat's set from where his body used to be", "region": "Caelid", "subarea": "Sellia Hideaway"}]}, {"giver": "Patches", "reward": "Grovel for Mercy gesture, Magma Whip Candlestick (Volcano Manor), Dancer's Castanets, Patches' Bell Bearing (only if killed)", "gate": "Magma Whip Candlestick has no fallback — complete the Tragoth contract and grab it before Patches leaves the manor (killing Rykard makes him leave).", "steps": [{"id": "quest-patches-0", "step": "1", "location": "Murkwater Cave in Limgrave", "text": "Fight Patches and spare him when he surrenders to receive the Grovel For Mercy gesture, as well as offer his wares", "region": "Limgrave", "subarea": "Murkwater Cave"}, {"id": "quest-patches-1", "step": "2", "location": "Murkwater Cave in Limgrave", "text": "(Optional) Ask him about the chest in the room, then open it to be teleported to Mistwood. Return and speak to Patches for the Calm Down! gesture", "region": "Limgrave", "subarea": "Murkwater Cave"}, {"id": "quest-patches-2", "step": "3", "location": "Murkwater Cave in Limgrave", "text": "(Optional) Attack Patches again, then let him get you to low health for the Extreme Repentance gesture. Either use it or die to return Patches to normal", "region": "Limgrave", "subarea": "Murkwater Cave"}, {"id": "quest-patches-3", "step": "4", "location": "Scenic Isle Site of Grace in Liurnia", "text": "After reaching Liurnia, Patches will move to the Scenic Isle Site of Grace and continue to offer his wares", "region": "Liurnia of the Lakes", "subarea": "Scenic Isle"}, {"id": "quest-patches-4", "step": "5", "location": "First Mt. Gelmir Campsite Site of Grace in Mt. Gelmir", "text": "After reaching the Altus Plateau, Patches can be found hiding in some bushes near the cliff edge to the west of the First Mt. Gelmir Campsite Site of Grace", "region": "Mt. Gelmir", "subarea": "First Campsite Mt. Gelmir"}, {"id": "quest-patches-5", "step": "6", "location": "First Mt. Gelmir Campsite Site of Grace in Mt. Gelmir", "text": "(Optional) If you follow the rainbow stones he placed to the cliff edge, a cutscene will play of Patches kicking you off the cliff*", "region": "Mt. Gelmir", "subarea": "First Campsite Mt. Gelmir"}, {"id": "quest-patches-6", "step": "7", "location": "Volcano Manor in Mt. Gelmir", "text": "Join the Volcano Manor and complete one assassination for them", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-patches-7", "step": "8", "location": "Volcano Manor in Mt. Gelmir", "text": "Patches will appear in the manor near the entrance room, exhaust his dialogue to receive the Letter to Patches", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-patches-8", "step": "9", "location": "Ruin-Strewn Precipice in Liurnia", "text": "Locate the invasion sign in the boss chamber of the Ruin-Strewn Precipice and defeat the target to receive the Bull-Goat armor set**", "region": "Liurnia of the Lakes", "subarea": "Ruin Strewn Precipice"}, {"id": "quest-patches-9", "step": "10", "location": "Volcano Manor in Mt. Gelmir", "text": "Go back and speak to Patches, then reload the area", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-patches-10", "step": "11", "location": "Volcano Manor in Mt. Gelmir", "text": "After reloading the area, speak to Patches again to receive the Magma Whip Candlestick", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-patches-11", "step": "12", "location": "Volcano Manor in Mt. Gelmir", "text": "Defeat Rykard, Lord of Blasphemy.", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-patches-12", "step": "13", "location": "Volcano Manor in Mt. Gelmir", "text": "After defeating Rykard, speak to Patches in the manor and he will say goodbye and leave the manor", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-patches-13", "step": "14", "location": "The Shaded Castle in Altus Plateau", "text": "Patches can be found right before the Shaded Castle boss room. Speak to him and he will give you the Dancer's Castanets", "region": "Altus Plateau", "subarea": "Shaded Castle"}, {"id": "quest-patches-14", "step": "15", "location": "Volcano Manor in Mt. Gelmir", "text": "(Optional) You can give the Dancer's Castanets to Tanith inside of Rykard's boss room for some completely pointless dialogue", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-patches-15", "step": "16", "location": "Murkwater Cave in Limgrave", "text": "Return to the Murkwater Cave and enter the boss room to fight Patches again. Spare him when he surrenders again to receive the Patches's Crouch gesture", "region": "Limgrave", "subarea": "Murkwater Cave"}]}, {"giver": "Lord of Frenzy", "reward": "Frenzied Flame Seal, Frenzyflame Stone x5, 'As You Wish' gesture + path to the Lord of Frenzied Flame ending", "gate": "Hyetta's chain. Don't kill Irina early (stops Hyetta spawning). Touching the Three Fingers is the point of no return — reversible only via Miquella's Needle. Save-scum it (do it last).", "steps": [{"id": "quest-lord-of-frenzy-0", "step": "1", "location": "Bridge of Sacrifice Site of Grace in Weeping Peninsula", "text": "Irinia can be found sitting by the road near the Site of Grace, speak with her and receive Irina's Letter", "region": "Weeping Peninsula", "subarea": "Bridge Sacrifice"}, {"id": "quest-lord-of-frenzy-1", "step": "2", "location": "Castle Morne in Weeping Peninsula", "text": "Locate her father Edgar in the upper ramparts of the castle and deliver the letter to him, he will decline to return to his daughter", "region": "Weeping Peninsula", "subarea": "Castle Morne"}, {"id": "quest-lord-of-frenzy-2", "step": "3", "location": "Castle Morne in Weeping Peninsula", "text": "Defeat Leonine Misbegotten and return to Edgar, who will thank the player and return to his daughter", "region": "Weeping Peninsula", "subarea": "Castle Morne"}, {"id": "quest-lord-of-frenzy-3", "step": "4", "location": "Bridge of Sacrifice Site of Grace in Weeping Peninsula", "text": "Irinia will be found dead next to the road with Edgar kneeling over her body, exhaust his dialogue", "region": "Weeping Peninsula", "subarea": "Bridge Sacrifice"}, {"id": "quest-lord-of-frenzy-4", "step": "5", "location": "Lake-Facing Cliffs Site of Grace in Liurnia", "text": "Speak to Hyetta at the Site of Grace and offer her a Shabriri Grape to receive the As You Wish gesture", "region": "Liurnia of the Lakes", "subarea": "Lake Facing Cliffs"}, {"id": "quest-lord-of-frenzy-5", "step": "6", "location": "Purified Ruins in Liurnia", "text": "Head to the Purified Ruins in Liurnia, here you will find a second Shabriri Grape down a set of stairs hidden under a wooden floor", "region": "Liurnia of the Lakes", "subarea": "Purified Ruins"}, {"id": "quest-lord-of-frenzy-6", "step": "7", "location": "Purified Ruins in Liurnia", "text": "You will also find Hyetta here, on the edge of the ruins facing the lake. She will ask for another Shabriri Grape, give one to her", "region": "Liurnia of the Lakes", "subarea": "Purified Ruins"}, {"id": "quest-lord-of-frenzy-7", "step": "8", "location": "Revenger's Shack in Liurnia", "text": "Travel to the Revenger's Shack to be invaded by Edgar, defeat him for his Banished Knight's Halberd, Ash of War and a Shabriri Grape", "region": "Liurnia of the Lakes", "subarea": "Revenger's Shack"}, {"id": "quest-lord-of-frenzy-8", "step": "9", "location": "Gate Town Bridge Site of Grace in Liurnia", "text": "Hyetta will move again to nearby the Gate Town Bridge Site of Grace and ask for the third Shabriri Grape. Give it to her and then tell her the grapes really are", "region": "Liurnia of the Lakes", "subarea": "Gate Town Bridge"}, {"id": "quest-lord-of-frenzy-9", "step": "10", "location": "Gate Town Bridge Site of Grace in Liurnia", "text": "Rest at the Site of Grace and speak with her again", "region": "Liurnia of the Lakes", "subarea": "Gate Town Bridge"}, {"id": "quest-lord-of-frenzy-10", "step": "11", "location": "Bellum Church in Liurnia", "text": "She will then move again to the Bellum Church where she will ask for a Fingerprint Grape (dropped by Festering Fingerprint Vyke at the nearby Church of Inhibition)", "region": "Liurnia of the Lakes", "subarea": "Bellum Church"}, {"id": "quest-lord-of-frenzy-11", "step": "12", "location": "Queen's Bedchamber Site of Grace in Leyndell, Royal Capital", "text": "Enter the Elden Throne and defeat Morgott, The Omen King", "region": "Leyndell, Royal Capital", "subarea": "Queen's Bedchamber"}, {"id": "quest-lord-of-frenzy-12", "step": "13", "location": "Forsaken Depths Site of Grace in Subterranean Shunning-Grounds", "text": "Enter the Cathedral of the Forsaken at the bottom of the Subterranean Shunning-Grounds and defeat Mogh, The Omen. Then attack the altar behind the treasure chest to reveal a secret passage", "region": "Subterranean Shunning-Grounds", "subarea": "Forsaken Depths"}, {"id": "quest-lord-of-frenzy-13", "step": "14", "location": "Frenzied Flame Proscription Site of Grace in Subterranean Shunning-Grounds", "text": "After dropping down the pit and reaching Hyetta, speak to her, then remove all armor and weapons and interact with the wall down the hallway*", "region": "Subterranean Shunning-Grounds", "subarea": "Frenzied Flame Proscription"}, {"id": "quest-lord-of-frenzy-14", "step": "15", "location": "Frenzied Flame Proscription Site of Grace in Subterranean Shunning-Grounds", "text": "After the cutscene is over, speak with Hyetta and exhaust her dialogue and she will burn up and die. Loot her body to receive the Frenzied Flame Seal", "region": "Subterranean Shunning-Grounds", "subarea": "Frenzied Flame Proscription"}]}, {"giver": "Brother Corhyn", "reward": "Mending Rune of Perfect Order (Age of Order ending), Radiant Gold Mask + Goldmask's gear, Law of Regression incantation", "gate": "Complete the Royal Leyndell riddle step (cast Law of Regression, tell Goldmask) BEFORE burning the Erdtree, or the Mending Rune is permanently unobtainable. Final rune appears at the Ashen Capital after clearing Farum Azula.", "steps": [{"id": "quest-brother-corhyn-0", "step": "1", "location": "Roundtable Hold", "text": "Speak with Brother Corhyn and exaust his dialogue, as well as buy any Incantations if desired", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-brother-corhyn-1", "step": "2", "location": "Roundtable Hold", "text": "(Optional) After entering the Academy of Raya Lucaria, return to the Roundtable Hold and speak to Corhyn. He will say that he is thinking of leaving to find Goldmask", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-brother-corhyn-2", "step": "3", "location": "Roundtable Hold", "text": "After entering the Altus Plateau, return to the Roundtable Hold again and speak to Corhyn. He will then leave the Roundtable Hold", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-brother-corhyn-3", "step": "4", "location": "Altus Highway Junction Site of Grace in Altus Plateau", "text": "Corhyn can be found on the road north of the Site of Grace. Speak to him and ask about Goldmask. He will also update the Incantations he offers you", "region": "Altus Plateau", "subarea": "Altus Highway Junction"}, {"id": "quest-brother-corhyn-4", "step": "5", "location": "Forest-Spanning Greatbridge Site of Grace in Altus Plateau", "text": "Continue down the road to the Forest-Spanning Greatbridge where you'll find a teleporter. Taking the teleporter will send you to the broken bridge where you'll find Goldmask, interact with him", "region": "Altus Plateau", "subarea": "Forest Spanning Greatbridge"}, {"id": "quest-brother-corhyn-5", "step": "6", "location": "Altus Highway Junction Site of Grace in Altus Plateau", "text": "Return to Corhyn and tell him you found Goldmask and then reload the area", "region": "Altus Plateau", "subarea": "Altus Highway Junction"}, {"id": "quest-brother-corhyn-6", "step": "7", "location": "Forest-Spanning Greatbridge Site of Grace in Altus Plateau", "text": "Go back to where Goldmask was and Corhyn will be standing next to him, exhaust his dialogue. He will also update his wares again", "region": "Altus Plateau", "subarea": "Forest Spanning Greatbridge"}, {"id": "quest-brother-corhyn-7", "step": "8", "location": "Erdtree Sanctuary Site of Grace in Leyndell, Royal Capital", "text": "Defeat Godfrey, First Elden Lord in the Erdtree Sanctuary, and Corhyn and Goldmask will move", "region": "Leyndell, Royal Capital", "subarea": "Erdtree Sanctuary"}, {"id": "quest-brother-corhyn-8", "step": "9", "location": "Leyndell Colosseum in Leyndell, Royal Capital", "text": "Goldmask and Corhyn will be outside the colosseum in southwestern Leyndell, exaust Corhyn's dialogue", "region": "Leyndell, Royal Capital", "subarea": "Leyndell Colosseum"}, {"id": "quest-brother-corhyn-9", "step": "10", "location": "Erdtree Sanctuary Site of Grace in Leyndell, Royal Capital", "text": "Acquire the Golden Order Principia from the chair hanging from the ceiling in the Erdtree Sanctuary", "region": "Leyndell, Royal Capital", "subarea": "Erdtree Sanctuary"}, {"id": "quest-brother-corhyn-10", "step": "11", "location": "Leyndell Colosseum in Leyndell, Royal Capital", "text": "Give the prayerbook to Corhyn and purchase the Law of Regression Incantation (Requires 37 Int, can be boosted)", "region": "Leyndell, Royal Capital", "subarea": "Leyndell Colosseum"}, {"id": "quest-brother-corhyn-11", "step": "12", "location": "Erdtree Sanctuary Site of Grace in Leyndell, Royal Capital", "text": "Head west from the Erdtree Sanctuary Site of Grace and go down the elevator. At the bottom you'll find a large statue with a message in front of  it. Cast Law of Regression on top of the message", "region": "Leyndell, Royal Capital", "subarea": "Erdtree Sanctuary"}, {"id": "quest-brother-corhyn-12", "step": "13", "location": "Erdtree Sanctuary Site of Grace in Leyndell, Royal Capital", "text": "After casting Law of Regression, a new message will appear, read it", "region": "Leyndell, Royal Capital", "subarea": "Erdtree Sanctuary"}, {"id": "quest-brother-corhyn-13", "step": "14", "location": "Leyndell Colosseum in Leyndell, Royal Capital", "text": "Return to the colosseum and speak to Goldmask and tell him the words of the message. Then speak to Corhyn, who will thank you and update his wares with the Immutable Shield Incantation", "region": "Leyndell, Royal Capital", "subarea": "Leyndell Colosseum"}, {"id": "quest-brother-corhyn-14", "step": "15", "location": "Stargazer's Ruins in Mountaintops of the Giants", "text": "Coryhn and Goldmask will next be found on the bridge south of Stargazer's Ruins, exaust Corhyn's dialogue", "region": "Mountaintops of the Giants", "subarea": "Stargazer's Ruins"}, {"id": "quest-brother-corhyn-15", "step": "16", "location": "Beside the Great Bridge Site of Grace in Crumbling Farum Azula", "text": "Defeat Maliketh, The Black Blade", "region": "Crumbling Farum Azula", "subarea": "Great Bridge"}, {"id": "quest-brother-corhyn-16", "step": "17", "location": "Leyndell, Capital of Ash Site of Grace in Leyndell, Ashen Capital", "text": "Once at the Capital of Ash, head directly south until you reach Corhyn who can be found kneeling near the end of a huge bolt sticking out of the ground. Speak to him", "region": "Leyndell, Ashen Capital", "subarea": "Leyndell Ashen Capital"}, {"id": "quest-brother-corhyn-17", "step": "18", "location": "Leyndell, Capital of Ash Site of Grace in Leyndell, Ashen Capital", "text": "After speaking to Corhyn, continue heading south toward the stairway leading up to the elevator. Instead of heading up the stairs, take the path heading downward to the right", "region": "Leyndell, Ashen Capital", "subarea": "Leyndell Ashen Capital"}, {"id": "quest-brother-corhyn-18", "step": "19", "location": "Leyndell, Capital of Ash Site of Grace in Leyndell, Ashen Capital", "text": "Near the end of the path you'll find Goldmask's corpse, which can be looted for the Mending Rune of Perfect Order*", "region": "Leyndell, Ashen Capital", "subarea": "Leyndell Ashen Capital"}, {"id": "quest-brother-corhyn-19", "step": "20", "location": "Leyndell, Capital of Ash Site of Grace in Leyndell, Ashen Capital", "text": "Reload the area and head back to where Corhyn was to find his Bell Bearing, Corhyn's Robe, and a Flail. Then head back to where Goldmask was and loot the body again for the Goldmask armor set", "region": "Leyndell, Ashen Capital", "subarea": "Leyndell Ashen Capital"}]}, {"giver": "Diallos & Jars", "reward": "Hoslow's Petal Whip, Diallos's Mask, Numen's Rune (all corpse loot at Jarburg)", "gate": "His death scene needs Jar-Bairn's quest progressed AND Radahn dead + Alexander spoken to. Never progress Jar-Bairn and the rewards never spawn. Caution (disputed): finishing Volcano Manor before meeting Diallos may block him.", "steps": [{"id": "quest-diallos-jars-0", "step": "1", "location": "Roundtable Hold", "text": "Speak to Diallos in the main room and exhaust his dialogue", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-diallos-jars-1", "step": "2", "location": "Saintsbridge Site of Grace in Stormhill", "text": "(Optional) Alexander will be stuck in a hole in the ground on the clifftop south of the Saintsbridge Site of Grace. Attack him until he pops out, then speak to him and exaust his dialogue", "region": "Stormhill", "subarea": "Saintsbridge"}, {"id": "quest-diallos-jars-2", "step": "3", "location": "Academy Gate Town Site of Grace in Liurnia", "text": "Diallos will next be found kneeling over the corpse of his friend on the roof of a sunken building north of the Site of Grace. Speak with him and exhaust his dialogue", "region": "Liurnia of the Lakes", "subarea": "Academy Gate Town"}, {"id": "quest-diallos-jars-3", "step": "4", "location": "Roundtable Hold", "text": "Return to the Roundtable Hold to find Diallos back in his old spot, speak to him and exhaust his dialogue", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-diallos-jars-4", "step": "5", "location": "Gael Tunnel in Caelid", "text": "(Optional) Clear the Gael Tunnel and open the door at the end. Alexander will be behind it, speak to him", "region": "Caelid", "subarea": "Gael Tunnel"}, {"id": "quest-diallos-jars-5", "step": "6", "location": "Redmane Castle in Caelid", "text": "Fight Starscourge Radahn, making sure to summon Alexander during the fight. After defeating Radahn, Alexander can be found near the Site of Grace, speak to him and exhaust his dialogue", "region": "Caelid", "subarea": "Redmane Castle"}, {"id": "quest-diallos-jars-6", "step": "7", "location": "Artist's Shack Site of Grace in Liurnia", "text": "(Optional) Alexander will be stuck in another hole to the west of Jarburg, use Oil Pots on him and then heavy attack him until he is free. After freeing him, speak to him", "region": "Liurnia of the Lakes", "subarea": "Artist's Shack"}, {"id": "quest-diallos-jars-7", "step": "8", "location": "Jarburg in Liurnia", "text": "Jar-Bairn can be found sitting on the doorstep of one of the buildings. Speak to him and exhaust his dialogue, then reload the area", "region": "Liurnia of the Lakes", "subarea": "Jarburg"}, {"id": "quest-diallos-jars-8", "step": "9", "location": "Jarburg in Liurnia", "text": "Speak to him again and exhaust his dialogue, then reload the area again", "region": "Liurnia of the Lakes", "subarea": "Jarburg"}, {"id": "quest-diallos-jars-9", "step": "10", "location": "Seethewater Terminus Site of Grace in Mt. Gelmir", "text": "You can find Alexander bathing in the lava pit to the south of Fort Laiedd, speak to him from the rock lying in the center of the pit and exhaust his dialogue", "region": "Mt. Gelmir", "subarea": "Seethewater Terminus"}, {"id": "quest-diallos-jars-10", "step": "11", "location": "Volcano Manor in Mt. Gelmir", "text": "Enlist into the service of the Volcano Manor, speak to Diallos between each assassination", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-diallos-jars-11", "step": "12", "location": "Volcano Manor in Mt. Gelmir", "text": "Complete three assassinations in Tanith's questline and Diallos will leave the manor and go to Jarburg (or kill Rykard, Lord of Blasphemy and speak to Diallos afterward)", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-diallos-jars-12", "step": "13", "location": "Jarburg in Liurnia", "text": "Speak to Diallos, who can be found in one of the buildings tending to a Living Jar, and exhaust his dialogue", "region": "Liurnia of the Lakes", "subarea": "Jarburg"}, {"id": "quest-diallos-jars-13", "step": "14", "location": "Jarburg in Liurnia", "text": "Rest at the Site of Grace and pass time until Diallos and Jar-Bairn move to the middle of town.", "region": "Liurnia of the Lakes", "subarea": "Jarburg"}, {"id": "quest-diallos-jars-14", "step": "15", "location": "Jarburg in Liurnia", "text": "Speak to the wounded Diallos and answer his question however you like, then speak to Jar-Bairn and exhaust his dialogue, then reload the area", "region": "Liurnia of the Lakes", "subarea": "Jarburg"}, {"id": "quest-diallos-jars-15", "step": "16", "location": "Jarburg in Liurnia", "text": "After reloading the area, Jar-Bairn will be kneeling over Diallos's corpse, speak to him again and exhaust his dialogue, then reload the area again", "region": "Liurnia of the Lakes", "subarea": "Jarburg"}, {"id": "quest-diallos-jars-16", "step": "17", "location": "Jarburg in Liurnia", "text": "After reloading the area, Diallos's body will be gone, leaving behind the Diallos's Mask and Hoslow's Petal Whip, and a Numen's Rune in its place", "region": "Liurnia of the Lakes", "subarea": "Jarburg"}, {"id": "quest-diallos-jars-17", "step": "18", "location": "Dragon Temple Lift Site of Grace in Crumbling Farum Azula", "text": "From the Site of Grace, proceed through the area and head right from the Golden Seed. Kill the dragon on top of the building roof if you didn't kill him earlier in the Wormface area", "region": "Crumbling Farum Azula", "subarea": "Dragon Temple Lift"}, {"id": "quest-diallos-jars-18", "step": "19", "location": "Dragon Temple Lift Site of Grace in Crumbling Farum Azula", "text": "After killing the dragon, reload the area and return to the building roof where it once was to find Alexander waiting for you. Speak to him and he will challenge you to a duel", "region": "Crumbling Farum Azula", "subarea": "Dragon Temple Lift"}, {"id": "quest-diallos-jars-19", "step": "20", "location": "Dragon Temple Lift Site of Grace in Crumbling Farum Azula", "text": "Defeat Alexander to receive the Shard of Alexander talisman and Alexander's Innards", "region": "Crumbling Farum Azula", "subarea": "Dragon Temple Lift"}, {"id": "quest-diallos-jars-20", "step": "21", "location": "Jarburg in Liurnia", "text": "Return to Jarburg and speak to Jar-Bairn, and exhuast his dialogue.", "region": "Liurnia of the Lakes", "subarea": "Jarburg"}, {"id": "quest-diallos-jars-21", "step": "22", "location": "Jarburg in Liurnia", "text": "Speak to Jar-Bairn and give him Alexander's Insides, then reload the area", "region": "Liurnia of the Lakes", "subarea": "Jarburg"}, {"id": "quest-diallos-jars-22", "step": "23", "location": "Jarburg in Liurnia", "text": "Jar-Bairn will be gone and the Companion Jar talisman can be found in his place", "region": "Liurnia of the Lakes", "subarea": "Jarburg"}]}, {"giver": "Rogier & Fia", "reward": "Rogier's Rapier + Spellblade Set + Rogier's Letter; Fia's Mending Rune of the Death-Prince (Age of the Duskborn) + Lichdragon Fortissax (trophy)", "gate": "Fortissax (trophy) is only fightable via Fia's Deathbed Dream; the Cursemark of Death is gated behind Ranni. Hear Rogier's 'About D' dialogue before he dies or his Letter never spawns. Fia auto-relocates to Deeproot if you burn the Erdtree — the real risk is killing her before claiming the rune.", "steps": [{"id": "quest-rogier-fia-0", "step": "1", "location": "Rampart Tower Site of Grace in Stormveil Castle", "text": "Rogier can be found in chapel past the Rampart Tower Site of Grace, exhaust his dialogue. Purchase his wares if desired", "region": "Stormveil Castle", "subarea": "Rampart Tower"}, {"id": "quest-rogier-fia-1", "step": "2", "location": "Secluded Cell Site of Grace in Stormveil Castle", "text": "Defeat Godrick the Grafted, and Rogier will move to the Roundtable Hold", "region": "Stormveil Castle", "subarea": "Secluded Cell"}, {"id": "quest-rogier-fia-2", "step": "3", "location": "Liftside Chamber Site of Grace in Stormveil Castle", "text": "(Optional) Defeat the Ulcerated Tree Spirit in the crypt of Stormveil Castle and examine Rogier's bloodstain near the rotting face", "region": "Stormveil Castle", "subarea": "Liftside Chamber"}, {"id": "quest-rogier-fia-3", "step": "4", "location": "Roundtable Hold", "text": "(Optional) Speak with Rogier and ask about the face", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-rogier-fia-4", "step": "5", "location": "Roundtable Hold", "text": "Speak with Fia and allow her to hold you. Choose the \"Talk in secret\", \"Did you know?\", and \"About the Black Knifeprint\" options", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-rogier-fia-5", "step": "6", "location": "Black Knife Catacombs in Liurnia", "text": "Defeat the Black Knight Assassin behind the hidden wall in the catacombs for the Black Knifeprint", "region": "Liurnia of the Lakes", "subarea": "Black Knife Catacombs"}, {"id": "quest-rogier-fia-6", "step": "7", "location": "Roundtable Hold", "text": "Give the Black Knifeprint to Rogier and reload the area", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-rogier-fia-7", "step": "8", "location": "Roundtable Hold", "text": "Speak to Rogier again and he will ask you to seek out Ranni", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-rogier-fia-8", "step": "9", "location": "Ranni's Rise in Liurnia", "text": "Speak with Ranni, then return and speak with Rogier again before going back to Ranni again to enter her service", "region": "Liurnia of the Lakes", "subarea": "Ranni's Rise"}, {"id": "quest-rogier-fia-9", "step": "10", "location": "Roundtable Hold", "text": "After entering Ranni's service, inform Rogier and he will fall into a deep slumber", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-rogier-fia-10", "step": "11", "location": "Roundtable Hold", "text": "Progress further and eventually Rogier will die and leave behind his Bell Bearing and armor set and a letter informing the player of D's twin brother", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-rogier-fia-11", "step": "12", "location": "Roundtable Hold", "text": "After reaching Altus Plateau, speak to Fia and allow her to hold you. She will give you a dagger and ask that you find its owner", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-rogier-fia-12", "step": "13", "location": "Roundtable Hold", "text": "Give the dagger to D, and reload the area", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-rogier-fia-13", "step": "14", "location": "Roundtable Hold", "text": "Fia will be standing over D's corpse in a newly opened room, speak to her and she will disappear", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-rogier-fia-14", "step": "15", "location": "Ranni's Rise in Liurnia", "text": "Progress Ranni's questline to the point where you have acquired the Cursemark of Death", "region": "Liurnia of the Lakes", "subarea": "Ranni's Rise"}, {"id": "quest-rogier-fia-15", "step": "16", "location": "Across the Roots Site of Grace in Deeproot Depths", "text": "Enter the boss arena at the top of the tree roots in the Deeproot Depths and fight off Fia's Champions", "region": "Deeproot Depths", "subarea": "Across Roots"}, {"id": "quest-rogier-fia-16", "step": "17", "location": "Prince of Death's Throne Site of Grace in Deeproot Depths", "text": "After the fight is over, Fia will be under the corpse of Godwyn. Speak to her and tell her you want to be held", "region": "Deeproot Depths", "subarea": "Prince Death's Throne"}, {"id": "quest-rogier-fia-17", "step": "18", "location": "Prince of Death's Throne Site of Grace in Deeproot Depths", "text": "She will ask the player to bring her the Cursemark of Death from Ranni's questline - give it to her, exhaust her dialogue, then reload the area", "region": "Deeproot Depths", "subarea": "Prince Death's Throne"}, {"id": "quest-rogier-fia-18", "step": "19", "location": "Prince of Death's Throne Site of Grace in Deeproot Depths", "text": "After reloading the area, be held by Fia once more and exhaust her dialogue, then reload the area again", "region": "Deeproot Depths", "subarea": "Prince Death's Throne"}, {"id": "quest-rogier-fia-19", "step": "20", "location": "Prince of Death's Throne Site of Grace in Deeproot Depths", "text": "After reloading the area, Fia will be asleep next to Godwyn. Examine her and you will enter Godwyn's dream and fight Lichdragon Fortissax", "region": "Deeproot Depths", "subarea": "Prince Death's Throne"}, {"id": "quest-rogier-fia-20", "step": "21", "location": "Prince of Death's Throne Site of Grace in Deeproot Depths", "text": "Defeat Lichdragon Fortissax and you will receive the Mending Rune of the Death-Prince*", "region": "Deeproot Depths", "subarea": "Prince Death's Throne"}, {"id": "quest-rogier-fia-21", "step": "22", "location": "Prince of Death's Throne Site of Grace in Deeproot Depths", "text": "If you gave D's armor set to his brother, reload the area to find D, Beholder of Death standing over Fia's corpse. Loot Fia for her armor set", "region": "Deeproot Depths", "subarea": "Prince Death's Throne"}, {"id": "quest-rogier-fia-22", "step": "23", "location": "Prince of Death's Throne Site of Grace in Deeproot Depths", "text": "Speak to D's brother and exhaust his dialogue, then either kill him or reload the area to find the Inseparable Sword and the Twinned armor set", "region": "Deeproot Depths", "subarea": "Prince Death's Throne"}]}, {"giver": "Seluvis", "reward": "Magic Scorpion Charm (talisman), Dolores/Nepheli puppet Spirit Ashes, Seluvis's Bell Bearing", "gate": "Seluvis dies when you give Ranni the Fingerslayer Blade — the Magic Scorpion Charm has NO corpse fallback, so finish the Amber Starlight step and collect it first. Give Seluvis's Potion to Gideon to avoid puppeting an NPC.", "steps": [{"id": "quest-seluvis-0", "step": "1", "location": "Seluvis's Rise in Liurnia", "text": "Speak to Preceptor Seluvis in his rise after starting Ranni's questline (must have spoken to Nepheli at least once prior)", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}, {"id": "quest-seluvis-1", "step": "2", "location": "Seluvis's Rise in Liurnia", "text": "Seluvis will give you a potion and ask that you give it to Nepheli Loux", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}, {"id": "quest-seluvis-2", "step": "3", "location": "Roundtable Hold", "text": "(Optional) Speak to Gideon Ofnier and tell him about the potion. He will tell you to either give it to him to be disposed of, or do what you will with it", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-seluvis-3", "step": "4", "location": "Roundtable Hold", "text": "If you choose not to give it to Gideon, then you can either give the potion to Nepheli or the Dung Eater in the Subterranean Shunning-Grounds*", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-seluvis-4", "step": "5", "location": "Seluvis's Rise in Liurnia", "text": "Regardless of which of the three you give the potion to, return to Seluvis afterward and he will thank you and offer his wares", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}, {"id": "quest-seluvis-5", "step": "6", "location": "Ranni's Rise in Liurnia", "text": "In the ruins outside of Ranni's Rise lies Seluvis's laboratory under an illusory floor. Interact with Seluvis's message at the back corner", "region": "Liurnia of the Lakes", "subarea": "Ranni's Rise"}, {"id": "quest-seluvis-6", "step": "7", "location": "Seluvis's Rise in Liurnia", "text": "Speak to Seluvis about this chamber and he will allow you to choose one of his puppet spirits for free, with the others available to purchase for Starlight Shards", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}, {"id": "quest-seluvis-7", "step": "8", "location": "Seluvis's Rise in Liurnia", "text": "Purchase all of his puppets (if he does not sell his puppet spirits yet you will need to acquire another Starlight Shard for him to update)", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}, {"id": "quest-seluvis-8", "step": "9", "location": "Seluvis's Rise in Liurnia", "text": "Speak to him afterward and he will tell you of his plot to turn Ranni into a doll. He will then ask you to retrieve the Amber Starlight for him", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}, {"id": "quest-seluvis-9", "step": "10", "location": "Altus Highway Junction Site of Grace in Altus Plateau", "text": "Northeast of the Site of Grace, along the cliffs, you'll find the Amber Starlight that Seluvis needs", "region": "Altus Plateau", "subarea": "Altus Highway Junction"}, {"id": "quest-seluvis-10", "step": "11", "location": "Seluvis's Rise in Liurnia", "text": "Give the shard to Seluvis and he'll give you the Magic Scorpion Charm. Reload the area and he'll give you the Amber Draught, to use on Ranni", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}, {"id": "quest-seluvis-11", "step": "12", "location": "Seluvis's Rise in Liurnia", "text": "(Optional) Attempt to give the Amber Draught to Ranni and reload the area (you may reverse this decision with the use of Celestial Dew)", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}, {"id": "quest-seluvis-12", "step": "13", "location": "Seluvis's Rise in Liurnia", "text": "After either finishing his questline or giving Ranni the Fingerslayer Blade, Seluvis will be found dead at his tower, and Pidia dead in Carian Manor", "region": "Liurnia of the Lakes", "subarea": "Seluvis's Rise"}]}, {"giver": "Gowry & Millicent", "reward": "Prosthesis-Wearer Heirloom, Unalloyed Gold Needle (→ Miquella's Needle), then Rotten Winged Sword Insignia OR Millicent's Prosthesis (mutually exclusive)", "gate": "Resolves at Elphael/Haligtree — defeat the Putrid Tree Spirit and complete her steps before beating Malenia. Give her the Valkyrie's Prosthesis (Shaded Castle) first. The two finale talismans can't both be had in one run.", "steps": [{"id": "quest-gowry-millicent-0", "step": "1", "location": "Gowry's Shack in Caelid", "text": "Speak to Gowry in his shack and he will ask you to find the Unalloyed Gold Needle in the nearby swamp", "region": "Caelid", "subarea": "Gowry's Shack"}, {"id": "quest-gowry-millicent-1", "step": "2", "location": "Inner Aeonia Site of Grace in Caelid", "text": "Defeat Commander O'Neil just south of the Inner Aeonia Site of Grace, in the center of the mass of growth in the swamp to aquire the needle", "region": "Caelid", "subarea": "Inner Aeonia"}, {"id": "quest-gowry-millicent-2", "step": "3", "location": "Inner Aeonia Site of Grace in Caelid", "text": "(Optional) You can approach the area in the center-left of the swamp to be invaded by Millicent", "region": "Caelid", "subarea": "Inner Aeonia"}, {"id": "quest-gowry-millicent-3", "step": "4", "location": "Gowry's Shack in Caelid", "text": "Give the needle to Gowry and exhaust his dialogue. Then reload the area", "region": "Caelid", "subarea": "Gowry's Shack"}, {"id": "quest-gowry-millicent-4", "step": "5", "location": "Gowry's Shack in Caelid", "text": "Speak to Gowry again and he will tell you to take the needle to Millicent at the Church of the Plague", "region": "Caelid", "subarea": "Gowry's Shack"}, {"id": "quest-gowry-millicent-5", "step": "6", "location": "Church of the Plague in Caelid", "text": "Give the needle to Millicent, exhaust her dialogue. Then reload the area and speak to her again to receive the Prosthesis-Wearer Heirloom", "region": "Caelid", "subarea": "Church Plague"}, {"id": "quest-gowry-millicent-6", "step": "7", "location": "Gowry's Shack in Caelid", "text": "Return to Gowry's Shack and inform Gorwy that the deed has been done. He will then offer his wares to you", "region": "Caelid", "subarea": "Gowry's Shack"}, {"id": "quest-gowry-millicent-7", "step": "8", "location": "Gowry's Shack in Caelid", "text": "Reload the area and go back to Gowry's Shack and you'll find Millicent there. Exhaust her dialogue and reload the area again", "region": "Caelid", "subarea": "Gowry's Shack"}, {"id": "quest-gowry-millicen
