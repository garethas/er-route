t-8", "step": "9", "location": "Gowry's Shack in Caelid", "text": "After reloading the area, Gowry will be back in his chair selling his wares as before", "region": "Caelid", "subarea": "Gowry's Shack"}, {"id": "quest-gowry-millicent-9", "step": "10", "location": "The Shaded Castle in Altus Plateau", "text": "Aquire the Valkyrie's Prosthesis from the treasure chest in the room guarded by a single Cleanrot Knight on the northwestern edge of the castle", "region": "Altus Plateau", "subarea": "Shaded Castle"}, {"id": "quest-gowry-millicent-10", "step": "11", "location": "Erdtree-Gazing Hill Site of Grace in Altus Plateau", "text": "Millicent can be found just north of the Site of Grace, speak with her and give her the Valkyrie's Prosthesis and exhaust her dialogue", "region": "Altus Plateau", "subarea": "Erdtree Gazing Hill"}, {"id": "quest-gowry-millicent-11", "step": "12", "location": "Gowry's Shack in Caelid", "text": "Return to Gowry  and inform him that you gave Millicent the prosthesis", "region": "Caelid", "subarea": "Gowry's Shack"}, {"id": "quest-gowry-millicent-12", "step": "13", "location": "Gowry's Shack in Caelid", "text": "Gowry will update his wares with the Pest Threads Incantation. Purchase this Incantation to unlock more dialogue", "region": "Caelid", "subarea": "Gowry's Shack"}, {"id": "quest-gowry-millicent-13", "step": "14", "location": "Gowry's Shack in Caelid", "text": "After exhausting the new dialogue you will receieve the Desperate Prayer gesture", "region": "Caelid", "subarea": "Gowry's Shack"}, {"id": "quest-gowry-millicent-14", "step": "15", "location": "Dominula, Windmill Village in Altus Plateau", "text": "Defeat the Godskin Apostle in Dominula, Windmill Village, then reload the area", "region": "Altus Plateau", "subarea": "Dominula Windmill Village"}, {"id": "quest-gowry-millicent-15", "step": "16", "location": "Windmill Heights Site of Grace in Altus Plateau", "text": "After defeating the Godskin Apostle, Millicent will be near the Windmill Heights Site of Grace. Speak with her and exhaust all dialogue", "region": "Altus Plateau", "subarea": "Windmill Heights"}, {"id": "quest-gowry-millicent-16", "step": "17", "location": "Ancient Snow Valley Ruins Site of Grace in Mountaintops of the Giants", "text": "Millicent will move to the Ancient Snow Valley Ruins, speak with her and exhaust all dialogue", "region": "Mountaintops of the Giants", "subarea": "Ancient Snow Valley Ruins"}, {"id": "quest-gowry-millicent-17", "step": "18", "location": "Prayer Room Site of Grace in Elphael, Brace of the Haligtree", "text": "(Optional) Milicent will be in the Prayer Room, you may speak to her for dialogue", "region": "Elphael, Brace of the Haligtree", "subarea": "Prayer Room"}, {"id": "quest-gowry-millicent-18", "step": "19", "location": "Drainage Channel Site of Grace in Elphael, Brace of the Haligtree", "text": "Defeat the Ulcerated Tree Spirit located in the area just before the Drainage Channel Site of Grace. Then reload the area", "region": "Elphael, Brace of the Haligtree", "subarea": "Drainage Channel"}, {"id": "quest-gowry-millicent-19", "step": "20", "location": "Gowry's Shack in Caelid", "text": "After defeating the Ulcerated Tree Spirit in the Haligtree as part of Millicent's quest, you may return to Gowry for some additional dialogue", "region": "Caelid", "subarea": "Gowry's Shack"}, {"id": "quest-gowry-millicent-20", "step": "21", "location": "Drainage Channel Site of Grace in Elphael, Brace of the Haligtree", "text": "Immediately after defeating the Tree Spirit, two summon signs will appear in the area nearby - one to aid Millicent against four invaders, and one to challenge and kill Millicent", "region": "Elphael, Brace of the Haligtree", "subarea": "Drainage Channel"}, {"id": "quest-gowry-millicent-21", "step": "22", "location": "Drainage Channel Site of Grace in Elphael, Brace of the Haligtree", "text": "If you choose to aid Millicent, you will receive the Rotten Winged Sword Insignia", "region": "Elphael, Brace of the Haligtree", "subarea": "Drainage Channel"}, {"id": "quest-gowry-millicent-22", "step": "23", "location": "Drainage Channel Site of Grace in Elphael, Brace of the Haligtree", "text": "(Optional) If you choose to kill Millicent, you will receive Millicent's Prosthesis", "region": "Elphael, Brace of the Haligtree", "subarea": "Drainage Channel"}, {"id": "quest-gowry-millicent-23", "step": "24", "location": "Drainage Channel Site of Grace in Elphael, Brace of the Haligtree", "text": "After aiding Millicent, she will be found nearby laying next to a pool of Scarlet Rot, exhaust her dialogue, then reload the area (DO NOT JUMP DOWN AND LAND ON HER)", "region": "Elphael, Brace of the Haligtree", "subarea": "Drainage Channel"}, {"id": "quest-gowry-millicent-24", "step": "25", "location": "Drainage Channel Site of Grace in Elphael, Brace of the Haligtree", "text": "Return to the area where Millicent was to find her body. Loot it for the Unalloyed Gold Needle", "region": "Elphael, Brace of the Haligtree", "subarea": "Drainage Channel"}, {"id": "quest-gowry-millicent-25", "step": "26", "location": "Haligtree Roots Site of Grace in Elphael, Brace of the Haligtree", "text": "Defeat Malenia, Blade of Miquella. Then reload the area", "region": "Elphael, Brace of the Haligtree", "subarea": "Haligtree Roots"}, {"id": "quest-gowry-millicent-26", "step": "27", "location": "Malenia, Goddess of Rot Site of Grace in Elphael, Brace of the Haligtree", "text": "After reloading the area, use the Unalloyed Gold Needle on the scarlet flower now in Melania's boss arena to receive Miquella's Needle and a Somber Ancient Dragon Smithing Stone", "region": "Elphael, Brace of the Haligtree", "subarea": "Malenia Goddess Rot"}, {"id": "quest-gowry-millicent-27", "step": "28", "location": "Gowry's Shack in Caelid", "text": "After fully completing Millicent's questline, you can return to Gowry for some dialogue about her and may then kill him for the Flock's Canvas Talisman and his Bell Bearing", "region": "Caelid", "subarea": "Gowry's Shack"}]}, {"giver": "Volcano Manor", "reward": "Taker's Cameo (all 3 contracts), Serpent-Hunter, Magma Shot, Serpentbone Blade, Rykard's Rancor", "gate": "Killing Rykard is a master lockout — finish all assassination contracts and grab the Serpent-Hunter from his arena first (no fallback).", "steps": [{"id": "quest-volcano-manor-0", "step": "1", "location": "Warmaster's Shack in Stormhill", "text": "(Optional) You can initially meet Bernahl at the Warmaster's Shack. If you speak to him he will offer you his wares", "region": "Stormhill", "subarea": "Warmaster's Shack"}, {"id": "quest-volcano-manor-1", "step": "2", "location": "East of Liurnia Telescope", "text": "Speak to Rya inside of the nearby gazebo and she will ask you to find who took her necklace and get it back for her", "region": "Liurnia of the Lakes", "subarea": "East Telescope"}, {"id": "quest-volcano-manor-2", "step": "3", "location": "Boilprawn Shack in Liurnia", "text": "Speak to Blackguard Big Boggart and either buy the necklace from him or kill him for it", "region": "Liurnia of the Lakes", "subarea": "Boilprawn Shack"}, {"id": "quest-volcano-manor-3", "step": "4", "location": "East of Liurnia Telescope", "text": "Return the necklace to Rya and she will give you an invitation to the Volcano Manor", "region": "Liurnia of the Lakes", "subarea": "East Telescope"}, {"id": "quest-volcano-manor-4", "step": "5", "location": "Grand Lift of Dectus in Altus Plateau", "text": "Speak to Rya here and she will teleport  you to the Volcano Manor (if you entered Altus Plateau from somewhere other than the lift, she will be located near Lux Ruins)", "region": "Altus Plateau", "subarea": "Grand Lift Dectus"}, {"id": "quest-volcano-manor-5", "step": "6", "location": "Volcano Manor in Mt. Gelmir", "text": "Enter the manor and speak to Tanith, who is sitting in a chair next to a Crucible Knight. She will ask if you would pledge your services to the manor, accept to receive the Drawing-Room Key", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-6", "step": "7", "location": "Volcano Manor in Mt. Gelmir", "text": "Use the key on the second door on the left side of the hallway to Tanith's right to enter a large room with a Letter from Volcano Manor left on the table for you. Take the letter and read it", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-7", "step": "8", "location": "Volcano Manor in Mt. Gelmir", "text": "Join the Volcano Manor, after which speak to Bernahl in the large room on the left side of the hallway. He will introduce himself and offer his wares", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-8", "step": "9", "location": "Warmaster's Shack Site of Grace in Stormhill", "text": "Assassinate Old Knight Istvan at the marker on your map using the red invasion sign under the Divine Bridge north of the shack", "region": "Stormhill", "subarea": "Warmaster's Shack"}, {"id": "quest-volcano-manor-9", "step": "10", "location": "Volcano Manor in Mt. Gelmir", "text": "Return to Tanith and speak with her to be rewarded with the Magma Shot, then reload the area", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-10", "step": "11", "location": "Volcano Manor in Mt. Gelmir", "text": "Complete assassinations until Rya moves to another room and appears in snake form. Speak with her, then reload the area", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-11", "step": "12", "location": "Volcano Manor in Mt. Gelmir", "text": "Enter the drawing room again to find another letter on the table, take it and read it", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-12", "step": "13", "location": "Old Altus Tunnel Site of Grace in Altus Plateau", "text": "Assassinate Rileigh the Idle at the marker on your map using the red invasion sign outside of the Old Altus Tunnel", "region": "Altus Plateau", "subarea": "Old Altus Tunnel"}, {"id": "quest-volcano-manor-13", "step": "14", "location": "Volcano Manor in Mt. Gelmir", "text": "Return to Rya, now in her human form, and speak to her.  Then enter the illusory wall in the back-right of the room and reach the Prison Town Church Site of Grace", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-14", "step": "15", "location": "Volcano Manor in Mt. Gelmir", "text": "After getting the Site of Grace, speak to Rya and tell her of the secret part of the manor", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-15", "step": "16", "location": "Volcano Manor in Mt. Gelmir", "text": "Return to Tanith and speak with her to be rewarded with the Serpentbone Blade, then reload the area", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-16", "step": "17", "location": "Volcano Manor in Mt. Gelmir", "text": "(Optional) Speak to Tanith for some dialogue about Rya", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-17", "step": "18", "location": "Temple of Eiglay Site of Grace in Mt. Gelmir", "text": "Acquire the Serpent's Amnion after defeating the Godskin Noble", "region": "Mt. Gelmir", "subarea": "Temple Eiglay"}, {"id": "quest-volcano-manor-18", "step": "19", "location": "Volcano Manor in Mt. Gelmir", "text": "Give the Serpent's Amnion to Rya and she will leave the manor", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-19", "step": "20", "location": "Volcano Manor in Mt. Gelmir", "text": "(Optional) Speak to Tanith about Rya again and she will give you a Tonic of Forgetfulness to give to her", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-20", "step": "21", "location": "Temple of Eiglay Site of Grace in Mt. Gelmir", "text": "Take the elevator next to the Site of Grace and get off partway. Then jump out of the window and cross the lava into the other window to find Rya kneeling in a room. Speak to her", "region": "Mt. Gelmir", "subarea": "Temple Eiglay"}, {"id": "quest-volcano-manor-21", "step": "22", "location": "Temple of Eiglay Site of Grace in Mt. Gelmir", "text": "Rya will ask you to kill her, if you do so she will drop Daedicar's Woe. If you give her the tonic, she simply goes to sleep. If you do neither, the quest continues", "region": "Mt. Gelmir", "subarea": "Temple Eiglay"}, {"id": "quest-volcano-manor-22", "step": "23", "location": "Volcano Manor in Mt. Gelmir", "text": "Enter the drawing room again to find another letter on the table, take it and read it", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-23", "step": "24", "location": "Volcano Manor in Mt. Gelmir", "text": "Talk to Bernahl, who will give you a letter with two additional targets and offer you to join him in killing them", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-24", "step": "25", "location": "Fortified Manor, First Floor Site of Grace in Leyndell, Royal Capital", "text": "Kill both the targets with Bernahl to receive the Raging Wolf Set", "region": "Leyndell, Royal Capital", "subarea": "Fortified Manor First Floor"}, {"id": "quest-volcano-manor-25", "step": "26", "location": "Volcano Manor in Mt. Gelmir", "text": "Meet Bernahl back at the Volcano Manor to get the Gelmir's Fury Sorcery", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-26", "step": "27", "location": "Shack of the Lofty in Mountaintops of the Giants", "text": "Assassinate Juno Hoslow, Knight of Blood at the marker on your map using the red invasion sign near the shack", "region": "Mountaintops of the Giants", "subarea": "Shack Lofty"}, {"id": "quest-volcano-manor-27", "step": "28", "location": "Volcano Manor in Mt. Gelmir", "text": "Return to Tanith and speak with her to be rewarded with the Taker's Cameo talisman", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-28", "step": "29", "location": "Volcano Manor in Mt. Gelmir", "text": "Speak with Tanith again after receiving your reward and she will ask you to meet Rykard, Lord of Blasphemy. Accept, and you will be teleported directly outside of his boss arena", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-29", "step": "30", "location": "Volcano Manor in Mt. Gelmir", "text": "Defeat Rykard, Lord of Blasphemy", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-30", "step": "31", "location": "Temple of Eiglay Site of Grace in Mt. Gelmir", "text": "If you left Rya alive, speak to her afterward and then reload the area to find the Daedicar's Woe talisman and Zoraya's Letter in her place", "region": "Mt. Gelmir", "subarea": "Temple Eiglay"}, {"id": "quest-volcano-manor-31", "step": "32", "location": "Volcano Manor in Mt. Gelmir", "text": "After defeating Rykard, return to Tanith and speak with her, then reload the area", "region": "Volcano Manor", "subarea": "Mt. Gelmir"}, {"id": "quest-volcano-manor-32", "step": "33", "location": "Rykard, Lord of Blasphemy site of grace in Mt. Gelmir", "text": "Return to Rykard's lair to find Tanith feasting on his corpse. You may kill her to receive the Consort's Set", "region": "Mt. Gelmir", "subarea": "Rykard Lord Blasphemy"}, {"id": "quest-volcano-manor-33", "step": "34", "location": "Rykard, Lord of Blasphemy site of grace in Mt. Gelmir", "text": "After killing Tanith, her Crucible Knight bodyguard will invade you. Defeat him to receive the Aspect of the Crucible: Breath Incantation", "region": "Mt. Gelmir", "subarea": "Rykard Lord Blasphemy"}, {"id": "quest-volcano-manor-34", "step": "35", "location": "Beside the Great Bridge Site of Grace in Crumbling Farum Azula", "text": "From the Site of Grace, go the large bridge that leads to the boss door and run the opposite way of it. You'll eventually reach a ladder that goes down to another bridge with a tower at the end of it", "region": "Crumbling Farum Azula", "subarea": "Great Bridge"}, {"id": "quest-volcano-manor-35", "step": "36", "location": "Beside the Great Bridge Site of Grace in Crumbling Farum Azula", "text": "Enter the tower and Bernahl will invade. Kill him to get the Beast Champion set, the Devourer's Scepter, and Blasphemous Claw", "region": "Crumbling Farum Azula", "subarea": "Great Bridge"}]}, {"giver": "Dung Eater", "reward": "Sword of Milos, Mending Rune of the Fell Curse (Blessing of Despair ending), Omen Set", "gate": "Needs 5 Seedbed Curses — grab BOTH Leyndell ones before burning the Erdtree. Giving him Seluvis's Potion puppets him and permanently forfeits the Mending Rune.", "steps": [{"id": "quest-dung-eater-0", "step": "1", "location": "Roundtable Hold", "text": "The Dung Eater's spectral form will appear in the Roundtable Hold after reaching the Altus Plateau", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-dung-eater-1", "step": "2", "location": "Roundtable Hold", "text": "After aquiring at least one Seedbed Curse, speak to him and he will give you the Sewer-Gaol Key and ask that you release his real form from its cell", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-dung-eater-2", "step": "3", "location": "Underground Roadside Site of Grace in Subterranean Shunning-Grounds", "text": "Take a left from the Site of Grace and go jump down the hole. Run past the Giant Miranda Sprouts and climb the ladder to find his cell and unlock it, speak to him inside", "region": "Subterranean Shunning-Grounds", "subarea": "Underground Roadside"}, {"id": "quest-dung-eater-3", "step": "4", "location": "Roundtable Hold", "text": "Return to the Roundtable Hold and the Dung Eater will be gone, with a message left behind asking you to fight him at the outer moat of Leyndell", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-dung-eater-4", "step": "5", "location": "Capital Rampart Site of Grace in Capital Outskirts", "text": "Travel to the shallow area of water northeast of the Capital Rampart site of grace and the Dung Eater will invade you. Defeat him to receive the Sword of Milos", "region": "Capital Outskirts", "subarea": "Capital Rampart"}, {"id": "quest-dung-eater-5", "step": "6", "location": "Capital Rampart Site of Grace in Capital Outskirts", "text": "(Optional) If you've been doing Blackguard Big Boggart's questline up to this point then you can loot his body for a Seedbed Curse", "region": "Capital Outskirts", "subarea": "Capital Rampart"}, {"id": "quest-dung-eater-6", "step": "7", "location": "Roundtable Hold", "text": "Return to the Roundtable Hold and he will be back. Talk to him and he will ask you to give his real body five Seedbed Curses", "region": "Roundtable Hold", "subarea": ""}, {"id": "quest-dung-eater-7", "step": "8", "location": "Underground Roadside Site of Grace in Subterranean Shunning-Grounds", "text": "(Optional) Give his body Seluvis's Potion to obtain him as a Spirit Ash from Seluvis, and then kill him before you leave the area to also get the Omen armor set", "region": "Subterranean Shunning-Grounds", "subarea": "Underground Roadside"}, {"id": "quest-dung-eater-8", "step": "9", "location": "Underground Roadside Site of Grace in Subterranean Shunning-Grounds", "text": "Give his real body the Seedbed Curses and you will be receive the Mending Rune of the Fell Curse*", "region": "Subterranean Shunning-Grounds", "subarea": "Underground Roadside"}, {"id": "quest-dung-eater-9", "step": "10", "location": "Underground Roadside Site of Grace in Subterranean Shunning-Grounds", "text": "Reload the area and return to the cell to find the Omen armor set", "region": "Subterranean Shunning-Grounds", "subarea": "Underground Roadside"}]}, {"giver": "Bloody Finger Hunter Yura", "reward": "Nagakiba, Ash of War: Raptor of the Mists, Eleonora's Poleblade", "gate": "Raptor of the Mists is fragile — lost if Yura reaches the Second Church of Marika (i.e. you enter Altus) before finishing his Raya Lucaria co-op step. Nagakiba is effectively never lost.", "steps": [{"id": "quest-bloody-finger-hunter-yura-0", "step": "1", "location": "Seaside Ruins Site of Grace in Limgrave", "text": "(Optional) Yura can initially be met under a ruined overpass next to the Site of Grace. Speak to him and he will warn you about the dragon in Agheel Lake to the north", "region": "Limgrave", "subarea": "Seaside Ruins"}]}, {"giver": "D Hunter of the Dead", "reward": "Twinned Set, D's Bell Bearing, Inseparable Sword (brother path), Inner Order gesture", "gate": "Hand the COMPLETE Twinned Set to D's brother in Nokron — selling/splitting it permanently loses the Inseparable Sword. All co-obtainable with Fia's rewards in one run.", "steps": [{"id": "quest-d-hunter-of-the-dead-0", "step": "1", "location": "Summonwater Village Outskirts Site of Grace in Limgrave", "text": "(Optional) You can find D, Hunter of the Dead kneeling over a corpse by the road west of the Site of Grace, speak with him", "region": "Limgrave", "subarea": "Summonwater Village Outskirts"}]}, {"giver": "Ensha & Latenna", "reward": "Latenna the Albinauric (Spirit Ash), Somber Ancient Dragon Smithing Stone (Apostate Derelict)", "gate": "Speak to Latenna WITH the right medallion half before taking the left half at Castle Sol, or she's already dead at the Shack — her ash is still lootable but the Somber Ancient Dragon Smithing Stone reward is lost.", "steps": [{"id": "quest-ensha-latenna-0", "step": "1", "location": "Roundtable Hold", "text": "Interact with Ensha, who is leaning against the wall in the Roundtable Hold to receive the What Do You Want? gesture", "region": "Roundtable Hold", "subarea": ""}]}, {"giver": "Roderika", "reward": "Spirit Jellyfish Ashes, Golden Seed, Crimson Hood, Spirit Tuning unlock", "gate": "Crimson Hood only spawns at Stormveil once she's a full Spirit Tuner — genuinely missable if her quest is never finished.", "steps": [{"id": "quest-roderika-0", "step": "1", "location": "Stormhill Shack in Stormhill", "text": "(Optional) She will be sitting inside the shack, speak to her and exhaust all dialogue to obtain the Spirit Jellyfish Ashes", "region": "Stormhill", "subarea": "Shack Stormhill"}]}, {"giver": "Thops", "reward": "Thops's Bell Bearing, Thops's Barrier sorcery, Academy Glintstone Key", "gate": "Bring him the second Academy Glintstone Key to finish his short quest before beating Rennala; rewards are corpse loot at his spot afterward.", "steps": [{"id": "quest-thops-0", "step": "1", "location": "Church of Irith in Liurnia", "text": "Speak to him at the church and he will request a spare Glintstone Academy Key", "region": "Liurnia of the Lakes", "subarea": "Church Irith"}]}, {"giver": "Blackguard Big Boggart", "reward": "Boiled Crab / Boiled Prawn (buffs), Bloodhound's Fang steps, Boggart's questline", "gate": "You MUST speak to Rya in Liurnia before entering Volcano Manor or his line locks. His Boiled Crab is permanently missable if he's killed (Dung Eater invasion) before you buy it.", "steps": [{"id": "quest-blackguard-big-boggart-0", "step": "1", "location": "East of Liurnia Telescope", "text": "Start Rya's questline", "region": "Liurnia of the Lakes", "subarea": "East Telescope"}]}], "endings": {"savePoint": "Backup grace = 'Fractured Marika' (the final grace, right before Radagon / Elden Beast). Defeat the Elden Beast, then — while sitting at Fractured Marika and BEFORE touching Marika's body, using Ranni's summon sign, or having accepted the Three Fingers — back up your save (cloud upload, USB copy, or copy the save folder offline). An un-branded backup here keeps all three endings open.", "note": "Complete ALL questlines first. Age of the Stars needs Ranni's quest fully done. Elden Lord is the default (the 4 'Mend the Elden Ring' variants all count as the one trophy). Lord of Frenzied Flame needs the Three Fingers — the only irreversible action, so do it LAST. Bulletproof hedge: also keep a second backup made just BEFORE the final boss while already branded, in case your build can't reach the Three Fingers after the fight.", "options": [{"name": "Elden Lord (default) — do 1st", "prereq": "None", "steps": "From the un-branded backup: touch Marika, choose 'Mend the Elden Ring'. Earns 'Elden Lord'. Restore the backup."}, {"name": "Age of the Stars — do 2nd", "prereq": "Ranni's questline fully complete", "steps": "From the un-branded backup: use Ranni's blue summon sign at the Fractured Marika grace instead of mending. Earns 'Age of the Stars'. Restore the backup."}, {"name": "Lord of Frenzied Flame — do LAST", "prereq": "Accept the Three Fingers (strip ALL armor + body talismans) at the Frenzied Flame Proscription beneath Leyndell", "steps": "From the un-branded backup: travel to the Frenzied Flame Proscription, strip, touch the Three Fingers, return to Fractured Marika, touch Marika → 'Become the Lord of Frenzied Flame'. Irreversible (except via Miquella's Needle pre-boss), so it's last."}]}};
const SK='er_tracker_v1', FK='er_tracker_filters_v1', OK='er_tracker_open_v1';
let state=JSON.parse(localStorage.getItem(SK)||'{}');
let filters=Object.assign({plat:false,miss:false,hidedone:false,hidebuy:false,hideng:false,cats:{},q:''},JSON.parse(localStorage.getItem(FK)||'{}'));
let openState=JSON.parse(localStorage.getItem(OK)||'{}');
const save=()=>localStorage.setItem(SK,JSON.stringify(state));
const saveF=()=>localStorage.setItem(FK,JSON.stringify(filters));
const saveO=()=>localStorage.setItem(OK,JSON.stringify(openState));

const CAT={quest:{l:'Questline steps',o:0},boss:{l:'Bosses',o:1},weapon:{l:'Weapons',o:2},
  ash:{l:'Spirit Ashes',o:3},sorcery:{l:'Sorceries',o:4},incantation:{l:'Incantations',o:5},
  talisman:{l:'Talismans',o:6},cookbook:{l:'Cookbooks',o:7},armor:{l:'Armor',o:8}};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ---- filter predicate ----
function passes(it){
  if(filters.q){const q=filters.q.toLowerCase();
    if(!((it.name||'')+(it.location||'')+(it.notes||'')).toLowerCase().includes(q))return false;}
  if(filters.plat&&!it.platinumCritical)return false;
  if(filters.miss&&!it.missable)return false;
  if(filters.hidedone&&state[it.id])return false;
  if(filters.hidebuy&&it.method==='purchase'&&!it.platinumCritical&&!it.missable)return false;
  if(filters.hideng&&it.ngPlusOnly)return false;
  if(Object.values(filters.cats).some(v=>v)&&!filters.cats[it.cat])return false;
  return true;
}
const region=r=>DATA.regions.find(x=>x.name===r);

// ---- render ----
function tags(it){
  let t='';
  if(it.legendary)t+='<span class="tag t-leg">Legendary</span>';
  if(it.platinumCritical&&!it.legendary)t+='<span class="tag t-plat">Platinum</span>';
  if(it.missable)t+='<span class="tag t-miss">⚠ Gated</span>';
  if(it.ngPlusOnly)t+='<span class="tag t-ng">NG+ only</span>';
  if(it.method==='purchase')t+='<span class="tag t-buy">Buy</span>';
  return t?`<span class="tags">${t}</span>`:'';
}
function itemRow(it){
  const ck=state[it.id]?'checked':'';
  const loc=[it.subarea,it.notes].filter(Boolean).map(esc).join(' — ');
  const gr=it.gateReason?`<div class="grsn">⚠ ${esc(it.gateReason)}</div>`:'';
  return `<label class="row ${it.missable?'miss':''} ${ck?'checked':''}" data-id="${it.id}">
    <input type="checkbox" class="cbx" ${ck} data-id="${it.id}">
    <span class="itxt"><span class="nm">${esc(it.name)}</span>${tags(it)}
    ${loc?`<div class="loc">${loc}</div>`:''}${gr}</span></label>`;
}
function questStepRow(it){
  const ck=state[it.id]?'checked':'';
  const where=it.subarea?`<span class="loc"> — ${esc(it.subarea)}</span>`:'';
  return `<label class="row qstep ${ck?'checked':''}" data-id="${it.id}">
    <input type="checkbox" class="cbx" ${ck} data-id="${it.id}">
    <span class="itxt"><span class="stepn">${esc(it.step||'')}</span>
    <span class="nm" style="font-size:12.5px">${esc(it.notes)}</span>${where}</span></label>`;
}
function questGroup(list){
  // group by giver, preserve step order within giver
  const order=[],by={};
  list.forEach(i=>{if(!by[i.questGiver]){by[i.questGiver]=[];order.push(i.questGiver);}by[i.questGiver].push(i);});
  return order.map(g=>{
    const its=by[g], m=its[0];
    const done=its.filter(i=>state[i.id]).length;
    const gate=m.questGate?`<div class="grsn">⚠ ${esc(m.questGate)}</div>`:'';
    const rew=m.questReward?`<div class="nt">Reward: ${esc(m.questReward)}</div>`:'';
    return `<div class="qgrp"><div class="qgrp-h">✦ ${esc(g)}
      <span class="qgrp-c">${done}/${its.length}</span></div>${rew}${gate}
      ${its.map(questStepRow).join('')}</div>`;
  }).join('');
}
function renderRegion(reg,idx){
  const vis=reg.items.filter(passes);
  const citems=reg.items.filter(i=>i.cat!=='quest'), qitems=reg.items.filter(i=>i.cat==='quest');
  const cDone=citems.filter(i=>state[i.id]).length, qDone=qitems.filter(i=>state[i.id]).length;
  const total=reg.items.length, done=cDone+qDone;
  const progTxt=`${cDone}/${citems.length} items`+(qitems.length?` · ${qDone}/${qitems.length} quest`:'');
  if(!vis.length && (filters.q||filters.plat||filters.miss||Object.values(filters.cats).some(v=>v)))return '';
  const open=openState[reg.name]!==false && (idx===undefined?true:openState[reg.name]);
  // group visible items by category
  const groups={};vis.forEach(i=>(groups[i.cat]=groups[i.cat]||[]).push(i));
  const cats=Object.keys(groups).sort((a,b)=>(CAT[a]?.o??9)-(CAT[b]?.o??9));
  let gatesHtml='';
  (reg.gates||[]).forEach(g=>{gatesHtml+=`<div class="gate"><b>⚠ Gate — ${esc(g.trigger)}</b>
    <div class="trig">${esc(g.description)}</div></div>`;});
  (reg.notes||[]).forEach(n=>{gatesHtml+=`<div class="note-info"><b>Note.</b> ${esc(n)}</div>`;});
  let inner=gatesHtml;
  cats.forEach(c=>{
    const body=c==='quest'?questGroup(groups[c]):groups[c].map(itemRow).join('');
    inner+=`<div class="cat"><div class="cat-h"><span>${CAT[c]?.l||c}</span>
      <span>${groups[c].filter(i=>state[i.id]).length}/${groups[c].length}</span></div>
      ${body}</div>`;
  });
  return `<section class="block ${open?'open':''}" id="reg-${idx}" data-region="${esc(reg.name)}">
    <div class="bhead"><span class="caret">▶</span><span class="bnum">${idx}</span>
      <span class="btitle">${esc(reg.name)}</span>
      <span class="bprog"><span class="bprog-t">${progTxt}</span>
      <span class="bprog-bar"><i style="width:${total?done/total*100:0}%"></i></span></span></div>
    <div class="body">${inner||'<div class="empty">Nothing here in this filter.</div>'}</div></section>`;
}
function renderTrophies(){
  const a=DATA.achievements;const done=a.filter(t=>state['ach-'+t.name]).length;
  const open=openState['__trophies']!==false;
  const rows=a.map(t=>{const id='ach-'+t.name;const ck=state[id]?'checked':'';
    return `<label class="row ${ck?'checked':''}"><input type="checkbox" class="cbx" ${ck} data-id="${id}">
    <span class="itxt"><span class="nm">${esc(t.name)}</span>
    <div class="loc">${esc(t.requirement)}</div></span></label>`;}).join('');
  return `<section class="block ${open?'open':''}" id="reg-T" data-region="__trophies">
    <div class="bhead"><span class="caret">▶</span><span class="bnum" style="background:var(--plat)">★</span>
    <span class="btitle">Platinum Trophies</span>
    <span class="bprog"><span class="bprog-t">${done}/42</span>
    <span class="bprog-bar"><i style="width:${done/42*100}%;background:var(--plat)"></i></span></span></div>
    <div class="body">${rows}</div></section>`;
}
function renderEndings(){
  const e=DATA.endings;if(!e)return '';
  const open=openState['__endings']===true;
  let opts=(e.options||[]).map(o=>`<div class="ending"><h3>${esc(o.name)}</h3>
    ${o.prereq?`<div class="nt" style="margin-bottom:4px">Prereq: ${esc(o.prereq)}</div>`:''}
    <div>${esc(o.steps)}</div></div>`).join('');
  return `<section class="block ${open?'open':''}" id="reg-E" data-region="__endings">
    <div class="bhead"><span class="caret">▶</span><span class="bnum" style="background:var(--miss)">⚑</span>
    <span class="btitle">Endings &amp; Save-Scum</span></div>
    <div class="body">${e.savePoint?`<div class="gate"><b>⚠ Back up your save</b>
      <div class="trig">${esc(e.savePoint)}</div></div>`:''}
      ${e.note?`<div class="note-info">${esc(e.note)}</div>`:''}${opts}</div></section>`;
}
function renderQuests(){
  if(!DATA.quests||!DATA.quests.length)return '';
  const open=openState['__quests']===true;
  const q=DATA.quests.map(ql=>{
    const done=ql.steps.filter(s=>state[s.id]).length;
    const steps=ql.steps.map(s=>{const ck=state[s.id]?'checked':'';
      return `<label class="step row ${ck?'checked':''}" data-id="${s.id}">
      <input type="checkbox" class="cbx" ${ck} data-id="${s.id}"><span class="stepn">${esc(s.step)}</span>
      <span class="itxt"><span class="nm" style="font-size:12.5px">${esc(s.text)}</span>
      ${s.location?`<div class="loc">${esc(s.location)}</div>`:''}</span></label>`;}).join('');
    return `<details class="quest"><summary>◈ ${esc(ql.giver)} <span class="sn-badge">${done}/${ql.steps.length}</span>
      ${ql.reward?`<span class="qreward">${esc(ql.reward)}</span>`:''}</summary>
      <div class="qbody">${ql.gate?`<div class="gate"><b>⚠ Don't lock it out</b>
        <div class="trig">${esc(ql.gate)}</div></div>`:''}${steps}</div></details>`;}).join('');
  return `<section class="block ${open?'open':''}" id="reg-Q" data-region="__quests">
    <div class="bhead"><span class="caret">▶</span><span class="bnum" style="background:var(--blue)">✦</span>
    <span class="btitle">NPC Questlines</span></div><div class="body">${q}</div></section>`;
}
function renderNav(){
  let h='<div class="sn-label">Overview</div>';
  h+=`<div class="sn-item" data-go="reg-T">★ Trophies<span class="sn-badge">${DATA.achievements.filter(t=>state['ach-'+t.name]).length}/42</span></div>`;
  h+=`<div class="sn-item" data-go="reg-E">⚑ Endings / Save-scum</div>`;
  if(DATA.quests?.length)h+=`<div class="sn-item" data-go="reg-Q">✦ Questlines</div>`;
  h+='<div class="sn-label">Route</div>';
  DATA.regions.forEach((r,i)=>{const d=r.items.filter(x=>state[x.id]).length,t=r.items.length;
    const mg=(r.gates?.length||0);
    h+=`<div class="sn-item ${d===t&&t?'done':''}" data-go="reg-${i+1}">
      <span>${esc(r.name)}${mg?' <span style="color:var(--miss)">⚠</span>':''}</span>
      <span class="sn-badge">${d}/${t}</span></div>`;});
  document.getElementById('sidenav').innerHTML=h;
}
function renderCats(){
  const row=document.getElementById('catrow');
  row.innerHTML=Object.keys(CAT).sort((a,b)=>CAT[a].o-CAT[b].o).map(c=>
    `<span class="chip ${filters.cats[c]?'on':''}" data-cat="${c}">${CAT[c].l}</span>`).join('');
}
function renderMain(){
  let h='';
  if(DATA.platinumNote)h+=`<div class="intro"><b>★ Platinum</b> ${esc(DATA.platinumNote)}</div>`;
  h+=renderTrophies()+renderEndings()+renderQuests();
  DATA.regions.forEach((r,i)=>h+=renderRegion(r,i+1));
  document.getElementById('main').innerHTML=h;
}
function updateStats(){
  const all=DATA.regions.flatMap(r=>r.items);
  const col=all.filter(i=>i.cat!=='quest'), q=all.filter(i=>i.cat==='quest');
  const colDone=col.filter(i=>state[i.id]).length, qDone=q.filter(i=>state[i.id]).length;
  const missLeft=all.filter(i=>i.missable&&!state[i.id]).length;
  const plat=DATA.achievements.filter(t=>state['ach-'+t.name]).length;
  document.getElementById('s-items').textContent=colDone+'/'+col.length;
  document.getElementById('s-quests').textContent=qDone+'/'+q.length;
  document.getElementById('s-plat').textContent=plat+'/42';
  document.getElementById('s-miss').textContent=missLeft;
  document.getElementById('gbar-fill').style.width=(col.length?colDone/col.length*100:0)+'%';
}
function renderAll(){renderMain();renderNav();updateStats();
  document.querySelectorAll('.chip[data-f]').forEach(c=>c.classList.toggle('on',filters[c.dataset.f]));}

// ---- events ----
document.addEventListener('change',e=>{
  if(e.target.classList.contains('cbx')){const id=e.target.dataset.id;
    if(e.target.checked)state[id]=1;else delete state[id];save();
    // sync every checkbox sharing this id (a quest step shows in its region AND the questline view)
    document.querySelectorAll('.cbx[data-id="'+(window.CSS&&CSS.escape?CSS.escape(id):id)+'"]').forEach(cb=>{
      cb.checked=e.target.checked;const r=cb.closest('.row');if(r)r.classList.toggle('checked',e.target.checked);});
    updateStats();renderNav();
    // if hide-checked active, re-render to drop it
    if(filters.hidedone)renderMain();}
});
document.addEventListener('click',e=>{
  const head=e.target.closest('.bhead');
  if(head){const blk=head.parentElement;blk.classList.toggle('open');
    openState[blk.dataset.region]=blk.classList.contains('open');saveO();return;}
  const fc=e.target.closest('.chip[data-f]');
  if(fc){filters[fc.dataset.f]=!filters[fc.dataset.f];saveF();renderAll();return;}
  const cc=e.target.closest('.chip[data-cat]');
  if(cc){filters.cats[cc.dataset.cat]=!filters.cats[cc.dataset.cat];saveF();renderCats();renderMain();return;}
  const nav=e.target.closest('[data-go]');
  if(nav){const el=document.getElementById(nav.dataset.go);
    if(el){el.classList.add('open');const b=el.dataset.region;openState[b]=true;saveO();
      el.scrollIntoView({behavior:'smooth',block:'start'});}return;}
  if(e.target.id==='catbtn'){document.getElementById('catrow').classList.toggle('hidden');return;}
});
document.getElementById('search').addEventListener('input',e=>{filters.q=e.target.value;saveF();renderMain();});
document.getElementById('expand').onclick=()=>{DATA.regions.forEach(r=>openState[r.name]=true);
  ['__trophies','__endings','__quests'].forEach(k=>openState[k]=true);saveO();renderMain();};
document.getElementById('collapse').onclick=()=>{document.querySelectorAll('.block').forEach(b=>openState[b.dataset.region]=false);saveO();renderMain();};
document.getElementById('export').onclick=()=>{
  const blob=new Blob([JSON.stringify(state)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='er-tracker-progress.json';a.click();};
document.getElementById('import').onclick=()=>{
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=()=>{const f=i.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{state=JSON.parse(r.result);save();renderAll();}catch(err){alert('Bad file: '+err)}};
    r.readAsText(f);};i.click();};

renderCats();
document.getElementById('search').value=filters.q||'';
renderAll();
</script>
</body>
