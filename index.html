<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elden Ring — Full Collectible Route</title>
<style>
:root {
  --gold: #c9a84c;
  --gold-dim: #7a6030;
  --gold-glow: rgba(201,168,76,0.12);
  --bg: #0d0c0a;
  --surface: #141210;
  --surface2: #1c1a16;
  --border: #2a2620;
  --text: #d4cfc4;
  --text-dim: #6a6460;
  --text-bright: #ede8dc;
  --miss: #c44040;
  --miss-bg: #1a0000;
  --warn: #c4902a;
  --warn-bg: #1a1200;
  --green: #4a9e5c;
  --green-bg: #001a08;
  --blue: #5a8fc4;
  --blue-bg: #001020;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: Georgia, serif; font-size: 14px; line-height: 1.5; }

/* HEADER */
header {
  background: linear-gradient(180deg,#1a1610 0%,var(--bg) 100%);
  border-bottom: 1px solid var(--gold-dim);
  padding: 18px 24px 14px;
  display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 20px; color: var(--gold); letter-spacing:.15em; text-transform:uppercase; font-weight:normal; text-shadow:0 0 20px rgba(201,168,76,.4); }
header p { color:var(--text-dim); font-size:11px; letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }
.hdr-stats { display:flex; gap:16px; margin-left:auto; flex-wrap:wrap; }
.hdr-stat { text-align:center; }
.hdr-stat .n { font-size:18px; color:var(--gold); font-weight:bold; display:block; line-height:1; }
.hdr-stat .l { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.07em; display:block; margin-top:2px; }
.hdr-right { display:flex; gap:8px; align-items:center; }
.btn { padding:5px 11px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); cursor:pointer; font-size:11px; letter-spacing:.06em; text-transform:uppercase; border-radius:2px; font-family:inherit; transition:all .1s; }
.btn:hover { border-color:var(--gold-dim); color:var(--gold); }
.btn.danger:hover { border-color:var(--miss); color:var(--miss); }

/* LAYOUT */
.layout { display:flex; min-height:calc(100vh - 90px); }

/* SIDEBAR NAV */
.sidenav {
  width:200px; min-width:200px; background:var(--surface); border-right:1px solid var(--border);
  position:sticky; top:90px; height:calc(100vh - 90px); overflow-y:auto; padding:12px 0;
}
.sidenav::-webkit-scrollbar { width:4px; }
.sidenav::-webkit-scrollbar-thumb { background:var(--border); }
.sn-label { padding:8px 14px 3px; font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; }
.sn-item {
  padding:6px 14px; cursor:pointer; font-size:12px; color:var(--text-dim);
  border-left:2px solid transparent; transition:all .1s; display:flex; justify-content:space-between; align-items:center;
}
.sn-item:hover { background:var(--surface2); color:var(--text); }
.sn-item.active { color:var(--gold); border-left-color:var(--gold); background:var(--gold-glow); }
.sn-badge { font-size:10px; background:var(--surface2); color:var(--text-dim); padding:1px 5px; border-radius:8px; }
.sn-item.active .sn-badge { background:var(--gold-glow); color:var(--gold); }
.sn-sep { border:none; border-top:1px solid var(--border); margin:8px 0; }

/* MAIN CONTENT */
.main { flex:1; padding:0; overflow-y:auto; }

/* AREA BLOCKS */
.area-block {
  border-bottom: 1px solid var(--border);
  scroll-margin-top: 90px;
}
.area-header {
  padding: 16px 24px 12px;
  background: var(--surface);
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  user-select: none;
  transition: background .1s;
}
.area-header:hover { background: var(--surface2); }
.area-num {
  background: var(--gold-dim); color: var(--bg);
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:bold; flex-shrink:0;
}
.area-title { font-size:16px; color:var(--text-bright); letter-spacing:.05em; font-weight:normal; }
.area-subtitle { font-size:11px; color:var(--text-dim); margin-top:2px; }
.area-progress { margin-left:auto; display:flex; align-items:center; gap:10px; }
.area-prog-text { font-size:11px; color:var(--text-dim); white-space:nowrap; }
.area-prog-bar { width:80px; height:4px; background:var(--border); border-radius:2px; }
.area-prog-fill { height:4px; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); border-radius:2px; transition:width .3s; }
.expand-icon { color:var(--text-dim); font-size:14px; margin-left:8px; transition:transform .2s; }
.area-header.open .expand-icon { transform:rotate(180deg); }

.area-body { display:none; padding:16px 24px 20px; }
.area-body.open { display:block; }

/* STORY NOTES */
.story-note {
  background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--gold);
  padding:10px 14px; margin-bottom:14px; border-radius:2px; font-size:13px;
}
.story-note strong { color:var(--gold); }

.miss-note {
  background:var(--miss-bg); border:1px solid #3a0000; border-left:3px solid var(--miss);
  padding:9px 14px; margin-bottom:12px; border-radius:2px; font-size:12px; color:#d07070;
}
.miss-note strong { color:var(--miss); }

.warn-note {
  background:var(--warn-bg); border:1px solid #3a2000; border-left:3px solid var(--warn);
  padding:9px 14px; margin-bottom:12px; border-radius:2px; font-size:12px; color:#d0a060;
}
.warn-note strong { color:var(--warn); }

/* CHECKLIST */
.cat-section { margin-bottom:14px; }
.cat-label {
  font-size:10px; color:var(--gold-dim); text-transform:uppercase; letter-spacing:.12em;
  padding:6px 0 4px; border-bottom:1px solid var(--border); margin-bottom:4px;
  display:flex; justify-content:space-between; align-items:center;
}
.cat-label-count { font-size:10px; color:var(--text-dim); }

.check-item {
  display:flex; align-items:flex-start; gap:9px; padding:5px 8px; border-radius:2px;
  cursor:pointer; transition:background .1s; border:1px solid transparent;
  border-left:2px solid transparent; user-select:none;
}
.check-item:hover { background:var(--surface2); }
.check-item.done { opacity:.4; }
.check-item.done .item-text { text-decoration:line-through; color:var(--text-dim); }
.check-item.miss { border-left-color:var(--miss); }
.check-item.warn { border-left-color:var(--warn); }

.cb {
  width:15px; height:15px; border:1px solid var(--gold-dim); border-radius:2px;
  flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center;
  transition:all .1s;
}
.check-item.done .cb { background:var(--green-bg); border-color:var(--green); }
.check-item.done .cb::after { content:'✓'; color:var(--green); font-size:11px; }

.item-body { flex:1; }
.item-text { font-size:13px; color:var(--text); }
.item-note { font-size:11px; color:var(--text-dim); font-style:italic; margin-top:1px; }
.miss-tag { font-size:9px; background:var(--miss-bg); color:var(--miss); padding:1px 5px; border-radius:3px; flex-shrink:0; margin-top:2px; }
.warn-tag { font-size:9px; background:var(--warn-bg); color:var(--warn); padding:1px 5px; border-radius:3px; flex-shrink:0; margin-top:2px; }

/* LEGEND */
.legend { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:12px; font-size:11px; }
.leg { display:flex; align-items:center; gap:5px; color:var(--text-dim); }
.leg-bar { width:3px; height:14px; border-radius:1px; }

/* SCROLLBAR */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

@media(max-width:700px) { .sidenav { display:none; } }
</style>
</head>

// ══════════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════════

const CAT_LABELS = {
  weapon:'Weapons', armor:'Armor & Sets', spell:'Spells & Incantations',
  catalyst:'Catalysts / Staves / Seals', talisman:'Talismans', ash:'Ashes of War',
  spirit:'Spirit Ashes', stone:'Smithing Stones & Bell Bearings', key:'Key Items / Quest', npc:'NPC / Quest Notes'
};

const CAT_ORDER = ['weapon','armor','spell','catalyst','talisman','ash','spirit','stone','key','npc'];

function groupItems(items) {
  const groups = {};
  items.forEach(item => {
    if (!groups[item.cat]) groups[item.cat] = [];
    groups[item.cat].push(item);
  });
  return groups;
}

function makeItem(item) {
  const done = !!state[item.id];
  const div = document.createElement('div');
  div.className = 'check-item' + (done?' done':'') + (item.miss?' miss':'') + (item.warn?' warn':'');
  div.id = 'ci-'+item.id;
  div.onclick = () => {
    state[item.id] = !state[item.id];
    div.classList.toggle('done', state[item.id]);
    localStorage.setItem(SK, JSON.stringify(state));
    updateStats();
    updateAreaProgress(item.id);
  };

  const cb = document.createElement('div'); cb.className = 'cb';
  const body = document.createElement('div'); body.className = 'item-body';
  const text = document.createElement('div'); text.className = 'item-text'; text.textContent = item.text;
  body.appendChild(text);
  if (item.note) {
    const note = document.createElement('div'); note.className = 'item-note'; note.textContent = item.note;
    body.appendChild(note);
  }

  div.appendChild(cb);
  div.appendChild(body);

  if (item.miss) {
    const tag = document.createElement('div'); tag.className = 'miss-tag'; tag.textContent = '⚠ MISS';
    div.appendChild(tag);
  } else if (item.warn) {
    const tag = document.createElement('div'); tag.className = 'warn-tag'; tag.textContent = '⚡ WARN';
    div.appendChild(tag);
  }

  return div;
}

function makeArea(area, idx) {
  const total = area.items.length;
  const done = area.items.filter(i => state[i.id]).length;
  const pct = total ? Math.round(done/total*100) : 0;

  const block = document.createElement('div');
  block.className = 'area-block';
  block.id = 'area-'+area.id;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'area-header';
  hdr.innerHTML = `
    <div class="area-num">${String(idx+1).padStart(2,'0')}</div>
    <div>
      <div class="area-title">${area.name}</div>
      <div class="area-subtitle">${area.subtitle}</div>
    </div>
    <div class="area-progress">
      <span class="area-prog-text" id="prog-text-${area.id}">${done}/${total}</span>
      <div class="area-prog-bar"><div class="area-prog-fill" id="prog-fill-${area.id}" style="width:${pct}%"></div></div>
    </div>
    <span class="expand-icon">▾</span>
  `;

  const body = document.createElement('div');
  body.className = 'area-body';

  if (area.story) {
    const sn = document.createElement('div'); sn.className = 'story-note';
    sn.innerHTML = area.story;
    body.appendChild(sn);
  }
  if (area.miss) {
    const mn = document.createElement('div'); mn.className = 'miss-note';
    mn.innerHTML = '<strong>⚠ Missables:</strong> ' + area.miss;
    body.appendChild(mn);
  }
  if (area.warn) {
    const wn = document.createElement('div'); wn.className = 'warn-note';
    wn.innerHTML = '<strong>⚡ Before moving on:</strong> ' + area.warn;
    body.appendChild(wn);
  }

  // Legend
  const leg = document.createElement('div'); leg.className = 'legend';
  leg.innerHTML = '<div class="leg"><div class="leg-bar" style="background:var(--miss)"></div>Missable</div>';
  body.appendChild(leg);

  // Group items by category
  const groups = groupItems(area.items);
  CAT_ORDER.forEach(cat => {
    if (!groups[cat]) return;
    const sec = document.createElement('div'); sec.className = 'cat-section';
    const lbl = document.createElement('div'); lbl.className = 'cat-label';
    const missCount = groups[cat].filter(i=>i.miss).length;
    lbl.innerHTML = `${CAT_LABELS[cat] || cat} <span class="cat-label-count">${groups[cat].length}${missCount?` · <span style="color:var(--miss)">${missCount} missable</span>`:''}`;
    sec.appendChild(lbl);
    groups[cat].forEach(item => sec.appendChild(makeItem(item)));
    body.appendChild(sec);
  });

  hdr.onclick = () => {
    const open = body.classList.toggle('open');
    hdr.classList.toggle('open', open);
  };

  block.appendChild(hdr);
  block.appendChild(body);
  return block;
}

function buildSidebar() {
  const nav = document.getElementById('sidenav');
  nav.innerHTML = '<div class="sn-label">Areas</div>';
  AREAS.forEach((area, idx) => {
    const item = document.createElement('div');
    item.className = 'sn-item';
    item.id = 'sn-'+area.id;
    const done = area.items.filter(i=>state[i.id]).length;
    const total = area.items.length;
    item.innerHTML = `<span>${String(idx+1).padStart(2,'0')}. ${area.name.split('—')[0].split('&')[0].trim()}</span><span class="sn-badge" id="snb-${area.id}">${done}/${total}</span>`;
    item.onclick = () => {
      document.getElementById('area-'+area.id).scrollIntoView({behavior:'smooth'});
    };
    nav.appendChild(item);
  });
}

function updateStats() {
  let done=0, total=0;
  AREAS.forEach(a => {
    total += a.items.length;
    done += a.items.filter(i=>state[i.id]).length;
  });
  document.getElementById('hd').textContent = done;
  document.getElementById('ht').textContent = total;
  document.getElementById('hp').textContent = Math.round(done/total*100)+'%';
}

function updateAreaProgress(itemId) {
  AREAS.forEach(area => {
    if (!area.items.find(i=>i.id===itemId)) return;
    const done = area.items.filter(i=>state[i.id]).length;
    const total = area.items.length;
    const pct = Math.round(done/total*100);
    const pt = document.getElementById('prog-text-'+area.id);
    const pf = document.getElementById('prog-fill-'+area.id);
    const sb = document.getElementById('snb-'+area.id);
    if(pt) pt.textContent = done+'/'+total;
    if(pf) pf.style.width = pct+'%';
    if(sb) sb.textContent = done+'/'+total;
  });
}

function expandAll() { document.querySelectorAll('.area-body').forEach(b=>{ b.classList.add('open'); b.previousElementSibling.classList.add('open'); }); }
function collapseAll() { document.querySelectorAll('.area-body').forEach(b=>{ b.classList.remove('open'); b.previousElementSibling.classList.remove('open'); }); }

// INIT
const main = document.getElementById('main');
AREAS.forEach((area, idx) => main.appendChild(makeArea(area, idx)));
buildSidebar();
updateStats();
</script>
