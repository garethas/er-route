<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elden Ring — Platinum Route Tracker</title>
<style>
:root{
  --gold:#c9a84c; --gold-dim:#7a6030; --gold-glow:rgba(201,168,76,.12);
  --bg:#0d0c0a; --surface:#141210; --surface2:#1c1a16; --border:#2a2620;
  --text:#d4cfc4; --text-dim:#6a6460; --text-bright:#ede8dc;
  --miss:#d24a4a; --miss-bg:#1c0808; --miss-border:#5a1e1e;
  --warn:#c4902a; --green:#4a9e5c; --blue:#5a8fc4; --plat:#8a6fc4;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;font-size:14px;line-height:1.5}
a{color:var(--gold)}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,#1a1610,#0d0c0a);
  border-bottom:1px solid var(--gold-dim);padding:12px 20px 10px}
.hrow{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
header h1{font-size:17px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;font-weight:normal;text-shadow:0 0 20px rgba(201,168,76,.4)}
.stats{display:flex;gap:18px;margin-left:auto;flex-wrap:wrap}
.stat{text-align:center;min-width:64px}
.stat .n{font-size:16px;color:var(--gold);font-weight:bold;display:block;line-height:1.1}
.stat .n.plat{color:var(--plat)}
.stat .l{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.09em}
.gbar{height:5px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}
.gbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));width:0;transition:width .3s}

/* TOOLBAR */
.toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:9px}
.chip{padding:4px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);
  cursor:pointer;font-size:11px;letter-spacing:.04em;border-radius:12px;font-family:inherit;user-select:none;white-space:nowrap;transition:all .1s}
.chip:hover{border-color:var(--gold-dim);color:var(--text)}
.chip.on{background:var(--gold-glow);border-color:var(--gold);color:var(--gold)}
.chip.miss.on{background:var(--miss-bg);border-color:var(--miss);color:var(--miss)}
.chip.plat.on{background:rgba(138,111,196,.14);border-color:var(--plat);color:var(--plat)}
.sep{width:1px;height:20px;background:var(--border);margin:0 3px}
#search{flex:1;min-width:140px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);
  color:var(--text);border-radius:3px;font-family:inherit;font-size:12px}
#search:focus{outline:none;border-color:var(--gold-dim)}
.btn{padding:4px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);
  cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-radius:2px;font-family:inherit}
.btn:hover{border-color:var(--gold-dim);color:var(--gold)}

/* LAYOUT */
.layout{display:flex;min-height:100vh}
.sidenav{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);
  position:sticky;top:0;align-self:flex-start;height:100vh;overflow-y:auto;padding:10px 0}
.sidenav::-webkit-scrollbar{width:5px}.sidenav::-webkit-scrollbar-thumb{background:var(--border)}
.sn-label{padding:9px 14px 3px;font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.11em}
.sn-item{padding:5px 14px;cursor:pointer;font-size:12px;color:var(--text-dim);border-left:2px solid transparent;
  display:flex;justify-content:space-between;gap:6px;align-items:center;transition:all .1s}
.sn-item:hover{background:var(--surface2);color:var(--text)}
.sn-item.done{color:var(--green)}
.sn-badge{font-size:9px;background:var(--surface2);color:var(--text-dim);padding:1px 5px;border-radius:8px;white-space:nowrap}
.main{flex:1;min-width:0;padding:0 0 60px}

/* SECTIONS / REGIONS */
.block{border-bottom:1px solid var(--border);scroll-margin-top:2px}
.bhead{padding:13px 20px;background:var(--surface);cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none}
.bhead:hover{background:var(--surface2)}
.bnum{background:var(--gold-dim);color:var(--bg);width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0}
.btitle{font-size:15px;color:var(--text-bright);letter-spacing:.03em}
.bprog{margin-left:auto;display:flex;align-items:center;gap:10px}
.bprog-t{font-size:11px;color:var(--text-dim);white-space:nowrap}
.bprog-bar{width:70px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.bprog-bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));width:0}
.caret{color:var(--text-dim);transition:transform .2s}
.block.open .caret{transform:rotate(90deg)}
.body{display:none;padding:6px 20px 18px}
.block.open .body{display:block}

/* GATE BANNER */
.gate{background:var(--miss-bg);border:1px solid var(--miss-border);border-left:4px solid var(--miss);
  padding:9px 12px;margin:10px 0;border-radius:3px;font-size:13px}
.gate b{color:var(--miss);text-transform:uppercase;letter-spacing:.04em;font-size:11px}
.gate .trig{color:var(--text-bright)}
.note-info{background:var(--surface);border-left:3px solid var(--gold);padding:8px 12px;margin:10px 0;border-radius:3px;font-size:12.5px}
.note-info b{color:var(--gold)}

/* CATEGORY + ITEM ROWS */
.cat{margin-top:14px}
.cat-h{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;
  border-bottom:1px solid var(--border);padding-bottom:3px;margin-bottom:2px;display:flex;justify-content:space-between}
.row{display:flex;gap:9px;padding:5px 4px;border-bottom:1px solid rgba(42,38,32,.5);align-items:baseline}
.row:hover{background:var(--surface)}
.row.miss{background:var(--miss-bg)}
.row.miss:hover{background:#230a0a}
.row.checked{opacity:.42}
.row.checked .nm{text-decoration:line-through}
.cbx{appearance:none;width:16px;height:16px;border:1px solid var(--gold-dim);border-radius:3px;
  background:var(--surface);cursor:pointer;flex-shrink:0;position:relative;top:2px}
.cbx:checked{background:var(--gold);border-color:var(--gold)}
.cbx:checked::after{content:'✓';position:absolute;color:var(--bg);font-size:12px;left:2px;top:-3px;font-weight:bold}
.itxt{flex:1;min-width:0}
.nm{color:var(--text-bright);font-size:13.5px}
.loc{color:var(--text-dim);font-size:12px}
.nt{color:var(--text-dim);font-size:11.5px;font-style:italic}
.grsn{color:var(--miss);font-size:11.5px;margin-top:1px}
.tags{display:inline-flex;gap:4px;margin-left:6px;vertical-align:middle}
.tag{font-size:9px;padding:1px 5px;border-radius:3px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.t-leg{background:rgba(201,168,76,.16);color:var(--gold);border:1px solid var(--gold-dim)}
.t-miss{background:var(--miss-bg);color:var(--miss);border:1px solid var(--miss-border);font-weight:bold}
.t-plat{background:rgba(138,111,196,.16);color:var(--plat);border:1px solid #4a3a6a}
.t-ng{background:rgba(90,143,196,.14);color:var(--blue);border:1px solid #2a4a6a}
.t-buy{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}

/* QUESTS */
.quest{border:1px solid var(--border);border-radius:4px;margin:12px 0;background:var(--surface)}
.quest>summary{padding:10px 14px;cursor:pointer;font-size:14px;color:var(--text-bright);list-style:none;display:flex;gap:10px;align-items:center}
.quest>summary::-webkit-details-marker{display:none}
.quest[open]>summary{border-bottom:1px solid var(--border)}
.qreward{font-size:11px;color:var(--gold);margin-left:auto}
.qbody{padding:6px 14px 12px}
.step{display:flex;gap:9px;padding:5px 2px;border-bottom:1px solid rgba(42,38,32,.5);align-items:baseline}
.stepn{color:var(--gold-dim);font-size:11px;min-width:20px}

/* ENDINGS */
.ending{border:1px solid var(--gold-dim);border-radius:4px;padding:12px 16px;margin:12px 0;background:var(--surface)}
.ending h3{color:var(--gold);font-size:14px;font-weight:normal;letter-spacing:.05em;margin-bottom:5px}
.intro{margin:14px 20px 4px;padding:11px 14px;background:linear-gradient(180deg,rgba(138,111,196,.14),var(--surface));
  border:1px solid #4a3a6a;border-left:4px solid var(--plat);border-radius:4px;font-size:13px;color:var(--text)}
.intro b{color:var(--plat);text-transform:uppercase;letter-spacing:.05em;font-size:11px}
.hidden{display:none!important}
.empty{color:var(--text-dim);font-style:italic;padding:20px;text-align:center}
@media(max-width:760px){.sidenav{display:none}.stats{width:100%;justify-content:space-around;margin:6px 0 0}}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <h1>◈ Elden Ring — Platinum Route</h1>
    <div class="stats">
      <div class="stat"><span class="n" id="s-done">0</span><span class="l">Checked</span></div>
      <div class="stat"><span class="n" id="s-total">0</span><span class="l">Total</span></div>
      <div class="stat"><span class="n plat" id="s-plat">0/42</span><span class="l">Trophies</span></div>
      <div class="stat"><span class="n miss" id="s-miss" style="color:var(--miss)">0</span><span class="l">Gated left</span></div>
    </div>
  </div>
  <div class="gbar"><i id="gbar-fill"></i></div>
  <div class="toolbar">
    <input id="search" placeholder="Search items, locations, notes…">
    <span class="chip plat" data-f="plat">★ Platinum only</span>
    <span class="chip miss" data-f="miss">⚠ Gated/missable only</span>
    <span class="chip" data-f="hidedone">Hide checked</span>
    <span class="chip" data-f="hidebuy">Hide merchant-buys</span>
    <span class="chip" data-f="hideng">Hide NG+ only</span>
    <span class="sep"></span>
    <span class="chip" id="catbtn">Categories ▾</span>
    <span class="sep"></span>
    <button class="btn" id="expand">Expand all</button>
    <button class="btn" id="collapse">Collapse all</button>
    <button class="btn" id="export">Export</button>
    <button class="btn" id="import">Import</button>
  </div>
  <div class="toolbar hidden" id="catrow"></div>
</header>
<div class="layout">
  <nav class="sidenav" id="sidenav"></nav>
  <main class="main" id="main"></main>
</div>

membrance of the Full Moon Queen", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "sorcery-rykard-s-rancor-roundtable-hold", "cat": "sorcery", "name": "Rykard's Rancor", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Purchased from Enia with the Remembrance of the Blasphemous", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "incantation-black-flame-s-protection-roundtable-hold", "cat": "incantation", "name": "Black Flame's Protection", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Given by Gideon Ofnier after telling him about the secret medalion", "method": "quest", "legendary": false, "platinumCritical": false}, {"id": "incantation-catch-flame-roundtable-hold", "cat": "incantation", "name": "Catch Flame", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Purchased from Brother Corhyn (also a starting item for the Prophet class)", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "incantation-cure-poison-roundtable-hold", "cat": "incantation", "name": "Cure Poison", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Purchased from Brother Corhyn", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "incantation-flame-fortification-roundtable-hold", "cat": "incantation", "name": "Flame Fortification", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Purchased from Brother Corhyn", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "incantation-flame-sling-roundtable-hold", "cat": "incantation", "name": "Flame Sling", "region": "Roundtable Hold", "subarea": "", "location": "Roundtable Hold", "notes": "Purchased from Brother Corhyn", "method": "purchase", "legendary": false, "platinumCritical": false}, {"id": "incantation-fortissax-s-lightning-spear-roun Blaidd & Ranni", "reward": "Dark Moon Greatsword (Legendary), Black Knife Tiche (Legendary Ash), Carian Filigreed Crest, Snow Witch Set + the Age of the Stars ending", "gate": "Long multi-region chain (Ranni → Nokron → Nokstella → Ainsel → Lake of Rot → Moonlight Altar). Must be fully complete (place the Dark Moon Ring, receive the greatsword) before the Elden Beast to keep Age of the Stars. Beat Radahn to open Nokron for the Fingerslayer Blade.", "steps": [{"step": "1", "location": "Church of Elleh in Limgrave", "text": "Ranni will appear in this church as \"Renna\" after you receive Torrent from Melina (nighttime only). Speak to her and she will give you the Spirit Calling Bell and the Lone Wolf Ashes*"}]}, {"giver": "Boc the Seamster", "reward": "Sewing Needle + Tailoring Tools (free armor alterations), 'My Lord' gesture", "gate": "Final branch at East Capital Rampart: use Prattling Pate 'You're Beautiful' so he lives (best outcome). Giving a Larval Tear or doing nothing kills/loses him. No unique corpse reward.", "steps": [{"step": "1", "location": "East of Limgrave Telescope", "text": "Listen for his voice coming from a tree near the Limgrave telescope - simply roll into the tree to reveal him, then exhaust his dialogue"}]}, {"giver": "Bloody Finger Hunter Yura", "reward": "Nagakiba, Ash of War: Raptor of the Mists, Eleonora's Poleblade", "gate": "Raptor of the Mists is fragile — lost if Yura reaches the Second Church of Marika (i.e. you enter Altus) before finishing his Raya Lucaria co-op step. Nagakiba is effectively never lost.", "steps": [{"step": "1", "location": "Seaside Ruins Site of Grace in Limgrave", "text": "(Optional) Yura can initially be met under a ruined overpass next to the Site of Grace. Speak to him and he will warn you about the dragon in Agheel Lake to the north"}]}, {"giver": "D Hunter of the Dead", "reward": "Twinned Set, D's Bell Bearing, Inseparable Sword (brother path), Inner Order gesture", "gate": "Hand the COMPLETE Twinned Set to D's brother in Nokron — selling/splitting it permanently loses the Inseparable Sword. All co-obtainable with Fia's rewards in one run.", "steps": [{"step": "1", "location": "Summonwater Village Outskirts Site of Grace in Limgrave", "text": "(Optional) You can find D, Hunter of the Dead kneeling over a corpse by the road west of the Site of Grace, speak with him"}]}, {"giver": "Queen of Limgrave", "reward": "Ash of War: Bloody Slash, Erdsteel Dagger (from Kenneth), + the 'Queen of Limgrave' outcome", "gate": "Killing Kenneth forfeits the Erdsteel Dagger (dialogue-gated). The ending outcome triggers after Morgott in Godrick's throne room; killing Nepheli/Gostoc or burning the Erdtree fails it.", "steps": [{"step": "1", "location": "Mistwood Outskirts Site of Grace in Limgrave", "text": "You can find Kenneth standing on top of a large ruin structure acting as a bridge. Speak to him and he will ask you to clear Fort Haight for him, accept his request"}]}, {"giver": "Sorceress Sellen", "reward": "Comet Azur, Stars of Ruin (Legendary, via Lusat), Witch's Glintstone Crown; then Glintstone Kris OR Sellen's Bell Bearing (finale is mutually exclusive)", "gate": "Order matters: beat Rennala, then Radahn + talk to Jerren, before the Primal Glintstone transplant appears. Get the Sellian Sealbreaker before her dialogue closes or Stars of Ruin is lost. Finale rewards are mutually exclusive (two runs for both).", "steps": [{"step": "1", "location": "Waypoint Ruins in Limgrave", "text": "After defeating the Mad Pumpkin Head, Sellen's spectral body will offer to teach you Sorceries, and if you accept she will sell you her wares"}]}, {"giver": "Patches", "reward": "Grovel for Mercy gesture, Magma Whip Candlestick (Volcano Manor), Dancer's Castanets, Patches' Bell Bearing (only if killed)", "gate": "Magma Whip Candlestick has no fallback — complete the Tragoth contract and grab it before Patches leaves the manor (killing Rykard makes him leave).", "steps": [{"step": "1", "location": "Murkwater Cave in Limgrave", "text": "Fight Patches and spare him when he surrenders to receive the Grovel For Mercy gesture, as well as offer his wares"}]}, {"giver": "Lord of Frenzy", "reward": "Frenzied Flame Seal, Frenzyflame Stone x5, 'As You Wish' gesture + path to the Lord of Frenzied Flame ending", "gate": "Hyetta's chain. Don't kill Irina early (stops Hyetta spawning). Touching the Three Fingers is the point of no return — reversible only via Miquella's Needle. Save-scum it (do it last).", "steps": [{"step": "1", "location": "Bridge of Sacrifice Site of Grace in Weeping Peninsula", "text": "Irinia can be found sitting by the road near the Site of Grace, speak with her and receive Irina's Letter"}]}, {"giver": "Ensha & Latenna", "reward": "Latenna the Albinauric (Spirit Ash), Somber Ancient Dragon Smithing Stone (Apostate Derelict)", "gate": "Speak to Latenna WITH the right medallion half before taking the left half at Castle Sol, or she's already dead at the Shack — her ash is still lootable but the Somber Ancient Dragon Smithing Stone reward is lost.", "steps": [{"step": "1", "location": "Roundtable Hold", "text": "Interact with Ensha, who is leaning against the wall in the Roundtable Hold to receive the What Do You Want? gesture"}]}, {"giver": "Brother Corhyn", "reward": "Mending Rune of Perfect Order (Age of Order ending), Radiant Gold Mask + Goldmask's gear, Law of Regression incantation", "gate": "Complete the Royal Leyndell riddle step (cast Law of Regression, tell Goldmask) BEFORE burning the Erdtree, or the Mending Rune is permanently unobtainable. Final rune appears at the Ashen Capital after clearing Farum Azula.", "steps": [{"step": "1", "location": "Roundtable Hold", "text": "Speak with Brother Corhyn and exaust his dialogue, as well as buy any Incantations if desired"}]}, {"giver": "Diallos & Jars", "reward": "Hoslow's Petal Whip, Diallos's Mask, Numen's Rune (all corpse loot at Jarburg)", "gate": "His death scene needs Jar-Bairn's quest progressed AND Radahn dead + Alexander spoken to. Never progress Jar-Bairn and the rewards never spawn. Caution (disputed): finishing Volcano Manor before meeting Diallos may block him.", "steps": [{"step": "1", "location": "Roundtable Hold", "text": "Speak to Diallos in the main room and exhaust his dialogue"}]}, {"giver": "Roderika", "reward": "Spirit Jellyfish Ashes, Golden Seed, Crimson Hood, Spirit Tuning unlock", "gate": "Crimson Hood only spawns at Stormveil once she's a full Spirit Tuner — genuinely missable if her quest is never finished.", "steps": [{"step": "1", "location": "Stormhill Shack in Stormhill", "text": "(Optional) She will be sitting inside the shack, speak to her and exhaust all dialogue to obtain the Spirit Jellyfish Ashes"}]}, {"giver": "Volcano Manor", "reward": "Taker's Cameo (all 3 contracts), Serpent-Hunter, Magma Shot, Serpentbone Blade, Rykard's Rancor", "gate": "Killing Rykard is a master lockout — finish all assassination contracts and grab the Serpent-Hunter from his arena first (no fallback).", "steps": [{"step": "1", "location": "Warmaster's Shack in Stormhill", "text": "(Optional) You can initially meet Bernahl at the Warmaster's Shack. If you speak to him he will offer you his wares"}]}, {"giver": "Rogier & Fia", "reward": "Rogier's Rapier + Spellblade Set + Rogier's Letter; Fia's Mending Rune of the Death-Prince (Age of the Duskborn) + Lichdragon Fortissax (trophy)", "gate": "Fortissax (trophy) is only fightable via Fia's Deathbed Dream; the Cursemark of Death is gated behind Ranni. Hear Rogier's 'About D' dialogue before he dies or his Letter never spawns. Fia auto-relocates to Deeproot if you burn the Erdtree — the real risk is killing her before claiming the rune.", "steps": [{"step": "1", "location": "Rampart Tower Site of Grace in Stormveil Castle", "text": "Rogier can be found in chapel past the Rampart Tower Site of Grace, exhaust his dialogue. Purchase his wares if desired"}]}, {"giver": "Thops", "reward": "Thops's Bell Bearing, Thops's Barrier sorcery, Academy Glintstone Key", "gate": "Bring him the second Academy Glintstone Key to finish his short quest before beating Rennala; rewards are corpse loot at his spot afterward.", "steps": [{"step": "1", "location": "Church of Irith in Liurnia", "text": "Speak to him at the church and he will request a spare Glintstone Academy Key"}]}, {"giver": "Blackguard Big Boggart", "reward": "Boiled Crab / Boiled Prawn (buffs), Bloodhound's Fang steps, Boggart's questline", "gate": "You MUST speak to Rya in Liurnia before entering Volcano Manor or his line locks. His Boiled Crab is permanently missable if he's killed (Dung Eater invasion) before you buy it.", "steps": [{"step": "1", "location": "East of Liurnia Telescope", "text": "Start Rya's questline"}]}, {"giver": "Seluvis", "reward": "Magic Scorpion Charm (talisman), Dolores/Nepheli puppet Spirit Ashes, Seluvis's Bell Bearing", "gate": "Seluvis dies when you give Ranni the Fingerslayer Blade — the Magic Scorpion Charm has NO corpse fallback, so finish the Amber Starlight step and collect it first. Give Seluvis's Potion to Gideon to avoid puppeting an NPC.", "steps": [{"step": "1", "location": "Seluvis's Rise in Liurnia", "text": "Speak to Preceptor Seluvis in his rise after starting Ranni's questline (must have spoken to Nepheli at least once prior)"}]}, {"giver": "Gowry & Millicent", "reward": "Prosthesis-Wearer Heirloom, Unalloyed Gold Needle (→ Miquella's Needle), then Rotten Winged Sword Insignia OR Millicent's Prosthesis (mutually exclusive)", "gate": "Resolves at Elphael/Haligtree — defeat the Putrid Tree Spirit and complete her steps before beating Malenia. Give her the Valkyrie's Prosthesis (Shaded Castle) first. The two finale talismans can't both be had in one run.", "steps": [{"step": "1", "location": "Gowry's Shack in Caelid", "text": "Speak to Gowry in his shack and he will ask you to find the Unalloyed Gold Needle in the nearby swamp"}]}, {"giver": "Dung Eater", "reward": "Sword of Milos, Mending Rune of the Fell Curse (Blessing of Despair ending), Omen Set", "gate": "Needs 5 Seedbed Curses — grab BOTH Leyndell ones before burning the Erdtree. Giving him Seluvis's Potion puppets him and permanently forfeits the Mending Rune.", "steps": [{"step": "1", "location": "Roundtable Hold", "text": "The Dung Eater's spectral form will appear in the Roundtable Hold after reaching the Altus Plateau"}]}], "endings": {"savePoint": "Backup grace = 'Fractured Marika' (the final grace, right before Radagon / Elden Beast). Defeat the Elden Beast, then — while sitting at Fractured Marika and BEFORE touching Marika's body, using Ranni's summon sign, or having accepted the Three Fingers — back up your save (cloud upload, USB copy, or copy the save folder offline). An un-branded backup here keeps all three endings open.", "note": "Complete ALL questlines first. Age of the Stars needs Ranni's quest fully done. Elden Lord is the default (the 4 'Mend the Elden Ring' variants all count as the one trophy). Lord of Frenzied Flame needs the Three Fingers — the only irreversible action, so do it LAST. Bulletproof hedge: also keep a second backup made just BEFORE the final boss while already branded, in case your build can't reach the Three Fingers after the fight.", "options": [{"name": "Elden Lord (default) — do 1st", "prereq": "None", "steps": "From the un-branded backup: touch Marika, choose 'Mend the Elden Ring'. Earns 'Elden Lord'. Restore the backup."}, {"name": "Age of the Stars — do 2nd", "prereq": "Ranni's questline fully complete", "steps": "From the un-branded backup: use Ranni's blue summon sign at the Fractured Marika grace instead of mending. Earns 'Age of the Stars'. Restore the backup."}, {"name": "Lord of Frenzied Flame — do LAST", "prereq": "Accept the Three Fingers (strip ALL armor + body talismans) at the Frenzied Flame Proscription beneath Leyndell", "steps": "From the un-branded backup: travel to the Frenzied Flame Proscription, strip, touch the Three Fingers, return to Fractured Marika, touch Marika → 'Become the Lord of Frenzied Flame'. Irreversible (except via Miquella's Needle pre-boss), so it's last."}]}};
const SK='er_tracker_v1', FK='er_tracker_filters_v1', OK='er_tracker_open_v1';
let state=JSON.parse(localStorage.getItem(SK)||'{}');
let filters=Object.assign({plat:false,miss:false,hidedone:false,hidebuy:false,hideng:false,cats:{},q:''},JSON.parse(localStorage.getItem(FK)||'{}'));
let openState=JSON.parse(localStorage.getItem(OK)||'{}');
const save=()=>localStorage.setItem(SK,JSON.stringify(state));
const saveF=()=>localStorage.setItem(FK,JSON.stringify(filters));
const saveO=()=>localStorage.setItem(OK,JSON.stringify(openState));

const CAT={boss:{l:'Bosses',o:0},weapon:{l:'Weapons',o:1},ash:{l:'Spirit Ashes',o:2},
  sorcery:{l:'Sorceries',o:3},incantation:{l:'Incantations',o:4},talisman:{l:'Talismans',o:5},
  cookbook:{l:'Cookbooks',o:6},armor:{l:'Armor',o:7}};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ---- filter predicate ----
function passes(it){
  if(filters.q){const q=filters.q.toLowerCase();
    if(!((it.name||'')+(it.location||'')+(it.notes||'')).toLowerCase().includes(q))return false;}
  if(filters.plat&&!it.platinumCritical)return false;
  if(filters.miss&&!it.missable)return false;
  if(filters.hidedone&&state[it.id])return false;
  if(filters.hidebuy&&it.method==='purchase'&&!it.platinumCritical&&!it.missable)return false;
  if(filters.hideng&&it.ngPlusOnly)return false;
  if(Object.values(filters.cats).some(v=>v)&&!filters.cats[it.cat])return false;
  return true;
}
const region=r=>DATA.regions.find(x=>x.name===r);

// ---- render ----
function tags(it){
  let t='';
  if(it.legendary)t+='<span class="tag t-leg">Legendary</span>';
  if(it.platinumCritical&&!it.legendary)t+='<span class="tag t-plat">Platinum</span>';
  if(it.missable)t+='<span class="tag t-miss">⚠ Gated</span>';
  if(it.ngPlusOnly)t+='<span class="tag t-ng">NG+ only</span>';
  if(it.method==='purchase')t+='<span class="tag t-buy">Buy</span>';
  return t?`<span class="tags">${t}</span>`:'';
}
function itemRow(it){
  const ck=state[it.id]?'checked':'';
  const loc=[it.subarea,it.notes].filter(Boolean).map(esc).join(' — ');
  const gr=it.gateReason?`<div class="grsn">⚠ ${esc(it.gateReason)}</div>`:'';
  return `<label class="row ${it.missable?'miss':''} ${ck?'checked':''}" data-id="${it.id}">
    <input type="checkbox" class="cbx" ${ck} data-id="${it.id}">
    <span class="itxt"><span class="nm">${esc(it.name)}</span>${tags(it)}
    ${loc?`<div class="loc">${loc}</div>`:''}${gr}</span></label>`;
}
function renderRegion(reg,idx){
  const vis=reg.items.filter(passes);
  const total=reg.items.length, done=reg.items.filter(i=>state[i.id]).length;
  if(!vis.length && (filters.q||filters.plat||filters.miss||Object.values(filters.cats).some(v=>v)))return '';
  const open=openState[reg.name]!==false && (idx===undefined?true:openState[reg.name]);
  // group visible items by category
  const groups={};vis.forEach(i=>(groups[i.cat]=groups[i.cat]||[]).push(i));
  const cats=Object.keys(groups).sort((a,b)=>(CAT[a]?.o??9)-(CAT[b]?.o??9));
  let gatesHtml='';
  (reg.gates||[]).forEach(g=>{gatesHtml+=`<div class="gate"><b>⚠ Gate — ${esc(g.trigger)}</b>
    <div class="trig">${esc(g.description)}</div></div>`;});
  (reg.notes||[]).forEach(n=>{gatesHtml+=`<div class="note-info"><b>Note.</b> ${esc(n)}</div>`;});
  let inner=gatesHtml;
  cats.forEach(c=>{
    inner+=`<div class="cat"><div class="cat-h"><span>${CAT[c]?.l||c}</span>
      <span>${groups[c].filter(i=>state[i.id]).length}/${groups[c].length}</span></div>
      ${groups[c].map(itemRow).join('')}</div>`;
  });
  return `<section class="block ${open?'open':''}" id="reg-${idx}" data-region="${esc(reg.name)}">
    <div class="bhead"><span class="caret">▶</span><span class="bnum">${idx}</span>
      <span class="btitle">${esc(reg.name)}</span>
      <span class="bprog"><span class="bprog-t">${done}/${total}</span>
      <span class="bprog-bar"><i style="width:${total?done/total*100:0}%"></i></span></span></div>
    <div class="body">${inner||'<div class="empty">Nothing here in this filter.</div>'}</div></section>`;
}
function renderTrophies(){
  const a=DATA.achievements;const done=a.filter(t=>state['ach-'+t.name]).length;
  const open=openState['__trophies']!==false;
  const rows=a.map(t=>{const id='ach-'+t.name;const ck=state[id]?'checked':'';
    return `<label class="row ${ck?'checked':''}"><input type="checkbox" class="cbx" ${ck} data-id="${id}">
    <span class="itxt"><span class="nm">${esc(t.name)}</span>
    <div class="loc">${esc(t.requirement)}</div></span></label>`;}).join('');
  return `<section class="block ${open?'open':''}" id="reg-T" data-region="__trophies">
    <div class="bhead"><span class="caret">▶</span><span class="bnum" style="background:var(--plat)">★</span>
    <span class="btitle">Platinum Trophies</span>
    <span class="bprog"><span class="bprog-t">${done}/42</span>
    <span class="bprog-bar"><i style="width:${done/42*100}%;background:var(--plat)"></i></span></span></div>
    <div class="body">${rows}</div></section>`;
}
function renderEndings(){
  const e=DATA.endings;if(!e)return '';
  const open=openState['__endings']===true;
  let opts=(e.options||[]).map(o=>`<div class="ending"><h3>${esc(o.name)}</h3>
    ${o.prereq?`<div class="nt" style="margin-bottom:4px">Prereq: ${esc(o.prereq)}</div>`:''}
    <div>${esc(o.steps)}</div></div>`).join('');
  return `<section class="block ${open?'open':''}" id="reg-E" data-region="__endings">
    <div class="bhead"><span class="caret">▶</span><span class="bnum" style="background:var(--miss)">⚑</span>
    <span class="btitle">Endings &amp; Save-Scum</span></div>
    <div class="body">${e.savePoint?`<div class="gate"><b>⚠ Back up your save</b>
      <div class="trig">${esc(e.savePoint)}</div></div>`:''}
      ${e.note?`<div class="note-info">${esc(e.note)}</div>`:''}${opts}</div></section>`;
}
function renderQuests(){
  if(!DATA.quests||!DATA.quests.length)return '';
  const open=openState['__quests']===true;
  const q=DATA.quests.map(ql=>{
    const steps=ql.steps.map(s=>`<div class="step"><span class="stepn">${esc(s.step)}</span>
      <span class="itxt"><span class="nm" style="font-size:12.5px">${esc(s.text)}</span>
      ${s.location?`<div class="loc">${esc(s.location)}</div>`:''}</span></div>`).join('');
    return `<details class="quest"><summary>◈ ${esc(ql.giver)}
      ${ql.reward?`<span class="qreward">${esc(ql.reward)}</span>`:''}</summary>
      <div class="qbody">${ql.gate?`<div class="gate"><b>⚠ Don't lock it out</b>
        <div class="trig">${esc(ql.gate)}</div></div>`:''}${steps}</div></details>`;}).join('');
  return `<section class="block ${open?'open':''}" id="reg-Q" data-region="__quests">
    <div class="bhead"><span class="caret">▶</span><span class="bnum" style="background:var(--blue)">✦</span>
    <span class="btitle">NPC Questlines</span></div><div class="body">${q}</div></section>`;
}
function renderNav(){
  let h='<div class="sn-label">Overview</div>';
  h+=`<div class="sn-item" data-go="reg-T">★ Trophies<span class="sn-badge">${DATA.achievements.filter(t=>state['ach-'+t.name]).length}/42</span></div>`;
  h+=`<div class="sn-item" data-go="reg-E">⚑ Endings / Save-scum</div>`;
  if(DATA.quests?.length)h+=`<div class="sn-item" data-go="reg-Q">✦ Questlines</div>`;
  h+='<div class="sn-label">Route</div>';
  DATA.regions.forEach((r,i)=>{const d=r.items.filter(x=>state[x.id]).length,t=r.items.length;
    const mg=(r.gates?.length||0);
    h+=`<div class="sn-item ${d===t&&t?'done':''}" data-go="reg-${i+1}">
      <span>${esc(r.name)}${mg?' <span style="color:var(--miss)">⚠</span>':''}</span>
      <span class="sn-badge">${d}/${t}</span></div>`;});
  document.getElementById('sidenav').innerHTML=h;
}
function renderCats(){
  const row=document.getElementById('catrow');
  row.innerHTML=Object.keys(CAT).sort((a,b)=>CAT[a].o-CAT[b].o).map(c=>
    `<span class="chip ${filters.cats[c]?'on':''}" data-cat="${c}">${CAT[c].l}</span>`).join('');
}
function renderMain(){
  let h='';
  if(DATA.platinumNote)h+=`<div class="intro"><b>★ Platinum</b> ${esc(DATA.platinumNote)}</div>`;
  h+=renderTrophies()+renderEndings()+renderQuests();
  DATA.regions.forEach((r,i)=>h+=renderRegion(r,i+1));
  document.getElementById('main').innerHTML=h;
}
function updateStats(){
  const all=DATA.regions.flatMap(r=>r.items);
  const done=all.filter(i=>state[i.id]).length;
  const missLeft=all.filter(i=>i.missable&&!state[i.id]).length;
  const plat=DATA.achievements.filter(t=>state['ach-'+t.name]).length;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-plat').textContent=plat+'/42';
  document.getElementById('s-miss').textContent=missLeft;
  document.getElementById('gbar-fill').style.width=(all.length?done/all.length*100:0)+'%';
}
function renderAll(){renderMain();renderNav();updateStats();
  document.querySelectorAll('.chip[data-f]').forEach(c=>c.classList.toggle('on',filters[c.dataset.f]));}

// ---- events ----
document.addEventListener('change',e=>{
  if(e.target.classList.contains('cbx')){const id=e.target.dataset.id;
    if(e.target.checked)state[id]=1;else delete state[id];save();
    const row=e.target.closest('.row');if(row)row.classList.toggle('checked',e.target.checked);
    // update local group/region counters cheaply by re-render of stats+nav
    updateStats();renderNav();
    // if hide-checked active, re-render to drop it
    if(filters.hidedone)renderMain();}
});
document.addEventListener('click',e=>{
  const head=e.target.closest('.bhead');
  if(head){const blk=head.parentElement;blk.classList.toggle('open');
    openState[blk.dataset.region]=blk.classList.contains('open');saveO();return;}
  const fc=e.target.closest('.chip[data-f]');
  if(fc){filters[fc.dataset.f]=!filters[fc.dataset.f];saveF();renderAll();return;}
  const cc=e.target.closest('.chip[data-cat]');
  if(cc){filters.cats[cc.dataset.cat]=!filters.cats[cc.dataset.cat];saveF();renderCats();renderMain();return;}
  const nav=e.target.closest('[data-go]');
  if(nav){const el=document.getElementById(nav.dataset.go);
    if(el){el.classList.add('open');const b=el.dataset.region;openState[b]=true;saveO();
      el.scrollIntoView({behavior:'smooth',block:'start'});}return;}
  if(e.target.id==='catbtn'){document.getElementById('catrow').classList.toggle('hidden');return;}
});
document.getElementById('search').addEventListener('input',e=>{filters.q=e.target.value;saveF();renderMain();});
document.getElementById('expand').onclick=()=>{DATA.regions.forEach(r=>openState[r.name]=true);
  ['__trophies','__endings','__quests'].forEach(k=>openState[k]=true);saveO();renderMain();};
document.getElementById('collapse').onclick=()=>{document.querySelectorAll('.block').forEach(b=>openState[b.dataset.region]=false);saveO();renderMain();};
document.getElementById('export').onclick=()=>{
  const blob=new Blob([JSON.stringify(state)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='er-tracker-progress.json';a.click();};
document.getElementById('import').onclick=()=>{
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=()=>{const f=i.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{state=JSON.parse(r.result);save();renderAll();}catch(err){alert('Bad file: '+err)}};
    r.readAsText(f);};i.click();};

renderCats();
document.getElementById('search').value=filters.q||'';
renderAll();
</script>
</body>
</html>
