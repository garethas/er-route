{id:"a09",name:"Volcano Manor & Mt Gelmir",subtitle:"ALL contracts before Rykard",story:"Do all three VM assassination contracts THEN kill Rykard. Tanith gives rewards after each contract. <strong>RYA — continued (must complete before Rykard):</strong> after each of the first two contracts, talk to Rya in the Drawing Room — second time she's in true serpent form. Talk to Tanith, reload the area, talk to Rya again — she mentions sounds behind a wall. Exit the lobby, turn right, strike the wall with the crooked brazier portrait to reveal a hidden passage through Prison Town to the Temple of Eiglay (Godskin Noble boss). Beat him, grab the item, continue to a warp portal → Audience Pathway. Warp back, tell Rya the truth about the manor, give her the item if you got one. Reload — she's gone from the manor. Ask Tanith, then find Rya at Temple of Eiglay grace (elevator shortcut, jump out below, cross the lava). Either let her ask you to kill her, or get a Tonic of Forgetfulness from Tanith and give it to her instead. After Rykard, find Patches at Shaded Castle (he moved). Get all VM armour before killing Rykard.",miss:"⚠ Completing all 3 contracts unlocks Hoslow's Petal Whip and Magma Whip Candlestick. Doing contracts out of order or killing Rykard first locks you out of these forever. ⚠ CRITICAL: if you kill Rykard before finding and talking to Rya in her serpent-form room (see story), her questline becomes permanently impossible to complete on this save.",items:[{id:"a09_i000",text:"Blasphemous Blade (Greatsword)",note:"Enia — Remembrance of the Blasphemous (Rykard) exchange option.",cat:"weapon"},{id:"a09_i001",text:"Rykard's Rancor (incantation)",note:"Enia — Rykard Remembrance alt option. Walking mausoleum to duplicate.",cat:"spell"},{id:"a09_i002",text:"Magma Whip Candlestick",note:"Tanith reward after VM Contract 3 (Juno Hoslow).",cat:"weapon",miss:true},{id:"a09_i003",text:"Hoslow's Petal Whip",note:"Contract 3 target Juno Hoslow drops it.",cat:"weapon",miss:true},{id:"a09_i004",text:"Serpentbone Blade (Katana)",note:"Tanith reward after VM Contract 2 (Rileigh the Idle). NOT from Rykard Remembrance.",cat:"weapon",miss:true},{id:"a09_i005",text:"Taker's Cameo (talisman)",note:"Tanith gives after all 3 contracts done, before God-Devouring Serpent lair.",cat:"talisman",miss:true},{id:"a09_i006",text:"Volcano Manor Set",note:"Tanith reward after all contracts.",cat:"armor",miss:true},{id:"a09_i007",text:"Rileigh's Set",note:"Contract kill: Rileigh the Idle.",cat:"armor",miss:true},{id:"a09_i008",text:"Hoslow's Set",note:"Contract kill: Juno Hoslow (Mountaintops).",cat:"armor",miss:true},{id:"a09_i009",text:"Inquisitor's Girandole",note:"Abductor Virgin duo boss, Volcano Manor basement.",cat:"weapon"},{id:"a09_i010",text:"Devourer's Scepter (Legendary)",note:"Dropped by Bernahl — can be fought at Warmaster's Shack (locks out Raging Wolf armor), at VM contract, or at Farum Azula invasion (proper questline).",cat:"weapon",miss:true},{id:"a09_i011",text:"Serpent-Hunter (Great Spear)",note:"Left side of Rykard's boss lair, before the fight.",cat:"weapon"},{id:"a09_i012",text:"Ronin's Set (armor)",note:"See Yura questline reminder.",cat:"armor"},{id:"a09_i013",text:"Raging Wolf Set (armor)",note:"Bernahl invasion after his death at Farum Azula (Recusant questline).",cat:"armor",miss:true},{id:"a09_i014",text:"Crimson Amber Medallion +1",note:"Prison Tower Church west corpse, Volcano Manor.",cat:"talisman"},{id:"a09_i015",text:"Daedicar's Woe",note:"Rya at end of her questline.",cat:"talisman",miss:true},{id:"a09_i016",text:"Dagger Talisman",note:"Corpse in Volcano Manor dark hall.",cat:"talisman"},{id:"a09_i017",text:"Bloodhound Knight Floh Ashes",note:"Red Wolf of the Champion boss, Gelmir Hero's Grave.",cat:"spirit"},{id:"a09_i018",text:"Fire Monk Ashes",note:"Room with frost breath statue traps (hidden elevator).",cat:"spirit"},{id:"a09_i019",text:"Magma Blade / spells",note:"Various VM/Mt Gelmir.",cat:"spell"},{id:"a09_i020",text:"Gelmir's Fury",note:"Chest, Mt. Gelmir.",cat:"spell"},{id:"a09_i021",text:"Rya — continued (see Rya questline warning in warn text)",note:"After each contract, talk to Rya in Drawing Room. Trigger her serpent form → hidden passage via portrait/brazier → Godskin Noble boss → Audience Pathway → Rya at Temple of Eiglay grace.",cat:"key",miss:true},{id:"a09_i022",text:"Seedbed Curse #3",note:"Near Rykard portal — through Stonesword Key door, drop through hanging cages.",cat:"key",miss:true},{id:"a09_i023",text:"Alexander — Mt Gelmir lava",note:"Southwest of Seethewater Terminus, in the lava field. Give him a Hefty Oil Pot (from Nomad's Cookbook 17). → Jar Helmet.",cat:"key",miss:true},{id:"a09_i024",text:"Jar Helmet",note:"Alexander gives after lava pool visit.",cat:"armor",miss:true},{id:"a09_i025",text:"Fire Scorpion Charm",note:"Fort Laiedd hidden platform, Mt. Gelmir.",cat:"talisman"},{id:"a09_i026",text:"Kindred of Rot's Exultation",note:"Kindred of Rot duo, Seethewater Cave.",cat:"talisman"},{id:"a09_i027",text:"Great Rune of the Blasphemous",note:"Rykard reward.",cat:"key"},{id:"a09_i028",text:"Rya questline — necklace REMINDER (start in Liurnia)",note:"If you skipped starting Rya in Liurnia, you cannot access Blackguard Big Boggart or one Dung Eater Seedbed Curse.",cat:"key",miss:true,warn:true},{id:"a09_i029",text:"Nomadic Warrior's Cookbook [19]",note:"Merchant NW of Mt. Gelmir — 3000 runes.",cat:"key"},{id:"a09_i030",text:"Armorer's Cookbook [7]",note:"Bottom floor of Fort Laiedd, western Mt. Gelmir.",cat:"key"},{id:"a09_i031",text:"Larval Tear [17]",note:"Road of Iniquity grace, Mt Gelmir (NE) — Putrid Zombie transforms into Wormface.",cat:"key"},{id:"a09_i032",text:"Cerulean Hidden Tear",note:"Ulcerated Tree Spirit at Minor Erdtree, Mt Gelmir (east of Road of Iniquity grace).",cat:"key"},{id:"a09_i033",text:"Leaden Hardtear",note:"Second drop from Mt Gelmir Ulcerated Tree Spirit at Minor Erdtree.",cat:"key"},{id:"a09_i034",text:"Sacred Tear — Church of Vows (VM area / Prison Town Church of Marika)",note:"Corpse in the church, Volcano Manor path.",cat:"key"},{id:"a09_i035",text:"Sacred Tear — Prison Town Church",note:"Loot in Volcano Manor / Prison Town.",cat:"key"},{id:"a09_i036",text:"Golden Seeds — Mt Gelmir (2 saplings)",note:"Near Ninth Mt. Gelmir Camp, Fort Laiedd.",cat:"key"},{id:"a09_i037",text:"Painting: Flightless Bird",note:"Perfumer's Ruins, Altus. Solution: on a bridge in Mt Gelmir near Corpse-Stench Shack.",cat:"key"},{id:"a09_i038",text:"Ash of War: Vow of the Indomitable",note:"Loot near the Auriza Side Tomb (Altus).",cat:"ash"},{id:"a09_i039",text:"Crepus's Vial",note:"Rileigh the Idle drops it (VM Contract 2 kill).",cat:"talisman",miss:true},{id:"a09_i040",text:"Steel-Wire Torch",note:"Loot in Volcano Manor.",cat:"catalyst"},{id:"a09_i041",text:"Ash of War: Magma Guillotine",note:"Magma Wyrm Makar boss, Ruin-Strewn Precipice (Altus).",cat:"ash"},{id:"a09_i042",text:"Ash of War: Onyx Lord's Repulsion",note:"Onyx Lord boss, Mt. Gelmir.",cat:"ash"},{id:"a09_i043",text:"Rock Sling (reminder)",note:"Reminder — Street of Sages Ruins.",cat:"spell"},{id:"a09_i044",text:"Rykard's Rancor (reminder)",note:"Enia — Rykard Remembrance alt (tracked at a09 vm06 spell).",cat:"spell"},{id:"a09_i045",text:"Magma Shot",note:"Chest at Fort Laiedd.",cat:"spell"},{id:"a09_i046",text:"Magma Breath",note:"Cathedral of Dragon Communion — 2 Dragon Hearts (Magma Wyrm).",cat:"spell"},{id:"a09_i047",text:"Iron Set",note:"Volcano Manor.",cat:"armor"},{id:"a09_i048",text:"Fire Prelate Set",note:"Fire Prelate drop.",cat:"armor"},{id:"a09_i049",text:"Fire Monk Set",note:"Fire Monk drops.",cat:"armor"},{id:"a09_i050",text:"Man-Serpent Set",note:"Enemy drop.",cat:"armor"},{id:"a09_i051",text:"Perfumer Set",note:"Loot, Altus / Perfumer's Ruins (reminder here).",cat:"armor"},{id:"a09_i052",text:"Rakshasa Set",note:"Marais/Elemer of the Briar drops, Shaded Castle (reminder).",cat:"armor"},{id:"a09_i053",text:"Ghiza's Wheel",note:"Chariot boss, Auriza Side Tomb (Altus — reminder).",cat:"weapon"},{id:"a09_i054",text:"Godskin Stitcher",note:"Godskin enemies, Volcano Manor.",cat:"weapon"},{id:"a09_i055",text:"Onyx Lord's Greatsword",note:"Onyx Lord boss, Mt Gelmir.",cat:"weapon"},{id:"a09_i056",text:"Prelate's Inferno Crozier",note:"Fire Prelate drop.",cat:"weapon"},{id:"a09_i057",text:"Rotten Battle Hammer",note:"Loot in Volcano Manor cellar.",cat:"weapon"},{id:"a09_i058",text:"Great Rune of the Blasphemous — restore",note:"Divine Tower of West Altus.",cat:"key"}]},
{id:"a10",name:"Leyndell, Royal Capital",subtitle:"Morgott — do thoroughly, point of partial no return later",story:"<strong>CRITICAL AREA.</strong> Bolt of Gransax is on the giant spear in the capital and is GONE after Maliketh. Get it now. <strong>DUNG EATER — correct order:</strong> 1) Meet him at Roundtable Hold (unlocks after reaching Altus). 2) Get ONE Seedbed Curse (Leyndell has two, see items below), show it to him → he gives Sewer-Gaol Key. 3) Go to Subterranean Shunning-Grounds, find his real body in the cell, talk to him to release him — this does NOT lock you out of anything, you need this step. 4) He becomes available as a summon for Mohg AND Morgott until you progress further. 5) Head to the outer moat outside Leyndell — fight and defeat him there (drops Sword of Milos), he returns to Roundtable Hold. 6) Talk to him again — he asks for 5 total Seedbed Curses, delivered to his real body in the sewer cell (not the Roundtable Hold illusion). Corhyn + Goldmask questline. All three Shabiri Grapes for Hyetta.",miss:"⚠ Bolt of Gransax (Legendary) — permanently missable after Farum Azula. ⚠ GOLDMASK/CORHYN: meet Corhyn at Roundtable Hold, then find him and Goldmask together on the Altus Plateau broken bridge, then follow them to the Leyndell colosseum. You do NOT need to fully solve the Law of Regression riddle yet, but you MUST at least initiate their questline (meet them at the colosseum) before progressing to Mountaintops/Farum Azula, and ideally cast Law of Regression before burning the Erdtree (Fire Giant) — doing either main-story beat first with their quest un-started causes Corhyn to die and Goldmask to vanish, permanently losing the Age of Order ending. ⚠ There are 6 Seedbed Curses total, you only need 5 — 2 in Leyndell, 1 in Volcano Manor, 2 in Elphael/Haligtree, 1 from the Blackguard Big Boggart moat encounter (missable — needs his own questline finished first, and Dung Eater must already be at the \"waiting at the moat\" stage). Crucible Knight Set — present in Royal Capital only.",items:[{id:"a10_i000",text:"Bolt of Gransax (Legendary weapon)",note:"On the giant spear in Leyndell — PERMANENTLY MISSABLE after Maliketh (area becomes Ashen).",cat:"weapon",miss:true},{id:"a10_i001",text:"Coded Sword",note:"Upper throne room of the Fortified Manor (illusory Roundtable Hold copy), SW of the real Roundtable — PERMANENTLY MISSABLE after Maliketh.",cat:"weapon",miss:true},{id:"a10_i002",text:"Morgott's Cursed Sword",note:"Enia — Remembrance of the Omen King (Morgott) exchange option.",cat:"weapon"},{id:"a10_i003",text:"Regal Omen Bairn (multiplayer item)",note:"Enia — Morgott Remembrance alt option. Walking mausoleum to duplicate.",cat:"key"},{id:"a10_i004",text:"Morgott's Great Rune",note:"Restore at Divine Tower of East Altus.",cat:"key"},{id:"a10_i005",text:"Envoy's Longhorn (Great Hammer)",note:"Rare drop from Oracle Envoys in Leyndell. Also drops in Ashen Leyndell.",cat:"weapon"},{id:"a10_i006",text:"Envoy's Horn (Hammer)",note:"Rare drop from smaller Oracle Envoys, Leyndell.",cat:"weapon"},{id:"a10_i007",text:"Sword of St Trina",note:"Forsaken Ruins, Altus (reminder).",cat:"weapon"},{id:"a10_i008",text:"Golden Halberd (from Tree Sentinel)",note:"If missed earlier.",cat:"weapon"},{id:"a10_i009",text:"Erdtree's Favor +1",note:"Cathedral of the Forsaken chest (below Leyndell, past Mohg the Omen).",cat:"talisman"},{id:"a10_i010",text:"Crimson Amber Medallion +2",note:"Subterranean Shunning-Grounds beams (jump between rafters).",cat:"talisman"},{id:"a10_i011",text:"Ritual Shield Talisman",note:"Corpse on Royal Colosseum steps.",cat:"talisman"},{id:"a10_i012",text:"Blessed Dew Talisman",note:"Chest at Divine Bridge grace.",cat:"talisman"},{id:"a10_i013",text:"Crucible Scale Talisman",note:"Altar inside Leyndell Catacombs, guarded by Omen.",cat:"talisman"},{id:"a10_i014",text:"Haligdrake Talisman +1",note:"Behind 2 illusory walls inside Leyndell Catacombs.",cat:"talisman"},{id:"a10_i015",text:"Lord of Blood's Exultation",note:"Esgar, Priest of Blood boss, Leyndell Catacombs (Cathedral of the Forsaken).",cat:"talisman"},{id:"a10_i016",text:"Golden Order Principia",note:"Erdtree Sanctuary (after Godfrey golden shade fight): climb tree root outside → wooden platform → corpse on throne. Needed to buy Law of Regression.",cat:"key",miss:true},{id:"a10_i017",text:"Law of Regression (incantation)",note:"Buy from Corhyn or Miriel after handing over Golden Order Principia.",cat:"spell",miss:true},{id:"a10_i018",text:"Goldmask/Corhyn — cast Law of Regression",note:"West of Erdtree Sanctuary grace, down elevator + stairs. Stand on the ground message facing the statue, cast Law of Regression. Return to Goldmask on colosseum cliff → Golden Order Totality gesture.",cat:"key",miss:true},{id:"a10_i019",text:"Mending Rune of Perfect Order",note:"On Goldmask's CORPSE at base of colosseum cliffs in ASHEN Leyndell (post-Maliketh). Reload area to loot Goldmask's Set.",cat:"key",miss:true},{id:"a10_i020",text:"Corhyn's Bell Bearing + Robe + Flail",note:"After Goldmask dies — Corhyn is near the giant spiral spear in Ashen Leyndell (or Mountaintops bridge if not relocated). Exhaust dialogue, reload, items left.",cat:"key",miss:true},{id:"a10_i021",text:"Dung Eater — Roundtable start",note:"Talk to Dung Eater at Roundtable Hold (unlocks after reaching Altus).",cat:"key",miss:true},{id:"a10_i022",text:"Seedbed Curse #1 (Leyndell)",note:"Corpse in a large room past the Avenue Balcony grace — outside area with knights.",cat:"key",miss:true},{id:"a10_i023",text:"Seedbed Curse #2 (Leyndell/Fortified Manor)",note:"West Capital Rampart — Fortified Manor (illusory Roundtable copy), on the corpse where Dung Eater would sit.",cat:"key",miss:true},{id:"a10_i024",text:"Sewer-Gaol Key",note:"Dung Eater gives after you show him ONE Seedbed Curse.",cat:"key",miss:true},{id:"a10_i025",text:"Dung Eater — Subterranean Shunning-Grounds",note:"Find his real body in the sewer cell. Talk to release him.",cat:"key",miss:true},{id:"a10_i026",text:"Dung Eater — Moat invasion",note:"After releasing him. He invades at outer moat (near Blackguard Big Boggart) — beat him. He drops Sword of Milos, returns to Roundtable.",cat:"key",miss:true},{id:"a10_i027",text:"Sword of Milos",note:"Dung Eater moat invasion drop.",cat:"weapon",miss:true},{id:"a10_i028",text:"Deliver 5 Seedbed Curses to Dung Eater's real body",note:"After moat step, bring all 5 to his sewer cell body. His questline finishes with the Mending Rune of the Fell Curse.",cat:"key",miss:true},{id:"a10_i029",text:"Mending Rune of the Fell Curse",note:"Dung Eater questline completion. Alt Elden Lord ending (Blessing of Despair).",cat:"key",miss:true},{id:"a10_i030",text:"Blackguard Big Boggart",note:"Big Boggart at Leyndell outer moat — buy Boiled Prawn from him. He appears only if you started Rya's questline in Liurnia.",cat:"npc",miss:true},{id:"a10_i031",text:"Nomad Ashes",note:"Corpse past basilisks in Subterranean Shunning-Grounds.",cat:"spirit"},{id:"a10_i032",text:"Nepheli — Godrick throne",note:"With Kenneth Haight and Gostoc — completes her questline. Gostoc sells Ancient Dragon Smithing Stone.",cat:"key",miss:true},{id:"a10_i033",text:"Arsenal Charm (from Nepheli)",note:"Nepheli gives after her questline resolution.",cat:"talisman",miss:true},{id:"a10_i034",text:"Golden Seed x3+",note:"Multiple.",cat:"key"},{id:"a10_i035",text:"Sacred Tear x2",note:"Multiple.",cat:"key"},{id:"a10_i036",text:"Great Rune of the Omen King",note:"Morgott reward.",cat:"key"},{id:"a10_i037",text:"Fevor's Cookbook [2]",note:"Corpse in Leyndell / Frenzied Flame Village area.",cat:"key"},{id:"a10_i038",text:"Crimson Crystal Tear [2]",note:"Offering bowl at Minor Erdtree, Capital Outskirts (near northern walls of Leyndell).",cat:"key"},{id:"a10_i039",text:"Crimson Bubbletear",note:"Same altar as above (Capital Outskirts Minor Erdtree).",cat:"key"},{id:"a10_i040",text:"Twiggy Cracked Tear",note:"Altar near Minor Erdtree, Capital Outskirts.",cat:"key"},{id:"a10_i041",text:"Windy Crystal Tear",note:"Altar near Hermit Merchant's Shack, Altus (near Deathbird).",cat:"key"},{id:"a10_i042",text:"Sacred Tear — Leyndell / Cathedral of the Forsaken",note:"Corpse in the sewers cathedral, past Mohg the Omen.",cat:"key"},{id:"a10_i043",text:"Golden Seeds — Capital Outskirts / Leyndell (5 saplings)",note:"Around East Capital Rampart, Fortified Manor, Deified Man/Woman area.",cat:"key"},{id:"a10_i044",text:"Dragon Cult Prayerbook",note:"Wyndham Catacombs boss reward (Altus).",cat:"key"},{id:"a10_i045",text:"Godskin Prayerbook",note:"Divine Tower of Caelid (Caelid).",cat:"key"},{id:"a10_i046",text:"Ancient Dragon Prayerbook",note:"Chest in Crumbling Farum Azula.",cat:"key"},{id:"a10_i047",text:"Two Fingers' Prayerbook",note:"Fringefolk Hero's Grave chest (Limgrave).",cat:"key"},{id:"a10_i048",text:"Erdtree Prayerbook",note:"Corpse in Leyndell — near Erdtree Sanctuary grace.",cat:"key"},{id:"a10_i049",text:"Omenkiller Rollo Ashes",note:"Fell Twins boss on the bridge to Divine Tower of East Altus (Capital Outskirts).",cat:"spirit"},{id:"a10_i050",text:"Ensha's Bell Bearing",note:"Ensha (Roundtable Nomadic Merchant) attacks you after you obtain 2 Great Runes and return to Roundtable. Kill him in self-defence — his bell bearing drops.",cat:"stone"},{id:"a10_i051",text:"Green Turtle Talisman (if missed)",note:"Reminder — Summonwater Village imp fog wall.",cat:"talisman"},{id:"a10_i052",text:"Giant's Seal",note:"Late-game — Zamor Ruins area or shopped from a merchant.",cat:"catalyst"},{id:"a10_i053",text:"Beast-Repellent Torch (reminder)",note:"Isolated Merchant, Dragonbarrow.",cat:"catalyst"},{id:"a10_i054",text:"Ash of War: Divine Beast Frost Stomp",note:"Teardrop Scarab, Consecrated Snowfield (reminder here).",cat:"ash"},{id:"a10_i055",text:"Ash of War: Braggart's Roar",note:"Purchased from Blackguard Big Boggart.",cat:"ash",miss:true},{id:"a10_i056",text:"Ancient Death Rancor (reminder)",note:"Reminder — Deeproot Depths.",cat:"spell"},{id:"a10_i057",text:"Golden Order Principia (reminder)",note:"Erdtree Sanctuary (already tracked as key item).",cat:"spell"},{id:"a10_i058",text:"Wrath of Gold",note:"Order's Trickery — sold by Corhyn (after Golden Order scroll).",cat:"spell"},{id:"a10_i059",text:"Order Healing",note:"Corhyn sells with Golden Order Fundamentalist Scroll.",cat:"spell"},{id:"a10_i060",text:"Discus of Light",note:"Corhyn.",cat:"spell"},{id:"a10_i061",text:"Litany of Proper Death",note:"Corhyn sells with Two Fingers' Prayerbook.",cat:"spell"},{id:"a10_i062",text:"Order's Blade",note:"Corhyn.",cat:"spell"},{id:"a10_i063",text:"Radagon's Rings of Light",note:"Chest inside Leyndell.",cat:"spell"},{id:"a10_i064",text:"Triple Rings of Light",note:"Corhyn sells.",cat:"spell"},{id:"a10_i065",text:"Leyndell Knight Set",note:"Leyndell Knight drops.",cat:"armor"},{id:"a10_i066",text:"Leyndell Soldier Set",note:"Common drop.",cat:"armor"},{id:"a10_i067",text:"Leyndell Foot Soldier Set",note:"Common drop.",cat:"armor"},{id:"a10_i068",text:"Perfumer Traveler's Set",note:"Perfumer drops, Leyndell area.",cat:"armor"},{id:"a10_i069",text:"Royal Remains Set",note:"Loot in Sewer / Cathedral of the Forsaken.",cat:"armor"},{id:"a10_i070",text:"Erdtree Guardian Set",note:"Enemy drop.",cat:"armor"},{id:"a10_i071",text:"Blackflame Monk Set",note:"Blackflame Monk enemies (Hidden Path — reminder).",cat:"armor"},{id:"a10_i072",text:"Nomadic Warrior Set",note:"Twin Maiden Husks sell.",cat:"armor"},{id:"a10_i073",text:"Crucible Knight Set",note:"Crucible Knight drops, Leyndell or Auriza.",cat:"armor"},{id:"a10_i074",text:"Crucible Axe Set",note:"Auriza Hero's Grave / Crucible Knight variant.",cat:"armor"},{id:"a10_i075",text:"Fingerprint Set (reminder)",note:"Frenzied Flame Village (Liurnia — reminder).",cat:"armor"},{id:"a10_i076",text:"Erdtree Bow",note:"Loot in Erdtree Sanctuary area.",cat:"weapon"},{id:"a10_i077",text:"Marika's Hammer (reminder)",note:"Reminder — Elden Remembrance.",cat:"weapon"},{id:"a10_i {id:"a11",name:"Mountaintops of the Giants",subtitle:"Post-Morgott / Rold Lift",story:"Large area with late-game content. <strong>MILLICENT — continued:</strong> find her at Ancient Snow Valley Ruins grace, south of Castle Sol. She mentions the Haligtree Secret Medallion (two halves needed to access the Haligtree at all): LEFT half from Castle Sol (defeat Commander Niall), RIGHT half from Village of the Albinaurics (under the cliff near Cathedral of Manus Sellus, Liurnia — you may already have passed this). Fire Giant and burning the Erdtree are the point of no return for Leyndell → Ashen Capital.",miss:"⚠ Both Haligtree Medallion halves are required just to physically enter Elphael/Haligtree — without them the area is inaccessible. ⚠ Millicent quest must be completed before Malenia for Miquella's Needle. Get Eclipse Shotel from Castle Sol. Death's Poker from Death Rite Bird (night).",items:[{id:"a11_i000",text:"Golden Order Greatsword (Legendary)",note:"Cave of the Forlorn (Consecrated Snowfield) — taken from Misbegotten Crusader.",cat:"weapon"},{id:"a11_i001",text:"Founding Rain of Stars (Legendary Sorcery)",note:"Chest inside Heretical Rise (invisible bridge near Snow Valley Ruins Overlook).",cat:"spell"},{id:"a11_i002",text:"Black Knife Tiche Ashes (Legendary)",note:"Black Knife Ringleader at Ringleader's Evergaol, Consecrated Snowfield.",cat:"spirit"},{id:"a11_i003",text:"Eclipse Shotel (Legendary)",note:"Castle Sol, Mountaintops.",cat:"weapon"},{id:"a11_i004",text:"Giant's Red Braid (Whip)",note:"Enia — Remembrance of the Fire Giant exchange option.",cat:"weapon"},{id:"a11_i005",text:"Burn, O Flame! (incantation)",note:"Enia — Remembrance of the Fire Giant alt option. Walking mausoleum to duplicate.",cat:"spell"},{id:"a11_i006",text:"Great Rune of the Fell Curse (from Malenia)",note:"Reminder — Malenia is Elphael area.",cat:"key"},{id:"a11_i007",text:"Commander's Standard",note:"Commander Niall boss, Castle Sol.",cat:"weapon"},{id:"a11_i008",text:"Death's Poke {id:"a12",name:"Elphael & Miquella's Haligtree",subtitle:"Malenia — requires both Haligtree Medallion halves to enter",story:"<strong>MILLICENT — final choice:</strong> near the Drainage Channel grace, in the rot pool, find her final area. Two summon signs appear: gold (help her fight her sisters) or red (invade and kill her). Pick ONE — mutually exclusive per save, the other requires a separate playthrough/NG+. If you help her: leave the area, rest at Drainage Channel, return, exhaust dialogue, rest again, return once more — she'll be dead. Loot her body for the Unalloyed Gold Needle (recovered). Use it on the Scarlet Bloom in Malenia's arena AFTER defeating her → Miquella's Needle + Somber Ancient Dragon Smithing Stone. Return to Gowry in Caelid afterward: exhaust dialogue about Malenia, then either kill him or find him already dead for the Flock's Canvas Talisman + Gowry's Bell Bearing.",miss:"⚠ Help vs invade Millicent is a one-choice-per-save fork — getting both requires NG+. ⚠ Miquella's Needle can later reverse the Frenzied Flame ending at Dragonlord Placidusax's arena (Farum Azula) if you want that flexibility.",items:[{id:"a12_i000",text:"Hand of Malenia (Legendary weapon)",note:"Enia — Remembrance of the Rot Goddess (Malenia) exchange option.",cat:"weapon"},{id:"a12_i001",text:"Scarlet Aeonia (incantation)",note:"Enia — Malenia Remembrance alt option. Walking mausoleum to duplicate for both.",cat:"spell"},{id:"a12_i002",text:"Marika's Soreseal (Legendary talisman)",note:"Altar inside a room needing a Stonesword Key, Elphael.",cat:"talisman"},{id:"a12_i003",text:"Dragoncrest Greatshield Talisman (Legendary)",note:"Chest inside a cathedral in Elphael (drop through a broken roof to wooden beams).",cat:"talisman"},{id:"a12_i004",text:"Cleanrot Knight Finlay Ashes (Legendary)",note:"Chest near a gazebo, Elphael.",cat:"spirit"},{id:"a12_i005",text:"Silver Scarab",note:"Hidden Path to the Haligtree — chest behind illusory wall.",cat:"talisman"},{id:"a12_i006",tex // ══════════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════════

const CAT_LABELS = {
  weapon:'Weapons', armor:'Armor & Sets', spell:'Spells & Incantations',
  catalyst:'Catalysts / Staves / Seals', talisman:'Talismans', ash:'Ashes of War',
  spirit:'Spirit Ashes', stone:'Smithing Stones & Bell Bearings', key:'Key Items / Quest', npc:'NPC / Quest Notes'
};

const CAT_ORDER = ['weapon','armor','spell','catalyst','talisman','ash','spirit','stone','key','npc'];

function groupItems(items) {
  const groups = {};
  items.forEach(item => {
    if (!groups[item.cat]) groups[item.cat] = [];
    groups[item.cat].push(item);
  });
  return groups;
}

function makeItem(item) {
  const done = !!state[item.id];
  const div = document.createElement('div');
  div.className = 'check-item' + (done?' done':'') + (item.miss?' miss':'') + (item.warn?' warn':'');
  div.id = 'ci-'+item.id;
  div.onclick = () => {
    state[item.id] = !state[item.id];
    div.classList.toggle('done', state[item.id]);
    localStorage.setItem(SK, JSON.stringify(state));
    updateStats();
    updateAreaProgress(item.id);
  };

  const cb = document.createElement('div'); cb.className = 'cb';
  const body = document.createElement('div'); body.className = 'item-body';
  const text = document.createElement('div'); text.className = 'item-text'; text.textContent = item.text;
  body.appendChild(text);
  if (item.note) {
    const note = document.createElement('div'); note.className = 'item-note'; note.textContent = item.note;
    body.appendChild(note);
  }

  div.appendChild(cb);
  div.appendChild(body);

  if (item.miss) {
    const tag = document.createElement('div'); tag.className = 'miss-tag'; tag.textContent = '⚠ MISS';
    div.appendChild(tag);
  } else if (item.warn) {
    const tag = document.createElement('div'); tag.className = 'warn-tag'; tag.textContent = '⚡ WARN';
    div.appendChild(tag);
  }

  return div;
}

function makeArea(area, idx) {
  const total = area.items.length;
  const done = area.items.filter(i => state[i.id]).length;
  const pct = total ? Math.round(done/total*100) : 0;

  const block = document.createElement('div');
  block.className = 'area-block';
  block.id = 'area-'+area.id;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'area-header';
  hdr.innerHTML = `
    <div class="area-num">${String(idx+1).padStart(2,'0')}</div>
    <div>
      <div class="area-title">${area.name}</div>
      <div class="area-subtitle">${area.subtitle}</div>
    </div>
    <div class="area-progress">
      <span class="area-prog-text" id="prog-text-${area.id}">${done}/${total}</span>
      <div class="area-prog-bar"><div class="area-prog-fill" id="prog-fill-${area.id}" style="width:${pct}%"></div></div>
    </div>
    <span class="expand-icon">▾</span>
  `;

  const body = document.createElement('div');
  body.className = 'area-body';

  if (area.story) {
    const sn = document.createElement('div'); sn.className = 'story-note';
    sn.innerHTML = area.story;
    body.appendChild(sn);
  }
  if (area.miss) {
    const mn = document.createElement('div'); mn.className = 'miss-note';
    mn.innerHTML = '<strong>⚠ Missables:</strong> ' + area.miss;
    body.appendChild(mn);
  }
  if (area.warn) {
    const wn = document.createElement('div'); wn.className = 'warn-note';
    wn.innerHTML = '<strong>⚡ Before moving on:</strong> ' + area.warn;
    body.appendChild(wn);
  }

  // Legend
  const leg = document.createElement('div'); leg.className = 'legend';
  leg.innerHTML = '<div class="leg"><div class="leg-bar" style="background:var(--miss)"></div>Missable</div>';
  body.appendChild(leg);

  // Group items by category
  const groups = groupItems(area.items);
  CAT_ORDER.forEach(cat => {
    if (!groups[cat]) return;
    const sec = document.createElement('div'); sec.className = 'cat-section';
    const lbl = document.createElement('div'); lbl.className = 'cat-label';
    const missCount = groups[cat].filter(i=>i.miss).length;
    lbl.innerHTML = `${CAT_LABELS[cat] || cat} <span class="cat-label-count">${groups[cat].length}${missCount?` · <span style="color:var(--miss)">${missCount} missable</span>`:''}`;
    sec.appendChild(lbl);
    groups[cat].forEach(item => sec.appendChild(makeItem(item)));
    body.appendChild(sec);
  });

  hdr.onclick = () => {
    const open = body.classList.toggle('open');
    hdr.classList.toggle('open', open);
  };

  block.appendChild(hdr);
  block.appendChild(body);
  return block;
}

function buildSidebar() {
  const nav = document.getElementById('sidenav');
  nav.innerHTML = '<div class="sn-label">Areas</div>';
  AREAS.forEach((area, idx) => {
    const item = document.createElement('div');
    item.className = 'sn-item';
    item.id = 'sn-'+area.id;
    const done = area.items.filter(i=>state[i.id]).length;
    const total = area.items.length;
    item.innerHTML = `<span>${String(idx+1).padStart(2,'0')}. ${area.name.split('—')[0].split('&')[0].trim()}</span><span class="sn-badge" id="snb-${area.id}">${done}/${total}</span>`;
    item.onclick = () => {
      document.getElementById('area-'+area.id).scrollIntoView({behavior:'smooth'});
    };
    nav.appendChild(item);
  });
}

function updateStats() {
  let done=0, total=0;
  AREAS.forEach(a => {
    total += a.items.length;
    done += a.items.filter(i=>state[i.id]).length;
  });
  document.getElementById('hd').textContent = done;
  document.getElementById('ht').textContent = total;
  document.getElementById('hp').textContent = Math.round(done/total*100)+'%';
}

function updateAreaProgress(itemId) {
  AREAS.forEach(area => {
    if (!area.items.find(i=>i.id===itemId)) return;
    const done = area.items.filter(i=>state[i.id]).length;
    const total = area.items.length;
    const pct = Math.round(done/total*100);
    const pt = document.getElementById('prog-text-'+area.id);
    const pf = document.getElementById('prog-fill-'+area.id);
    const sb = document.getElementById('snb-'+area.id);
    if(pt) pt.textContent = done+'/'+total;
    if(pf) pf.style.width = pct+'%';
    if(sb) sb.textContent = done+'/'+total;
  });
}

function expandAll() { document.querySelectorAll('.area-body').forEach(b=>{ b.classList.add('open'); b.previousElementSibling.classList.add('open'); }); }
function collapseAll() { document.querySelectorAll('.area-body').forEach(b=>{ b.classList.remove('open'); b.previousElementSibling.classList.remove('open'); }); }

// INIT
const main = document.getElementById('main');
AREAS.forEach((area, idx) => main.appendChild(makeArea(area, idx)));
buildSidebar();
updateStats();
</script>
</body>
</html>
