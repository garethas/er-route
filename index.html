<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elden Ring — Full Collectible Route</title>
<style>
:root {
  --gold: #c9a84c;
  --gold-dim: #7a6030;
  --gold-glow: rgba(201,168,76,0.12);
  --bg: #0d0c0a;
  --surface: #141210;
  --surface2: #1c1a16;
  --border: #2a2620;
  --text: #d4cfc4;
  --text-dim: #6a6460;
  --text-bright: #ede8dc;
  --miss: #c44040;
  --miss-bg: #1a0000;
  --warn: #c4902a;
  --warn-bg: #1a1200;
  --green: #4a9e5c;
  --green-bg: #001a08;
  --blue: #5a8fc4;
  --blue-bg: #001020;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: Georgia, serif; font-size: 14px; line-height: 1.5; }

/* HEADER */
header {
  background: linear-gradient(180deg,#1a1610 0%,var(--bg) 100%);
  border-bottom: 1px solid var(--gold-dim);
  padding: 18px 24px 14px;
  display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 20px; color: var(--gold); letter-spacing:.15em; text-transform:uppercase; font-weight:normal; text-shadow:0 0 20px rgba(201,168,76,.4); }
header p { color:var(--text-dim); font-size:11px; letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }
.hdr-stats { display:flex; gap:16px; margin-left:auto; flex-wrap:wrap; }
.hdr-stat { text-align:center; }
.hdr-stat .n { font-size:18px; color:var(--gold); font-weight:bold; display:block; line-height:1; }
.hdr-stat .l { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.07em; display:block; margin-top:2px; }
.hdr-right { display:flex; gap:8px; align-items:center; }
.btn { padding:5px 11px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); cursor:pointer; font-size:11px; letter-spacing:.06em; text-transform:uppercase; border-radius:2px; font-family:inherit; transition:all .1s; }
.btn:hover { border-color:var(--gold-dim); color:var(--gold); }
.btn.danger:hover { border-color:var(--miss); color:var(--miss); }

/* LAYOUT */
.layout { display:flex; min-height:calc(100vh - 90px); }

/* SIDEBAR NAV */
.sidenav {
  width:200px; min-width:200px; background:var(--surface); border-right:1px solid var(--border);
  position:sticky; top:90px; height:calc(100vh - 90px); overflow-y:auto; padding:12px 0;
}
.sidenav::-webkit-scrollbar { width:4px; }
.sidenav::-webkit-scrollbar-thumb { background:var(--border); }
.sn-label { padding:8px 14px 3px; font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; }
.sn-item {
  padding:6px 14px; cursor:pointer; font-size:12px; color:var(--text-dim);
  border-left:2px solid transparent; transition:all .1s; display:flex; justify-content:space-between; align-items:center;
}
.sn-item:hover { background:var(--surface2); color:var(--text); }
.sn-item.active { color:var(--gold); border-left-color:var(--gold); background:var(--gold-glow); }
.sn-badge { font-size:10px; background:var(--surface2); color:var(--text-dim); padding:1px 5px; border-radius:8px; }
.sn-item.active .sn-badge { background:var(--gold-glow); color:var(--gold); }
.sn-sep { border:none; border-top:1px solid var(--border); margin:8px 0; }

/* MAIN CONTENT */
.main { flex:1; padding:0; overflow-y:auto; }

/* AREA BLOCKS */
.area-block {
  border-bottom: 1px solid var(--border);
  scroll-margin-top: 90px;
}
.area-header {
  padding: 16px 24px 12px;
  background: var(--surface);
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  user-select: none;
  transition: background .1s;
}
.area-header:hover { background: var(--surface2); }
.area-num {
  background: var(--gold-dim); color: var(--bg);
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:bold; flex-shrink:0;
}
.area-title { font-size:16px; color:var(--text-bright); letter-spacing:.05em; font-weight:normal; }
.area-subtitle { font-size:11px; color:var(--text-dim); margin-top:2px; }
.area-progress { margin-left:auto; display:flex; align-items:center; gap:10px; }
.area-prog-text { font-size:11px; color:var(--text-dim); white-space:nowrap; }
.area-prog-bar { width:80px; height:4px; background:var(--border); border-radius:2px; }
.area-prog-fill { height:4px; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); border-radius:2px; transition:width .3s; }
.expand-icon { color:var(--text-dim); font-size:14px; margin-left:8px; transition:transform .2s; }
.area-header.open .expand-icon { transform:rotate(180deg); }

.area-body { display:none; padding:16px 24px 20px; }
.area-body.open { display:block; }

/* STORY NOTES */
.story-note {
  background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--gold);
  padding:10px 14px; margin-bottom:14px; border-radius:2px; font-size:13px;
}
.story-note strong { color:var(--gold); }

.miss-note {
  background:var(--miss-bg); border:1px solid #3a0000; border-left:3px solid var(--miss);
  padding:9px 14px; margin-bottom:12px; border-radius:2px; font-size:12px; color:#d07070;
}
.miss-note strong { color:var(--miss); }

.warn-note {
  background:var(--warn-bg); border:1px solid #3a2000; border-left:3px solid var(--warn);
  padding:9px 14px; margin-bottom:12px; border-radius:2px; font-size:12px; color:#d0a060;
}
.warn-note strong { color:var(--warn); }

/* CHECKLIST */
.cat-section { margin-bottom:14px; }
.cat-label {
  font-size:10px; color:var(--gold-dim); text-transform:uppercase; letter-spacing:.12em;
  padding:6px 0 4px; border-bottom:1px solid var(--border); margin-bottom:4px;
  display:flex; justify-content:space-between; align-items:center;
}
.cat-label-count { font-size:10px; color:var(--text-dim); }

.check-item {
  display:flex; align-items:flex-start; gap:9px; padding:5px 8px; border-radius:2px;
  cursor:pointer; transition:background .1s; border:1px solid transparent;
  border-left:2px solid transparent; user-select:none;
}
.check-item:hover { background:var(--surface2); }
.check-item.done { opacity:.4; }
.check-item.done .item-text { text-decoration:line-through; color:var(--text-dim); }
.check-item.miss { border-left-color:var(--miss); }
.check-item.warn { border-left-color:var(--warn); }

.cb {
  width:15px; height:15px; border:1px solid var(--gold-dim); border-radius:2px;
  flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center;
  transition:all .1s;
}
.check-item.done .cb { background:var(--green-bg); border-color:var(--green); }
.check-item.done .cb::after { content:'✓'; color:var(--green); font-size:11px; }

.item-body { flex:1; }
.item-text { font-size:13px; color:var(--text); }
.item-note { font-size:11px; color:var(--text-dim); font-style:italic; margin-top:1px; }
.miss-tag { font-size:9px; background:var(--miss-bg); color:var(--miss); padding:1px 5px; border-radius:3px; flex-shrink:0; margin-top:2px; }
.warn-tag { font-size:9px; background:var(--warn-bg); color:var(--warn); padding:1px 5px; border-radius:3px; flex-shrink:0; margin-top:2px; }

/* LEGEND */
.legend { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:12px; font-size:11px; }
.leg { display:flex; align-items:center; gap:5px; color:var(--text-dim); }
.leg-bar { width:3px; height:14px; border-radius:1px; }

/* SCROLLBAR */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

@media(max-width:700px) { .sidenav { display:none; } }
</style>
</head>
<body>

<header>
  <div>
    <h1>Elden Ring — Full Collectible Route</h1>
    <p>Linear walkthrough · All categories · Base game only</p>
  </div>
  <div class="hdr-right">
    <div class="hdr-stats">
      <div class="hdr-stat"><span class="n" id="hd">0</span><span class="l">Done</span></div>
      <div class="hdr-stat"><span class="n" id="ht">0</span><span class="l">Total</span></div>
      <div class="hdr-stat"><span class="n" id="hp">0%</span><span class="l">Complete</span></div>
    </div>
    <button class="btn" onclick="expandAll()">Expand All</button>
    <button class="btn" onclick="collapseAll()">Collapse</button>
    <button class="btn danger" onclick="if(confirm('Reset all progress?')){localStorage.removeItem(SK);location.reload();}">Reset</button>
  </div>
</header>

<div class="layout">
<nav class="sidenav" id="sidenav"></nav>
<div class="main" id="main"></div>
</div>

const AREAS = [
{id:"a01",name:"Limgrave — West",subtitle:"Stranded Graveyard → Church of Elleh → Stormhill",story:"<strong>Start here before anything else.</strong> Grab the Whetstone Knife at Gatefront Ruins (west of the road) to unlock Ashes of War. Meet Melina after 3 sites of grace — she offers Torrent's Whistle at Gatefront. Return to <strong>Church of Elleh at NIGHT</strong> to meet Ranni (as Renna) for the Spirit Calling Bell + Lone Wolf Ashes. Start <strong>White-Faced Varré's questline</strong> at First Step grace (his chain leads to the Rose Church and eventually a Mohgwyn Palace shortcut). Talk to Roderika 3 times at Stormhill Shack for Spirit Jellyfish Ashes. Ranni's Rise (Three Sisters) is reached later — do <strong>NOT</strong> go there until Rogier's questline at Roundtable is complete, or Rogier is permanently lost.",miss:"⚠ Do <strong>NOT</strong> kill Kalé — he does not die naturally, has no trophy tied to his bell bearing, and is your main cookbook/gesture source all game. ⚠ Meet Ranni at Church of Elleh at night before triggering Ranni's Rise. ⚠ Yura at Seaside Ruins — talk before killing anything in Murkwater or the Nerijus invasion doesn't fire correctly.",items:[{id:"a01_i000",text:"Melina — Spirit Calling Bell",note:"Talk to Melina at Gatefront or Agheel Lake North grace, then travel back to Church of Elleh at NIGHT — Renna gives the Bell + Lone Wolf Ashes. If missed, Twin Maiden Husks eventually sell them.",cat:"key",miss:true},{id:"a01_i001",text:"Talk to Ranni (as Renna) at Church of Elleh",note:"Same event as above — gives Spectral Steed Whistle + Lone Wolf. Not the same as her later questline.",cat:"key",miss:true},{id:"a01_i002",text:"Uchigatana",note:"Deathtouched Catacombs (SW of Summonwater). Skip if you started as Samurai.",cat:"weapon"},{id:"a01_i003",text:"Reduvia",note:"Bloody Finger Nerijus invasion, Murkwater river. YURA QUESTLINE — talk to Yura at Seaside Ruins first for the fuller chain.",cat:"weapon",miss:true},{id:"a01_i004",text:"Bloodstained Dagger",note:"Patches (Murkwater Cave boss). Lower his HP to ~50% to trigger merchant transition.",cat:"weapon"},{id:"a01_i005",text:"Great Épée",note:"Corpse in Stormhill (near Warmaster's Shack).",cat:"weapon"},{id:"a01_i006",text:"Twinblade",note:"Dragon-Burnt Ruins cellar chest, east of Agheel Lake.",cat:"weapon"},{id:"a01_i007",text:"Lordsworn's Greatsword",note:"Gatefront Ruins chest.",cat:"weapon"},{id:"a01_i008",text:"Flail",note:"Gatefront Ruins chest.",cat:"weapon"},{id:"a01_i009",text:"Cipher Pata",note:"Stormhill Shack — on corpse (Roderika's area).",cat:"weapon"},{id:"a01_i010",text:"Blue-Gold Kite Shield",note:"Gatefront Ruins chest.",cat:"weapon"},{id:"a01_i011",text:"Twinbird Kite Shield",note:"Stormgate area, near an Erdtree sapling.",cat:"weapon"},{id:"a01_i012",text:"Meteorite Staff",note:"Street of Sages Ruins tower, Caelid (early rush item — head SE through Mistwood/Fort Faroth).",cat:"catalyst",warn:true},{id:"a01_i013",text:"Dragon Communion Seal",note:"Church of Dragon Communion, Weeping Peninsula (technically WP but grabbed early).",cat:"catalyst"},{id:"a01_i014",text:"Vagabond Knight Set",note:"Deathtouched Catacombs (with Uchigatana).",cat:"armor"},{id:"a01_i015",text:"White Mask (Varré)",note:"Late-game — Nameless White Mask invader at Mohgwyn Palace. Reminder only.",cat:"armor"},{id:"a01_i016",text:"Lone Wolf Ashes",note:"From Renna at Church of Elleh (see key items above).",cat:"spirit"},{id:"a01_i017",text:"Spirit Jellyfish Ashes",note:"Roderika at Stormhill Shack — talk 3 times.",cat:"spirit"},{id:"a01_i018",text:"Wandering Noble Ashes",note:"Corpse propped against a coffin, Stranded Graveyard (starting area).",cat:"spirit"},{id:"a01_i019",text:"Godrick Soldier Ashes",note:"Corpse in Spirit Jellyfish graveyard SW of Stormhill Shack, under Stormveil cliffs.",cat:"spirit"},{id:"a01_i020",text:"Skeletal Militiamen Ashes",note:"Tibia Mariner boss at Summonwater Village.",cat:"spirit"},{id:"a01_i021",text:"Noble Sorcerer Ashes",note: ormveil, near Whistling Ruins, near Mistwood grace.",cat:"key"},{id:"a01_i057",text:"Talisman Pouch (Margit reward)",note:"Drops when you beat Margit — first extra talisman slot.",cat:"key"},{id:"a01_i058",text:"Nomadic Warrior's Cookbook [1]",note:"Kalé at Church of Elleh — 500 runes.",cat:"key"},{id:"a01_i059",text:"Nomadic Warrior's Cookbook [2]",note:"Kalé at Church of Elleh — 500 runes.",cat:"key"},{id:"a01_i060",text:"Nomadic Warrior's Cookbook [3]",note:"Nomadic Merchant east of Saintsbridge — 600 runes.",cat:"key"},{id:"a01_i061",text:"Nomadic Warrior's Cookbook [4]",note:"Corpse on the road, south of Minor Erdtree in Mistwood (near Siofra River well).",cat:"key"},{id:"a01_i062",text:"Nomadic Warrior's Cookbook [5]",note:"Nomadic Merchant SE of Mistwood Ruins — 1500 runes.",cat:"key"},{id:"a01_i063",text:"Nomadic Warrior's Cookbook [6]",note:"Chest at top of main stairs, Fort Haight (Limgrave).",cat:"key"},{id:"a01_i064",text:"Nomadic Warrior's Cookbook [7]",note:"Corpse at end of broken bridge north of Stormveil entrance (near Finger Reader).",cat:"key"},{id:"a01_i065",text:"Armorer's Cookbook [1]",note:"Camp NE of Agheel Lake North grace, Limgrave.",cat:"key"},{id:"a01_i066",text:"Armorer's Cookbook [3]",note:"Nomadic Merchant SE of Mistwood Ruins — 2000 runes.",cat:"key"},{id:"a01_i067",text:"Missionary's Cookbook [1]",note:"Kalé at Church of Elleh — 500 runes.",cat:"key"},{id:"a01_i068",text:"Missionary's Cookbook [2]",note:"Patches' shop (Murkwater Cave, after his merchant transition) — 1500 runes.",cat:"key"},{id:"a01_i069",text:"Fevor's Cookbook [1]",note:"Stormfoot Catacombs, Limgrave — near the staircase from entrance.",cat:"key"},{id:"a01_i070",text:"Deserter's Cookbook [1]",note:"Kalé at Church of Elleh — 150 runes.",cat:"key"},{id:"a01_i071",text:"Deserter's Cookbook [2]",note:"Dragon-Burnt Ruins broken-down house, Limgrave.",cat:"key"},{id:"a01_i072",text:"Larval Tear [1]",note:"East of Agheel Lake South grace — Noble on a cliff transforms into ne Peddler's Bell Bearing.",cat:"npc"},{id:"a01_i086",text:"Ash of War: Quickstep",note:"Purchased from Bernahl at Warmaster's Shack.",cat:"ash"},{id:"a01_i087",text:"Ash of War: Square Off",note:"Purchased from Bernahl.",cat:"ash"},{id:"a01_i088",text:"Ash of War: Stamp (Sweep)",note:"Purchased from Bernahl.",cat:"ash"},{id:"a01_i089",text:"Ash of War: Stamp (Upward Cut)",note:"Purchased from Bernahl.",cat:"ash"},{id:"a01_i090",text:"Ash of War: Double Slash",note:"Purchased from Nomadic Merchant, Weeping Peninsula.",cat:"ash"},{id:"a01_i091",text:"Ash of War: Mighty Shot",note:"Teardrop Scarab (invisible), NE of Warmaster's Shack.",cat:"ash"},{id:"a01_i092",text:"Ash of War: Storm Blade",note:"Teardrop Scarab, southeast of Warmaster's Shack (Limgrave).",cat:"ash"},{id:"a01_i093",text:"Skeletal Militiaman with Bow Ashes",note:"Tibia Mariner boss variant, Summonwater Village.",cat:"spirit"},{id:"a01_i094",text:"Skeletal Bandit Ashes",note:"Tibia Mariner drop, either Wyndham Ruins (Altus) or Summonwater alternate.",cat:"spirit"},{id:"a01_i095",text:"Bone Peddler's Bell Bearing",note:"Bell Bearing Hunter at Warmaster's Shack (night only) — clears the shack of NPCs. Unlocks Thin/Hefty Beast Bones.",cat:"stone"},{id:"a01_i096",text:"Arrow's Reach Talisman",note:"Chest at top of Guard Tower, Gatefront Ruins (Limgrave).",cat:"talisman"},{id:"a01_i097",text:"Furled Finger's Trick-Mirror",note:"Twin Maiden Husks — 5000 Runes (co-op enhancement).",cat:"talisman"},{id:"a01_i098",text:"Host's Trick-Mirror",note:"Twin Maiden Husks — 5000 Runes.",cat:"talisman"},{id:"a01_i099",text:"Two-Handed Sword Talisman",note:"Corpse at Deathtouched Catacombs, near the boss room chest.",cat:"talisman"},{id:"a01_i100",text:"Two-Headed Turtle Talisman",note:"Reward for completing Great-Jar's 3 duelist challenges — actually Caelid but flagged.",cat:"talisman"},{id:"a01_i101",text:"Millicent's Prosthesis / Rotten Winged Sword Insignia",note:"Reminder — later at Millicent choice (Elphael). Do NOT tick here.",cat:"talisman"},{id:"a01_i102",text:"Finger Seal",note:"Starting equipment (Prophet class) or bought from Twin Maiden Husks for 800 runes.",cat:"catalyst"},{id:"a01_i103",text:"Torch",note:"Starting equipment / Kalé for 200 runes.",cat:"catalyst"},{id:"a01_i104",text:"Lantern",note:"Nomadic Merchant, Weeping Peninsula (1800 runes) or Isolated Merchant.",cat:"catalyst"},{id:"a01_i105",text:"Sentry's Torch",note:"Chest at Highroad Cave, Limgrave.",cat:"catalyst"},{id:"a01_i106",text:"Ash of War: Bloody Slash",note:"Nomadic Warrior's Cookbook style item — actually from a Teardrop Scarab east of Fort Haight, Limgrave.",cat:"ash"},{id:"a01_i107",text:"Ash of War: Vacuum Slice",note:"Teardrop Scarab, Weeping Peninsula.",cat:"ash"},{id:"a01_i108",text:"Ash of War: Storm Wall",note:"Teardrop Scarab east of Stormveil Cliffs.",cat:"ash"},{id:"a01_i109",text:"Ash of War: Assassin's Gambit",note:"Deathtouched Catacombs.",cat:"ash"},{id:"a01_i110",text:"Ash of War: Prayerful Strike",note:"Purchased from a Nomadic Merchant, Weeping Peninsula.",cat:"ash"},{id:"a01_i111",text:"Ash of War: Piercing Fang",note:"Yura questline — killing the Bloody Finger invader after speaking with Yura at Seaside Ruins.",cat:"ash"},{id:"a01_i112",text:"Ash of War: Raptor of the Mists",note:"Yura questline — help him at Raya Lucaria bridge (invasion sigil north of main gate).",cat:"ash",miss:true},{id:"a01_i113",text:"Swift Glintstone Shard",note:"Sellen sells.",cat:"spell"},{id:"a01_i114",text:"Glintstone Pebble",note:"Astrologer starting spell / Sellen sells.",cat:"spell"},{id:"a01_i115",text:"Vagabond Set",note:"Starting equipment (Vagabond class).",cat:"armor"},{id:"a01_i116",text:"Warrior Set",note:"Starting equipment (Warrior class).",cat:"armor"},{id:"a01_i117",text:"Bloody Wolf Set",note:"Ensha invades at Roundtable after 2 Great Runes (kill for set).",cat:"armor"},{id:"a01_i118",text:"Chain Armor Set",note:"Kalé sells.",cat:"armor"},{id:"a01_i119",text:"Deathbed Dress (reminder)",note:"Reminder — Fia questline.",cat:"armor"},{id:"a01_i120",text:"Scavenger's Curved Sword",note:"Loot in a cave, Limgrave.",cat:"weapon"},{id:"a01_i121",text:"Great Club",note:"Wretch's / Wanderer drop.",cat:"weapon"},{id:"a01_i122",text:"Large Club",note:"Common drop.",cat:"weapon"},{id:"a01_i123",text:"Nightrider Glaive",note:"Night's Cavalry, Limgrave Bridge (night only) — alternate weapon set.",cat:"weapon"},{id:"a01_i124",text:"Nightrider Flail",note:"Night's Cavalry, Weeping Peninsula (night) — alternate.",cat:"weapon"},{id:"a01_i125",text:"Great Rune of the Grafted (Godrick) — restore",note:"Divine Tower of Limgrave (via Stormveil Castle).",cat:"key"}]},
{id:"a02",name:"Weeping Peninsula",subtitle:"Optional but efficient to clear now",story:"Small self-contained area. Mostly weapons, one spirit ash, one ash of war. <strong>IRINA/EDGAR (feeds into Hyetta questline later):</strong> Talk to Irina on the road south, take her letter to Edgar at Castle Morne. Do not kill Edgar. Her questline resolves with her death; Edgar then travels to find her body. This resolution is the trigger for Hyetta to appear in Liurnia — if you never do this, Hyetta's questline (and the Frenzied Flame Seal) is inaccessible.",warn:"⚠ Hyetta will NOT appear in Liurnia until Irina's questline has resolved and Edgar has found her body. Do this early — it's a slow-burn prerequisite for a whole separate questline later.",items:[{id:"a02_i000",text:"Talk to Irina on the road south (starts Hyetta prereq)",note:"Take her letter to Edgar at Castle Morne. DO NOT KILL EDGAR — he must survive Castle Morne. Her death + Edgar finding her body is the trigger for Hyetta to appear in Liurnia.",cat:"key",miss:true},{id:"a02_i001",text:"Grafted Blade Greatsword (Legendary)",note:"Leonine Misbegotten boss, Castle Morne.",cat:"weapon"},{id:"a02_i002",text:"Winged Scythe",note:"Tombsward Ruins chest (Imp Statue seal needs a Stonesword Key).",cat:"weapon"},{id:"a02_i003",text:"Claymore",note:"Castle Morne, sitting on a barrel in the invaded courtyard.",cat:"weapon"},{id:"a02_i004",text:"Erdsteel Dagger",note:"Castle Morne ramparts.",cat:"weapon"},{id:"a02_i005",text:"Crystal Knife",note:"Morne Tunnel.",cat:"weapon"},{id:"a02_i006",text:"Sacrificial Axe",note:"Impaler's Catacombs, Weeping Peninsula.",cat:"weapon"},{id:"a02_i007",text:"Lhutel the Headless Ashes (Legendary)",note:"Cemetery Shade boss, Tombsward Catacombs.",cat:"spirit"},{id:"a02_i008",text:"Demi-Human Ashes",note:"Erdtree Burial Watchdog, Impaler's Catacombs.",cat:"spirit"},{id:"a02_i009",text:"Winged Misbegotten Ashes",note:"Later — Unsightly Catacombs, Altus. Not here.",cat:"spirit"},{id:"a02_i010",text:"Viridian Amber Medallion",note:"Miranda the Blighted Bloom, Tombsward Cave.",cat:"talisman"},{id:"a02_i011",text:"Twinblade Talisman",note:"Chest in the tower SW of Castle Morne.",cat:"talisman"},{id:"a02_i012",text:"Spelldrake Talisman",note:"Runebear, Earthbore Cave.",cat:"talisman"},{id:"a02_i013",text:"Crimson Amber Medallion",note:"Nomadic Merchant at Castle Morne Rampart grace — 1500 Runes.",cat:"talisman"},{id:"a02_i014",text:"Ash of War: Barricade Shield",note:"Night's Cavalry, road near Castle Morne Rampart grace (night only).",cat:"ash"},{id:"a02_i015",text:"Ash of War: Spinning Strikes",note:"Purchased from a merchant, Weeping Peninsula.",cat:"ash"},{id:"a02_i016",text:"Golden Seed (x2)",note:"At the base of saplings on Weeping Peninsula.",cat:"key"},{id:"a02_i017",text:"Sacred Tear",note:"Church of Pilgrimage.",cat:"key"},{id:"a02_i018",text:"Beast-Repellent Torch (Dragonbarrow)",note:"Isolated Merchant at Isolated Merchant's Shack, Dragonbarrow (NOT Kalé). Repels wolves/dogs.",cat:"catalyst"},{id:"a02_i019",text:"Nomadic Warrior's Cookbook [8]",note:"Corpse inside Tombsward Cave, Weeping Peninsula.",cat:"key"},{id:"a02_i020",text:"Nomadic Warrior's Cookbook [9]",note:"Tombsward Catacombs (requires a Stonesword Key).",cat:"key"},{id:"a02_i021",text:"Armorer's Cookbook [2]",note:"Nomadic Merchant near Coastal Cave / Dissenter's Cave — 600 runes.",cat:"key"},{id:"a02_i022",text:"Crimsonburst Crystal Tear",note:"Erdtree Avatar at the Minor Erdtree, Weeping Peninsula (near Tombsward grace).",cat:"key"},{id:"a02_i023",text:"Opaline Bubbletear",note:"Second drop from the Erdtree Avatar at Weeping Peninsula Minor Erdtree.",cat:"key"},{id:"a02_i024",text:"Sacred Tear — Church of Pilgrimage",note:"Corpse in the church, Weeping Peninsula.",cat:"key"},{id:"a02_i025",text:"Golden Seeds — Weeping Peninsula (2 saplings)",note:"Near Castle Morne Rampart, and near Tombsward Ruins.",cat:"key"},{id:"a02_i026",text:"Ash of War: Shield Bash",note:"Purchased from Nomadic Merchant.",cat:"ash"}]},
{id:"a03",name:"Stormveil Castle",subtitle:"Margit → Godrick",story:"Buy all Gostoc's stock BEFORE killing Godrick (he re-opens shop later but easier to grab now). Gostoc does <strong>NOT</strong> die — after Godrick he relocates to the throne room and continues as a merchant. After Nepheli questline finishes he sells an Ancient Dragon Smithing Stone. <strong>NEPHELI QUESTLINE:</strong> 1) Talk to her at the Secluded Cell (before Godrick), free her — she can be summoned for the Godrick fight. 2) Talk to her at Roundtable after Godrick. 3) Give her the Stormhawk King (Chapel of Anticipation, via Four Belfries — needs an Imbued Sword Key) at Roundtable. 4) After defeating Morgott, rest at Godrick grace: she, Kenneth Haight and Gostoc appear in the throne room. Reward: Ancient Dragon Smithing Stone from Nepheli + Gostoc's expanded shop.",miss:"⚠ Gostoc does not die — killing him only forfeits his shop (including a late Ancient Dragon Smithing Stone). No trophy tied to his bell bearing. ⚠ NEPHELI/SELUVIS POTION: Seluvis will offer you a potion \"for Nepheli\" once Ranni's quest is underway. Do NOT give it to Nepheli — that turns her into a Seluvis puppet and voids her real questline. Give it to Dung Eater instead (or hold it) if you want the Nepheli throne-room ending. ⚠ Rogier is in a stairwell in Stormveil after Godrick's boss room — talk to him and exhaust dialogue, or his Roundtable chain won't advance.",items:[{id:"a03_i000",text:"Godslayer's Seal",note:"Stormveil basement chest (near Godrick teleport trap).",cat:"catalyst"},{id:"a03_i001",text:"Golden Halberd",note:"Tree Sentinel or Stormveil captain drop.",cat:"weapon"},{id:"a03_i002",text:"Rusted Anchor",note:"Corpse in Stormveil.",cat:"weapon"},{id:"a03_i003",text:"Grafted Dragon (fist weapon)",note:"Enia — Remembrance of the Grafted (Godrick) exchange option.",cat:"weapon"},{id:"a03_i004",text:"Axe of Godrick (Greataxe)",note:"Enia — Remembrance of the Grafted (Godrick) exchange option. Walking mausoleum to duplicate for both.",cat:"weapon"},{id:"a03_i005",text:"Whip",note:"Stormveil purple mist inside castle.",cat:"weapon"},{id:"a03_i006",text:"Warhawk Ashes",note:"Complete the Painting Puzzle inside Stormveil.",cat:"spirit"},{id:"a03_i007",text:"Fell Omen Cloak",note:"Margit reward (from Furled Finger — not tied to boss actually — sold by Twin Maiden Husks after certain progression).",cat:"armor"},{id:"a03_i008",text:"Blaidd Set",note:"Blaidd — dies at end of Ranni questline (from Iji).",cat:"armor",miss:true},{id:"a03_i009",text:"Curved Sword Talisman",note:"Chest in Gostoc's dark room, near Stormveil starting grace.",cat:"talisman"},{id:"a03_i010",text:"Claw Talisman",note:"Corpse on the Rampart Tower rooftop (jumping between wooden platforms).",cat:"talisman"},{id:"a03_i011",text:"Prince of Death's Pustule",note:"Under Stormveil after Ulcerated Tree Spirit (Rogier tells you about the black knife — corpse behind a wall).",cat:"talisman"},{id:"a03_i012",text:"Ash of War: Stormcaller",note:"Teardrop Scarab, north section of Stormveil Castle.",cat:"ash"},{id:"a03_i013",text:"Ash of War: Storm Assault",note:"Teardrop Scarab, Stormveil Castle.",cat:"ash"},{id:"a03_i014",text:"Ash of War: Barbaric Roar",note:"Teardrop Scarab in Stormveil (rooftop).",cat:"ash"},{id:"a03_i015",text:"Shabriri Grape #1 (for Hyetta later)",note:"Stormveil basement, after Godrick — a corpse next to a phantom by the ladder down. Give to Hyetta at Lake-Facing Cliffs grace.",cat:"key",miss:true},{id:"a03_i016",text:"Godrick's Great Rune",note:"Godrick boss reward — restore at Limgrave Divine Tower.",cat:"key"},{id:"a03_i017",text:"Talisman Pouch (Godrick reward)",note:"From Godrick boss.",cat:"key"},{id:"a03_i018",text:"Rogier questline — items after Godrick",note:"Talk to Rogier in Roundtable Hold after Godrick; exhaust dialogue; he investigates. Chain: black knife wound → send you to find the black knife assassin → he moves to Liurnia (Raya Lucaria). DO THIS BEFORE talking to Ranni at Ranni's Rise or his questline breaks. Rewards later: Rogier's Rapier +8, Rogier's Bell Bearing.",cat:"key",miss:true},{id:"a03_i019",text:"Nepheli questline — start",note:"Talk to Gideon in Roundtable, then Nepheli when she appears at Godrick boss room door. Give her Stormhawk King (Chapel of Anticipation) — but see Nepheli chain in later areas.",cat:"key",miss:true},{id:"a03_i020",text:"Nomadic Warrior's Cookbook [10]",note:"Corpse in Stormveil Castle, near Rampart Tower grace — jump to roof to the east.",cat:"key"},{id:"a03_i021",text:"Painting: Warhawk",note:"Master painting in Stormveil (basement area). Solution: near Rampart Tower grace on top of a fallen tower — reward is Warhawk Ashes.",cat:"key"},{id:"a03_i022",text:"Chrysalids' Memento",note:"Elite Godrick Knight drop, Stormveil dining hall area. Give to Hewg to unlock Roderika's move to Roundtable.",cat:"key"},{id:"a03_i023",text:"Erdtree's Favor (if missed)",note:"Reminder — Fringefolk Hero's Grave.",cat:"talisman"},{id:"a03_i024",text:"Godrick Soldier Set",note:"Common Godrick soldier drops.",cat:"armor"},{id:"a03_i025",text:"Godrick Knight Set",note:"Godrick knights inside Stormveil.",cat:"armor"},{id:"a03_i026",text:"Banished Knight Set",note:"Banished Knight enemies inside Stormveil.",cat:"armor"},{id:"a03_i027",text:"Vulgar Militia Set",note:"Enemy drop, Stormveil.",cat:"armor"},{id:"a03_i028",text:"Foot Soldier Set",note:"Common drop.",cat:"armor"},{id:"a03_i029",text:"Stormhawk Axe",note:"Stormhawk Knight drop, Stormveil.",cat:"weapon"},{id:"a03_i030",text:"Banished Knight's Halberd",note:"Banished Knight drops.",cat:"weapon"},{id:"a03_i031",text:"Banished Knight's Sword",note:"Banished Knight drops.",cat:"weapon"},{id:"a03_i032",text:"Beast Champion Set (reminder)",note:"Reminder — Farum Azula.",cat:"armor"}]},
{id:"a03b",name:"The Stormhawk King — deferred pickup",subtitle:"Chapel of Anticipation, via Four Belfries (Ranni quest side-item) — collect once you have an Imbued Sword Key",story:"This is a KEY ITEM, not a usable spirit ash (that's the separate Stormhawk Deenh, tracked in Liurnia). Use an Imbued Sword Key on the \"Precipice of Anticipation\" belfry at The Four Belfries to return to the game's opening Chapel. Defeat the Grafted Scion again, go through the previously-locked side door, up to the rooftop.",miss:"⚠ Must give this to Nepheli at Roundtable Hold AFTER defeating Morgott to complete her questline — she then relocates to the Stormveil throne room as its ruler. If you pick this up before talking to Nepheli/Gideon properly it can brick her line, so do the Roundtable Hold steps in Stormveil/a03 first.",items:[{id:"a03b_i000",text:"Stormhawk King (key item)",note:"Chapel of Anticipation, via Four Belfries — needs Imbued Sword Key. Second floor wooden platform. Give to Nepheli. NOT the Stormhawk Deenh spirit ash — different item.",cat:"key",miss:true},{id:"a03b_i001",text:"Stormhawk Deenh (Spirit Ash)",note:"Same location — Chapel of Anticipation, on the wooden platforms 2nd floor.",cat:"spirit",miss:true},{id:"a03b_i002",text:"Note: All Sites of Grace region-explored trophies",note:"Every major region (Limgrave, Liurnia, Caelid, Altus, etc.) awards a trophy for exploring most graces there. Simply visit graces as you play.",cat:"key"}]},
{id:"a04",name:"Liurnia of the Lakes — West & South",subtitle:"Post-Stormveil / Raya Lucaria approach",story:"<strong>RANNI QUESTLINE — correct order:</strong> 1) Talk to Ranni at Ranni's Rise (Three Sisters, NW of Caria Manor), agree to serve her. 2) Downstairs, talk to Iji, Seluvis, AND Blaidd — all three, this unlocks the barrier. 3) Seluvis gives a letter for Sellen (Waypoint Ruins) — talk to her, she explains Radahn must fall. 4) Return to Blaidd at Siofra River and tell him what Sellen said — this is what actually triggers the Radahn Festival. Do NOT skip talking to Blaidd afterward.",warn:"⚠ ROGIER CONFLICT: If you talk to Ranni at Three Sisters BEFORE finishing Sorcerer Rogier's questline (Stormveil/Roundtable Hold), his questline gets permanently blocked. Finish Rogier first if you want his items. ⚠ RADAHN FESTIVAL: community reports disagree on the exact trigger — some say only talking to Blaidd after Sellen starts it, others report it firing just from visiting Altus Plateau (Dectus Lift or any grace there) regardless of Ranni progress. SAFEST PLAY: don't touch Altus Plateau at all until you've completed steps 1-4 of Ranni's quest above. Buy all of Sellen's stock. Buy Thops' stock. Patches moves here from Murkwater. ⚠ SELLEN QUESTLINE (full chain, ends in Liurnia — Raya Lucaria Grand Library): 1) Accept to study under Sellen here (Waypoint Ruins cellar, behind Mad Pumpkin Head) — unlocks her main quest, not just her shop. 2) Beat Rennala, then return here — she gives another task. 3) Beat Radahn (Redmane Castle), talk to Witch-Hunter Jerren (north of the Chamber Outside the Plaza grace). 4) Go to Witchbane Ruins (Weeping Peninsula, south of Fourth Church of Marika) — Sellen's body is here, interact to transplant the Primal Glintstone. Jerren should also be here — exhaust his dialogue (revisit Redmane first if he's missing). 5) Go to the illusory floor between Ranni's Rise and Seluvis's Rise (Three Sisters, Liurnia), break the illusory wall, find Sellen's body again, transplant the Primal Glintstone a second time. 6) Return to Witchbane Ruins — Jerren has killed this Sellen body, exhaust his dialogue. 7) At Raya Lucaria Grand Library grace, near the lift, two summon signs appear — gold (help Sellen, fight Jerren) or red (help Jerren, fight Sellen). ⚠ TRICK: siding with Jerren then killing HIM separately afterward, outside the library (he gives you a stone first) reportedly gets you rewards from both sides in one playthrough — but community sources note that killing Sellen this way may lock the Azur/Lusat armor sets until NG+, so weigh that tradeoff. Sellen-side reward: Eccentric Set (Jerren's armor) + Glintstone Kris + Shard Spiral spell. Jerren-side reward: Witch's Glintstone Crown + Sellen's Bell Bearing (buy her remaining sorceries from Twin Maiden Husks) + an Ancient Dragon Smithing Stone.",items:[{id:"a04_i000",text:"Meteoric Ore Blade",note:"Caelid Wailing Dunes (near Rot Blessing) OR Nokstella. Notes for later.",cat:"weapon"},{id:"a04_i001",text:"Estoc",note:"Corpse near Purified Ruins.",cat:"weapon"},{id:"a04_i002",text:"Jellyfish Shield",note:"Corpse near Purified Ruins.",cat:"weapon"},{id:"a04_i003",text:"Icerind Hatchet",note:"Temple Quarter, chest guarded by a Bloodhound Knight.",cat:"weapon"},{id:"a04_i004",text:"Ringed Finger",note:"Ainsel River path start (technically underground but reminder).",cat:"weapon"},{id:"a04_i005",text:"Flame of the Fell God (Legendary spell)",note:"Adan, Thief of Fire at Malefactor's Evergaol, south Liurnia. Requires 41 Faith to cast.",cat:"spell"},{id:"a04_i006",text:"Thops (NPC)",note:"Church of Irith. Buy Academy Glintstone Key from him → he moves to Schoolhouse Classroom in Raya Lucaria. Bring him a second key later for reward.",cat:"npc"},{id:"a04_i007",text:"Sellen questline — Waypoint Ruins",note:"Talk to Sellen in the Waypoint Ruins cellar (defeat Mad Pumpkin Head first). Accept her tutelage — starts the questline. She sells Glintstone spells. See full chain in warn text.",cat:"key",miss:true},{id:"a04_i008",text:"Sellen questline — after Radahn (return here)",note:"After beating Radahn, return to Sellen — she asks you to find her real body. Continue chain at Witchbane Ruins (WP) → Three Sisters illusory floor → Raya Lucaria Grand Library.",cat:"key",miss:true},{id:"a04_i009",text:"Rya questline — start",note:"Rya near the pavilion by Scenic Isle grace, Liurnia — she asks you to find her necklace. Kill Bols in Cuckoo's Evergaol for the necklace. Return it — she gives Volcano Manor Invitation. This is REQUIRED for Blackguard Big Boggart and later Dung Eater Seedbed Curse #6.",cat:"key",miss:true},{id:"a04_i010",text:"Digger's Staff",note:"Village of the Albinaurics.",cat:"catalyst"},{id:"a04_i011",text:"Academy Glintstone Staff",note:"Purchased from Sellen (or Thops).",cat:"catalyst"},{id:"a04_i012",text:"Carian Glintstone Staff",note:"Twin Maiden Husks (after fulfilling requirement) OR loot near Caria Manor.",cat:"catalyst"},{id:"a04_i013",text:"Two Fingers Heirloom",note:"Chest under the Purified Ruins (Liurnia).",cat:"talisman"},{id:"a04_i014",text:"Cerulean Amber Medallion",note:"Bloodhound Knight, Lakeside Crystal Cave.",cat:"talisman"},{id:"a04_i015",text:"Winged Sword Insignia",note:"Cleanrot Knight, Stillwater Cave.",cat:"talisman"},{id:"a04_i016",text:"Cerulean Seed Talisman",note:"Top of Carian Study Hall (get Ranni's Inverted Statue to flip the study hall).",cat:"talisman"},{id:"a04_i017",text:"Crucible Knot Talisman",note:"Omenkiller boss, Village of the Albinaurics.",cat:"talisman"},{id:"a04_i018",text:"Shabriri's Woe",note:"Corpse in Frenzied Flame Village (near Church of Inhibition path).",cat:"talisman"},{id:"a04_i019",text:"Stalwart Horn Charm",note:"Mausoleum Compound SW corpse, Liurnia.",cat:"talisman"},{id:"a04_i020",text:"Spear Talisman",note:"Lakeside Crystal Cave chest.",cat:"talisman"},{id:"a04_i021",text:"Assassin's Cerulean Dagger",note:"Black Knife Assassin, Black Knife Catacombs (Liurnia north).",cat:"talisman"},{id:"a04_i022",text:"Radagon Icon (Legendary talisman)",note:"Academy of Raya Lucaria — Debate Parlor 2nd Floor chest.",cat:"talisman"},{id:"a04_i023",text:"Glintstone Sorcerer Ashes",note:"Erdtree Burial Watchdog at Road's End Catacombs.",cat:"spirit"},{id:"a04_i024",text:"Twinsage Sorcerer Ashes",note:"Cemetery Shade at Black Knife Catacombs (Liurnia).",cat:"spirit"},{id:"a04_i025",text:"Raya Lucaria Soldier Ashes",note:"Road's End Catacombs — illusory wall chest near end.",cat:"spirit"},{id:"a04_i026",text:"Marionette Soldier Ashes",note:"Academy of Raya Lucaria graveyard area.",cat:"spirit"},{id:"a04_i027",text:"Land Squirt Ashes",note:"South of Eastern Liurnia Lake Shore grace.",cat:"spirit"},{id:"a04_i028",text:"Kaiden Sellsword Ashes",note:"Erdtree Burial Watchdog at Cliffbottom Catacombs.",cat:"spirit"},{id:"a04_i029",text:"Page Ashes",note:"Cliffbottom Catacombs final area (near a tomb).",cat:"spirit"},{id:"a04_i030",text:"Ash of War: Carian Grandeur",note:"Cuckoo Knight drop (Raya Lucaria).",cat:"ash"},{id:"a04_i031",text:"Ash of War: Sword Dance",note:"Teardrop Scarab near the Minor Erdtree, southwest Liurnia.",cat:"ash"},{id:"a04_i032",text:"Ash of War: Golden Vow",note:"Purchased from Bernahl (if not already).",cat:"ash"},{id:"a04_i033",text:"Ash of War: Charge Forth",note:"Teardrop Scarab, Liurnia (near Scenic Isle).",cat:"ash"},{id:"a04_i034",text:"Ash of War: Hoarfrost Stomp",note:"Teardrop Scarab (invisible), east of Caria Manor (SE of grace).",cat:"ash"},{id:"a04_i035",text:"Ash of War: Carian Glintsword",note:"Teardrop Scarab, Liurnia.",cat:"ash"},{id:"a04_i036",text:"Golden Seed x4+",note:"Multiple saplings scattered around Liurnia.",cat:"key"},{id:"a04_i037",text:"Sacred Tear (x3)",note:"Church of Vows + Church of Inhibition + Ainsel River area.",cat:"key"},{id:"a04_i038",text:"Boc the Seamster — start",note:"Cursed body-shaped growth near Agheel Lake North (Limgrave); free him with a hit → follow to Coastal Cave. Gets Golden Sewing Needle at Church of Vows (Liurnia). Unlocks alterable/recolourable legendary armor via Enia.",cat:"key",miss:true},{id:"a04_i039",text:"Hyetta questline — Shabriri Grape #2 (Purified Ruins cellar)",note:"Break the wooden floor in the Purified Ruins cellar (Liurnia). Give to Hyetta after she moves here. Two Fingers Heirloom talisman is also in the same room.",cat:"key",miss:true},{id:"a04_i040",text:"Hyetta questline — Shabriri Grape #3 (Revenger's Shack)",note:"Rest at grace in Revenger's Shack (N of Minor Erdtree, west Liurnia). Edgar the Revenger invades — kill him. Give grape to Hyetta at Gate Town Bridge grace and TELL HER THE TRUTH about the grapes (mandatory).",cat:"key",miss:true},{id:"a04_i041",text:"Fingerprint Grape (for Hyetta)",note:"Kill Festering Fingerprint Vyke invader near Church of Inhibition (through Frenzied Flame Village). Give to Hyetta at Bellum Church.",cat:"key",miss:true},{id:"a04_i042",text:"Nomadic Warrior's Cookbook [11]",note:"Merchant south of Liurnia Lake Shore grace — 1500 runes.",cat:"key"},{id:"a04_i043",text:"Nomadic Warrior's Cookbook [12]",note:"South walls of Rose Church, Liurnia (near where Varré moves).",cat:"key"},{id:"a04_i044",text:"Nomadic Warrior's Cookbook [13]",note:"Nomadic Merchant north of Bellum Church grace — 2000 runes.",cat:"key"},{id:"a04_i045",text:"Glintstone Craftsman's Cookbook [1]",note:"Nomadic Merchant south of Liurnia Lake Shore grace — 1500 runes.",cat:"key"},{id:"a04_i046",text:"Glintstone Craftsman's Cookbook [2]",note:"Chest in Church of Irith, Liurnia.",cat:"key"},{id:"a04_i047",text:"Glintstone Craftsman's Cookbook [5]",note:"Corpse near Highroad Cave (Limgrave/Liurnia border).",cat:"key"},{id:"a04_i048",text:"Missionary's Cookbook [3]",note:"Kalé sells for 1000 runes.",cat:"key"},{id:"a04_i049",text:"Missionary's Cookbook [4]",note:"Nomadic Merchant Liurnia.",cat:"key"},{id:"a04_i050",text:"Frenzied's Cookbook [1]",note:"Corpse in a house on the west side of Frenzied Flame Village, Liurnia.",cat:"key"},{id:"a04_i051",text:"Larval Tear [3]",note:"Between Rose Church and Boilprawn Shack — Giant Crayfish transforms into a Grafted Scion.",cat:"key"},{id:"a04_i052",text:"Larval Tear [4]",note:"Graveyard body at Village of the Albinaurics (SW Liurnia below Moonlight Altar).",cat:"key"},{id:"a04_i053",text:"Cerulean Crystal Tear [1]",note:"Erdtree Avatar at Minor Erdtree, SW Liurnia (west of Revenger's Shack).",cat:"key"},{id:"a04_i054",text:"Ruptured Crystal Tear [1]",note:"Second drop from the Liurnia Minor Erdtree Erdtree Avatar (near Revenger's Shack).",cat:"key"},{id:"a04_i055",text:"Intelligence-knot Crystal Tear",note:"Altar at foot of cliff south of Caria Manor, Liurnia.",cat:"key"},{id:"a04_i056",text:"Faith-knot Crystal Tear",note:"Altar northeast of Road to the Manor grace, Liurnia — guarded by Spider Hand enemies.",cat:"key"},{id:"a04_i057",text:"Magic-shrouding Cracked Tear",note:"Altar under Minor Erdtree NE of Church of Vows / near Frenzied Flame Village, Liurnia.",cat:"key"},{id:"a04_i058",text:"Winged Crystal Tear",note:"Altar on shores north of Demi-Human Forest Ruins, Liurnia — guarded by Miranda Sprouts.",cat:"key"},{id:"a04_i059",text:"Strength-knot Crystal Tear",note:"Altar on cliff NE of Stormhill Shack (technically Limgrave/Liurnia border).",cat:"key"},{id:"a04_i060",text:"Sacred Tear — Church of Vows",note:"Corpse in the church, Liurnia.",cat:"key"},{id:"a04_i061",text:"Sacred Tear — Church of Inhibition",note:"Corpse in the church, Liurnia (past the Frenzy-Flaming Tower).",cat:"key"},{id:"a04_i062",text:"Sacred Tear — Purified Ruins",note:"Corpse in the ruins.",cat:"key"},{id:"a04_i063",text:"Golden Seeds — Liurnia West/South (7 saplings)",note:"Around Academy Gate Town, Church of Vows, near Lake shore, near Purified Ruins, near Boilprawn Shack.",cat:"key"},{id:"a04_i064",text:"Painting: Prophecy",note:"Artist's Shack near Kingsrealm Ruins, Liurnia. Solution: south of the Sorcerer's Isle.",cat:"key"},{id:"a04_i065",text:"Royal House Scroll orcerer Set",note:"Chest at Church of Irith or loot.",cat:"armor"},{id:"a04_i102",text:"Twinsage Sorcerer Set",note:"Enemy drop, Raya Lucaria.",cat:"armor"},{id:"a04_i103",text:"Cuckoo Knight Set",note:"Enemy drop.",cat:"armor"},{id:"a04_i104",text:"Rotten Duelist Set",note:"Sellia Crystal Tunnel (Caelid reminder).",cat:"armor"},{id:"a04_i105",text:"Fingerprint Set",note:"Sold by Nomadic Merchant, Frenzied Flame Village.",cat:"armor"},{id:"a04_i106",text:"Snow Witch Set",note:"Testu's Rise chest (Liurnia).",cat:"armor"},{id:"a04_i107",text:"Karolos Glintstone Crown",note:"Glintstone Preceptor drops.",cat:"armor"},{id:"a04_i108",text:"Olivinus Glintstone Crown",note:"Glintstone Preceptor drops.",cat:"armor"},{id:"a04_i109",text:"Twinsage Glintstone Crown",note:"Glintstone Preceptor drops.",cat:"armor"},{id:"a04_i110",text:"Haima Glintstone Crown",note:"Testu's Rise, Liurnia.",cat:"armor"},{id:"a04_i111",text:"Lazuli Glintstone Crown",note:"Chest in Academy or loot.",cat:"armor"},{id:"a04_i112",text:"Bloodhound's Fang",note:"Bloodhound Knight Darriwil, Forlorn Hound Evergaol (Limgrave — reminder).",cat:"weapon"},{id:"a04_i113",text:"Nox Flowing Hammer",note:"Nokstella enemy drop (reminder).",cat:"weapon"},{id:"a04_i114",text:"Full Moon Crossbow (reminder)",note:"Raya Lucaria (already tracked).",cat:"weapon"},{id:"a04_i115",text:"Godskin Peeler (reminder)",note:"Farum Azula (already tracked).",cat:"weapon"},{id:"a04_i116",text:"Great Turtle Shell",note:"Chest in Church of Vows or Chapel of Anticipation area.",cat:"weapon"},{id:"a04_i117",text:"Halo Scythe",note:"Wandering Nobles at night (particular locations).",cat:"weapon"},{id:"a04_i118",text:"Great Rune of the Unborn (Rennala)",note:"Rennala reward. Used for respecing.",cat:"key"}]},
{id:"a05",name:"Raya Lucaria Academy",subtitle:"Rennala",story:"Full loot run of the Academy before and after Rennala. Buy Miriel's stock at Church of Vows (east Liurnia).",warn:"Get Crystal Staff from library chest. Radagon Icon talisman is in a chest here — Legendary.",items:[{id:"a05_i000",text:"Rennala's Full Moon (Legendary Sorcery)",note:"Enia — Remembrance of the Full Moon Queen (Rennala) exchange option.",cat:"spell"},{id:"a05_i001",text:"Carian Regal Scepter (Staff)",note:"Enia — Rennala Remembrance alt option (NOT a Legendary Armament). Walking mausoleum to duplicate for both.",cat:"catalyst"},{id:"a05_i002",text:"Carian Knight's Sword",note:"Chest at Academy Gate Town.",cat:"weapon"},{id:"a05_i003",text:"Lazuli Glintstone Sword",note:"Glintstone Sorcerer drop, Academy.",cat:"weapon"},{id:"a05_i004",text:"Full Moon Crossbow",note:"Crystalian Crossbowman drop.",cat:"weapon"},{id:"a05_i005",text:"Crystal Sword",note:"Crystalian drop.",cat:"weapon"},{id:"a05_i006",text:"Rotten Crystal Sword",note:"Sellia Crystal Tunnel (Caelid).",cat:"weapon"},{id:"a05_i007",text:"Carian Glintblade Staff",note:"Corpse on Academy roof.",cat:"catalyst"},{id:"a05_i008",text:"Graven-School Talisman",note:"Illusory bookshelf before Red Wolf of Radagon (attack it).",cat:"talisman"},{id:"a05_i009",text:"Longtail Cat Talisman",note:"Bottom of the Academy elevator (burnt corpse).",cat:"talisman"},{id:"a05_i010",text:"Stonesword Key x2 in Academy",note:"Various — one behind an illusory wall.",cat:"key"},{id:"a05_i011",text:"Great Glintstone Shard",note:"Loot in Academy.",cat:"spell"},{id:"a05_i012",text:"Glintstone Icecrag",note:"Loot in Academy.",cat:"spell"},{id:"a05_i013",text:"Freezing Mist",note:"Loot in Academy.",cat:"spell"},{id:"a05_i014",text:"Glintblade Phalanx",note:"Loot in Academy graveyard area.",cat:"spell"},{id:"a05_i015",text:"Carian Retaliation",note:"Loot at Chapel of the Departed (uses key from magic).",cat:"spell"},{id:"a05_i016",text:"Academy Glintstone Key",note:"Buy from Thops at Church of Irith (or find on rooftop of Church of the Cuckoo).",cat:"key",miss:true},{id:"a05_i017",text:"Thops' Bell Bearing",note:"Thops dies after Raya Lucaria if you gave him a second Academy Glintstone Key. Corpse where he sat.",cat:"key",miss:true},{id:"a05_i018",text:"Great Rune of the Unborn",note:"Rennala boss reward — used for respecing.",cat:"key"},{id:"a05_i019",text:"Glintstone Craftsman's Cookbook [3]",note:"Chest in Academy of Raya Lucaria — near Debate Parlor grace.",cat:"key"},{id:"a05_i020",text:"Glintstone Craftsman's Cookbook [4]",note:"Corpse in Academy of Raya Lucaria.",cat:"key"},{id:"a05_i021",text:"Flask of Wondrous Physick reminder",note:"If you skipped the Third Church of Marika, GO BACK — this flask is your Physick base. Cannot progress crystal tears without it.",cat:"key"},{id:"a05_i022",text:"Smithing-Stone Miner's Bell Bearing [1]",note:"Crystalian boss, Raya Lucaria Crystal Tunnel (unlocks Smithing Stones 1+2 at Twin Maiden Husks).",cat:"stone"},{id:"a05_i023",text:"Thops's Bell Bearing",note:"Thops dies naturally after Raya Lucaria if you gave him a second Academy Glintstone Key (the extra one from a chandelier in Church of the Cuckoo). Corpse at Schoolhouse Classroom grace. Natural quest death.",cat:"stone",miss:true},{id:"a05_i024",text:"Azur's Glintstone Staff",note:"Chest at Master Azur's location (Mt Gelmir — after taking Comet Azur).",cat:"catalyst"},{id:"a05_i025",text:"Crystal Staff",note:"Crystalian boss, Academy Crystal Cave / Raya Lucaria Crystal Tunnel.",cat:"catalyst"},{id:"a05_i026",text:"Ash of War: Spectral Lance",note:"Crystalian boss (Academy Crystal Cave).",cat:"ash"},{id:"a05_i027",text:"Ash of War: Glintstone Pebble",note:"Loot — Debate Parlor.",cat:"ash"},{id:"a05_i028",text:"Glintstone Cometshard",note:"Loot at Raya Lucaria (or from Sellen).",cat:"spell"},{id:"a05_i029",text:"Glintstone Arc",note:"Academy loot — sorcerer body.",cat:"spell"},{id:"a05_i030",text:"Terra Magica",note:"Loot in Academy.",cat:"spell"},{id:"a05_i031",text:"Great Oracular Bubble",note:"Purchased from Preceptor Miriam OR loot.",cat:"spell"},{id:"a05_i032",text:"Crystal Spear",note:"Crystalian drops.",cat:"weapon"},{id:"a05_i033",text:"Glintstone Kris (Sellen questline reward)",note:"Choose Sellen at Grand Library — reward.",cat:"weapon"}]},
{id:"a06",name:"Liurnia — North (Caria Manor)",subtitle:"Ranni quest start, Black Knife Catacombs",story:"Caria Manor clears the way to Ranni's Rise (fan sites sometimes call it \"Renna's Rise\" — same tower). After giving Ranni the Fingerslayer Blade (from Nokron) she gives you the Carian Inverted Statue. Place it on the altar at the Carian Study Hall (south of Church of Vows) to flip the tower and reveal the Divine Tower of Liurnia — climb it for the Cursemark of Death (needed later for Fia's questline in Deeproot Depths) and the Stargazer Heirloom talisman. Snow Witch Set is in Ranni's Rise itself, accessible once her quest has progressed.",warn:"⚠ Cursemark of Death is easy to skip because the Divine Tower is an optional climb — if you want the Fortissax Remembrance later (Deeproot Depths), get it now. Black Knife Catacombs is in north Liurnia — do it on the way.",items:[{id:"a06_i000",text:"Sword of Night and Flame (Legendary)",note:"Caria Manor locked room — enter via jumping from a rooftop.",cat:"weapon"},{id:"a06_i001",text:"Rotten Crystal Staff",note:"Grand Cloister loot.",cat:"catalyst"},{id:"a06_i002",text:"Carian Filigreed Crest",note:"Iji at Caria Manor entrance — 5000 Runes (requires Blaidd quest progression).",cat:"talisman"},{id:"a06_i003",text:"Stargazer Heirloom (talisman)",note:"Top of Divine Tower of Liurnia (reached via Carian Inverted Statue at Carian Study Hall).",cat:"talisman"},{id:"a06_i004",text:"Albinauric Ashes",note:"Corpse in the graveyard east of Caria Manor.",cat:"spirit"},{id:"a06_i005",text:"Ranni questline — start (Ranni's Rise, Three Sisters)",note:"Talk to Ranni at Ranni's Rise (upstairs). Downstairs: talk to ALL THREE — Iji, Seluvis, Blaidd. This unlocks the Underground Ranni questline. Warning: DO NOT start this before finishing Rogier's quest at Roundtable Hold, or Rogier is permanently lost.",cat:"key",miss:true,warn:true},{id:"a06_i006",text:"Ranni — Seluvis letter to Sellen",note:"Seluvis gives you a letter for Sellen. Deliver to Sellen at Waypoint Ruins → she explains Radahn must fall. Return to Blaidd at Siofra River and tell him.",cat:"key",miss:true},{id:"a06_i007",text:"Cursemark of Death",note:"Top of Divine Tower of Liurnia (use Carian Inverted Statue at Carian Study Hall). Required for Fia's ending (Lichdragon Fortissax) — do it now.",cat:"key",miss:true},{id:"a06_i008",text:"Ash of War: Cragblade",note:"Teardrop Scarab west of Impassable Bridge, Liurnia north.",cat:"ash"},{id:"a06_i009",text:"Ash of War: Giant Hunt",note:"Night's Cavalry, north Liurnia (night only).",cat:"ash"},{id:"a06_i010",text:"Ash of War: Waves of Darkness (from Astel Remembrance, delivered here since Astel is fought from Nokstella)",note:"Reminder note.",cat:"ash"},{id:"a06_i011",text:"Glintstone Craftsman's Cookbook [6]",note:"Chest in the Chapel of the Departed (Liurnia west).",cat:"key"},{id:"a06_i012",text:"Larval Tear [5]",note:"Pidia, Carian Servant — Caria Manor upper balcony (drop from Ranni's Rise, sold for 3000 runes).",cat:"key"},{id:"a06_i013",text:"Larval Tear [6]",note:"Graveyard east of Caria Manor — touch the ghost sitting on a chair (needs Resurrection Painting from Artist's Shack).",cat:"key"},{id:"a06_i014",text:"Golden Seeds — Liurnia North / Three Sisters (3 saplings)",note:"Around Caria Manor, Ranni's Rise, Manor Lower Level.",cat:"key"},{id:"a06_i015",text:"Painting: Resurrection",note:"Artist's Shack east of Carian Study Hall, Liurnia. Solution: touch ghost at Caria Manor graveyard. REWARD: Larval Tear + Juvenile Scholar set.",cat:"key"},{id:"a06_i016",text:"Ash of War: Thops's Barrier",note:"From Thops' Bell Bearing (after his death) at Twin Maiden Husks.",cat:"ash",miss:true},{id:"a06_i017",text:"Finger Maiden Therolina Puppet",note:"Seluvis reward — after finding his secret dungeon (below Seluvis's Rise).",cat:"spirit",miss:true},{id:"a06_i018",text:"Dolores the Sleeping Arrow Puppet",note:"Pidia at Caria Manor (if Nepheli did NOT drink Seluvis's Potion). Buy from him after progression.",cat:"spirit",miss:true},{id:"a06_i019",text:"Jarwight Puppet",note:"Seluvis reward — bring him rare items via secret dungeon.",cat:"spirit",miss:true},{id:"a06_i020",text:"Nepheli Loux Puppet",note:"ONLY if you gave Nepheli Seluvis's Potion (locks out her normal questline). Reward from Seluvis.",cat:"spirit",miss:true},{id:"a06_i021",text:"Dung Eater Puppet",note:"Seluvis reward — alternative if you complete his dungeon before other puppets.",cat:"spirit",miss:true},{id:"a06_i022",text:"Iji's Bell Bearing",note:"Iji dies as part of Ranni's questline (killed off-screen after enough progression). Corpse at Road to the Manor grace — natural death, no hostile action needed.",cat:"stone",miss:true},{id:"a06_i023",text:"Prince of Death's Staff (reminder)",note:"Deeproot Depths chest — reminder.",cat:"catalyst"},{id:"a06_i024",text:"St Trina's Torch (reminder)",note:"Forsaken Ruins, Altus (reminder here — sleep on strike).",cat:"catalyst"},{id:"a06_i025",text:"Ghostflame Torch",note:"Prayer Room in Auriza Side Tomb.",cat:"catalyst"},{id:"a06_i026",text:"Loretta's Greatbow",note:"Royal Knight Loretta boss, Caria Manor.",cat:"spell"},{id:"a06_i027",text:"Rennala's Full Moon (reminder)",note:"Enia — see Raya Lucaria area.",cat:"spell"},{id:"a06_i028",text:"Blaidd's Set",note:"Iji drops after Blaidd dies (end of Ranni questline).",cat:"armor",miss:true},{id:"a06_i029",text:"Ronin's Set",note:"Zamor Ruins (if Yura is dead by then) OR Yura related.",cat:"armor"},{id:"a06_i030",text:"Preceptor's Set",note:"Preceptor Seluvis (Three Sisters).",cat:"armor"},{id:"a06_i031",text:"Iron Fist Set",note:"Alexander drops it — corpse after his death.",cat:"armor",miss:true}]},
{id:"a06b",name:"Siofra River",subtitle:"Underground — enter via well in Mistwood, Limgrave",story:"Accessible early but you'll be back. The Ancestor Spirit boss requires lighting all eight braziers. Siofra Aqueduct leads to Deeproot Depths. This is also where you first encounter the path toward Nokron from below.",warn:"Ancestral Follower Ashes require defeating Ancestor Spirit. Collect the Mushroom Crown before leaving — it's easy to walk past.",items:[{id:"a06b_i000",text:"Ancestral Follower Ashes",note:"Ancestor Spirit boss drop (Siofra Hallowhorn Grounds — the regular fight, NOT Regal).",cat:"spirit"},{id:"a06b_i001",text:"Golden Rune (multiple)",note:"Farmable Ancestral Followers throughout.",cat:"key"},{id:"a06b_i002",text:"Nox Flowing Sword — later",note:"Nokron, not Siofra.",cat:"weapon"},{id:"a06b_i003",text:"Great Ghost Glovewort locations",note:"Various — needed to upgrade Spirit Ashes.",cat:"key"},{id:"a06b_i004",text:"Blaidd — Siofra",note:"After Sellen dialogue, meet Blaidd here. He tells you where Radahn is.",cat:"npc"},{id:"a06b_i005",text:"Armorer's Cookbook [6]",note:"Corpse in Siofra River.",cat:"key"},{id:"a06b_i006",text:"Larval Tear [2]",note:"Abandoned Merchant, Siofra River (via Siofra River Well) — 3000 runes.",cat:"key"},{id:"a06b_i007",text:"Clarifying Horn Charm",note:"Corpse near Below the Well grace.",cat:"talisman"}]},
{id:"a06c",name:"Nokron, Eternal City",subtitle:"Underground — opens after defeating Radahn",story:"<strong>Requires Radahn dead.</strong> Enter via crater in Mistwood. Nokron contains the Fingerslayer Blade for Ranni's quest — do not leave without it. Mimic Tear is behind an imp-sealed fog gate in Night's Sacred Ground. Full loot run before moving to Ainsel.",miss:"⚠ Fingerslayer Blade — Ranni's quest cannot progress without it. Mimic Tear requires Stonesword Key. Gargoyle duo boss at waterfall basin leads to Deeproot Depths.",items:[{id:"a06c_i000",text:"Mimic Tear Ashes (Legendary)",note:"Chest in Night's Sacred Ground behind imp fog wall (2 Stonesword Keys).",cat:"spirit"},{id:"a06c_i001",text:"Winged Greathorn (Greataxe)",note:"Enia — Remembrance of the Regal Ancestor (Nokron) exchange option.",cat:"weapon"},{id:"a06c_i002",text:"Ancestral Spirit's Horn (talisman)",note:"Enia — Remembrance of the Regal Ancestor exchange option (restores FP on kill). Walking mausoleum to duplicate.",cat:"talisman"},{id:"a06c_i003",text:"Nox Flowing Sword",note:"Nox Swordstress & Priest duo boss.",cat:"weapon"},{id:"a06c_i004",text:"Nox Monk Set",note:"Enemy drops in Nokron.",cat:"armor"},{id:"a06c_i005",text:"Nox Swordstress Set",note:"Enemy drops in Nokron.",cat:"armor"},{id:"a06c_i006",text:"Nightmaiden & Swordstress Ashes",note:"Structure requiring 2 Stonesword Keys.",cat:"spirit"},{id:"a06c_i007",text:"Silver Tear Mask (armor)",note:"Silver Tear enemy drop.",cat:"armor"},{id:"a06c_i008",text:"Mottled Necklace",note:"Loot in Nokron (via Night Sky Unceasing portal at Four Belfries or Nokron access).",cat:"talisman"},{id:"a06c_i009",text:"Mottled Necklace +1",note:"Hallowhorn Grounds stone beam.",cat:"talisman"},{id:"a06c_i010",text:"Black Whetblade",note:"Night's Sacred Ground chest — unlocks Blood, Poison, and Occult affinities.",cat:"key"},{id:"a06c_i011",text:"Fingerslayer Blade (key item)",note:"Chest in Night's Sacred Ground. Give to Ranni — receive Carian Inverted Statue.",cat:"key",miss:true},{id:"a06c_i012",text:"Gargoyle's Black Halberd",note:"Valiant Gargoyle boss (waterfall basin) — also opens path to Deeproot Depths.",cat:"weapon"},{id:"a06c_i013",text:"Larval Tear [8]",note:"Building near the first Nokron grace (inside).",cat:"key"},{id:"a06c_i014",text:"Larval Tear [9]",note:"Corpse in gazebo on the path toward Mimic Tear boss, Nokron.",cat:"key"},{id:"a06c_i015",text:"Larval Tear [10]",note:"Mimic Tear boss drop, Nokron (drops 2 tears).",cat:"key"},{id:"a06c_i016",text:"Larval Tear [11]",note:"Second of Mimic Tear boss drops.",cat:"key"},{id:"a06c_i017",text:"Larval Tear [12]",note:"Night's Sacred Ground — Silver Sphere in the church with 2 Nox priestesses (jump rooftops from Siofra River Bank grace).",cat:"key"},{id:"a06c_i018",text:"Glovewort Picker's Bell Bearing [1]",note:"Nokron corpse. Unlocks Grave Glovewort 1+2.",cat:"stone"},{id:"a06c_i019",text:"Ghost-Glovewort Picker's Bell Bearing [1]",note:"Gazebo near entrance of Nokron. Unlocks Ghost Glovewort 1+2.",cat:"stone"},{id:"a06c_i020",text:"Clarifying Horn Charm +1",note:"Corpse in Mimic Tear area.",cat:"talisman"},{id:"a06c_i021",text:"Night Comet",note:"Chest guarded by Onyx Lord, Sellia Hideaway (Caelid — reminder).",cat:"spell"},{id:"a06c_i022",text:"Night Shard",note:"Nox enemies drop, Nokron.",cat:"spell"},{id:"a06c_i023",text:"Night Maiden's Mist",note:"Chest, Nokron.",cat:"spell"},{id:"a06c_i024",text:"Nightblade's Slash",note:"Loot, Nokron.",cat:"spell"},{id:"a06c_i025",text:"Death Lightning (reminder)",note:"Enia — Lichdragon Remembrance alt.",cat:"spell"}]},
{id:"a06d",name:"Ainsel River & Nokstella, Eternal City",subtitle:"Underground — portal in Ranni's Rise, unlocked via Miniature Ranni doll",story:"Ranni sends you here via a sending gate in Ranni's Rise after you give her the Fingerslayer Blade. Nokstella has the Moon of Nokstella (Legendary talisman) and leads to the Astel fight, which unlocks the Moonlight Altar plateau for Ranni's Dark Moon.",miss:"⚠ Moon of Nokstella is a Legendary talisman in a chest — easy to miss on a fast run. Astel boss unlocks Moonlight Altar — required for Ranni's ending.",items:[{id:"a06d_i000",text:"Miniature Ranni (key item)",note:"Given by Ranni at Ranni's Rise after Fingerslayer Blade. Interact with the doll at any grace to talk to her.",cat:"key"},{id:"a06d_i001",text:"Discarded Palace Key",note:"Chest in Nokstella — unlocks a chest in Renna's Rise later.",cat:"key"},{id:"a06d_i002",text:"Nokstella Waterfowl Feather",note:"Loot.",cat:"key"},{id:"a06d_i003",text:"Moon of Nokstella (Legendary talisman)",note:"Chest in the Nokstella Grand Cathedral (elevator area).",cat:"talisman"},{id:"a06d_i004",text:"Clayman Ashes",note:"Corpse at waterfall in Ainsel River Main.",cat:"spirit"},{id:"a06d_i005",text:"Dragonscale Blade",note:"Dragonkin Soldier of Nokstella boss (Ainsel River).",cat:"weapon"},{id:"a06d_i006",text:"Bastard's Stars (flail)",note:"Enia — Remembrance of the Naturalborn (Astel) exchange option.",cat:"weapon"},{id:"a06d_i007",text:"Ash of War: Waves of Darkness",note:"Enia — Remembrance of the Naturalborn (Astel) exchange option. Walking mausoleum to duplicate for both.",cat:"ash"},{id:"a06d_i008",text:"Immunizing Horn Charm",note:"Ainsel River — large ants area corpse.",cat:"talisman"},{id:"a06d_i009",text:"Immunizing Horn Charm +1",note:"Ancestral Follower drop, Lake of Rot.",cat:"talisman"},{id:"a06d_i010",text:"Ranni's Dark Moon (Legendary Sorcery)",note:"Chest at the top of Chelona's Rise, Moonlight Altar (unlocked after Ranni's questline puzzle — kill 3 giant turtles).",cat:"spell"},{id:"a06d_i011",text:"Dark Moon Greatsword (Legendary)",note:"Ranni gives it after her questline finish at Cathedral of Manus Celes.",cat:"weapon",miss:true},{id:"a06d_i012",text:"Ranni's finish (Age of Stars)",note:"Return the Dark Moon Ring to Ranni at Cathedral of Manus Celes (Moonlight Altar).",cat:"key",miss:true},{id:"a06d_i013",text:"Nomadic Warrior's Cookbook [20]",note:"Chest in Lake of Rot — north of Grand Cloister grace.",cat:"key"},{id:"a06d_i014",text:"Perfumer's Cookbook [4]",note:"Hermit Merchant near Ainsel River — 3000 runes.",cat:"key"},{id:"a06d_i015",text:"Larval Tear [13]",note:"Silver Sphere on the bridge in Nokstella, up the stairs from Nokstella Eternal City grace.",cat:"key"},{id:"a06d_i016",text:"Larval Tear [14]",note:"Silver Sphere hanging from ceiling in building after Nokstella bridge — attack it to drop, then kill it.",cat:"key"},{id:"a06d_i017",text:"Larval Tear [15]",note:"Silver Sphere near the end of Nokstella.",cat:"key"},{id:"a06d_i018",text:"Seluvis's Bell Bearing",note:"Seluvis dies naturally at the end of Ranni's questline. Corpse in Seluvis's Rise (Three Sisters). Natural death, no hostile action.",cat:"stone",miss:true},{id:"a06d_i019",text:"Gavel of Haima",note:"Chest atop Testu's Rise, Liurnia.",cat:"spell"},{id:"a06d_i020",text:"Rennala's Full Moon",note:"Reminder — Enia.",cat:"spell"}]},
{id:"a06e",name:"Deeproot Depths",subtitle:"Underground — via Siofra Aqueduct (after Gargoyle duo) or Leyndell sewers",story:"Two access routes: Siofra Aqueduct after the Gargoyle duo, or through the Subterranean Shunning Grounds under Leyndell. Fia's questline resolves here — you need the Cursemark of Death (from Ranni's questline, Divine Tower of Liurnia) to trigger Lichdragon Fortissax. Crucible Knight Siluria is in an Evergaol here.",miss:"⚠ Fortissax Remembrance requires completing Fia's quest — embrace her with the Cursemark of Death. Prince of Death's Staff is a chest near the roots.",items:[{id:"a06e_i000",text:"Elden Stars (Legendary Incantation)",note:"Corpse at end of the ant cave, west of Great Waterfall Crest grace.",cat:"spell"},{id:"a06e_i001",text:"Fortissax's Lightning Spear (incantation)",note:"Enia — Remembrance of the Lichdragon Fortissax (Fia questline required). Walking mausoleum to duplicate.",cat:"spell",miss:true},{id:"a06e_i002",text:"Death Lightning (incantation)",note:"Enia — Remembrance of the Lichdragon Fortissax alt option.",cat:"spell",miss:true},{id:"a06e_i003",text:"Prince of Death's Staff",note:"Chest near the roots, Deeproot Depths.",cat:"catalyst"},{id:"a06e_i004",text:"Prince of Death's Cyst (talisman)",note:"Runebear boss in Deeproot cave.",cat:"talisman"},{id:"a06e_i005",text:"Mausoleum Soldier Ashes",note:"Corpse in front of a dead tree, northernmost Deeproot.",cat:"spirit"},{id:"a06e_i006",text:"Erdtree Greatbow",note:"Loot on a walkway near the roots.",cat:"weapon"},{id:"a06e_i007",text:"Fia questline finish",note:"Bring Cursemark of Death to Fia at her Deathbed Companion location; embrace her → Deathbed Dress → sleep → Lichdragon Fortissax fight.",cat:"key",miss:true},{id:"a06e_i008",text:"Deathbed Dress",note:"After Fia questline embrace.",cat:"armor",miss:true},{id:"a06e_i009",text:"Ash of War: Lifesteal Fist",note:"Deeproot Depths loot — corpse near the giant chair.",cat:"ash"},{id:"a06e_i010",text:"D's Bell Bearing",note:"D dies naturally in Fia's questline (his brother, D the Twin, kills him at Roundtable if you give Fia the Twinned Armor). Corpse at Roundtable.",cat:"stone",miss:true},{id:"a06e_i011",text:"Ancient Death Rancor",note:"Chest in Deeproot Depths.",cat:"spell"},{id:"a06e_i012",text:"Explosive Ghostflame",note:"Chest in Deeproot.",cat:"spell"}]},
{id:"a07",name:"Caelid & Dragonbarrow",subtitle:"Post-Radahn / Parallel with Liurnia",story:"Do Radahn's festival at Redmane Castle. Radahn drops open Nokron. Clear Caelid dungeons. Dragonbarrow is optional but has the Dragon Communion Seal and Isolated Merchant. <strong>MILLICENT QUESTLINE START:</strong> 1) Talk to Gowry at his Shack (south of Sellia), accept his request. 2) Kill Commander O'Neil, Swamp of Aeonia → Unalloyed Gold Needle. 3) Return to Gowry, exhaust dialogue, leave and come back → he repairs it. 4) Find Millicent at Church of the Plague, give her the needle → she gives Prosthesis-Wearer Heirloom talisman, moves to Gowry's Shack. 5) Exhaust dialogue with both her and Gowry there. This chain continues in Altus Plateau (Shaded Castle / Erdtree-Gazing Hill).",miss:"⚠ Gowry moves after Millicent quest progresses — buy all his stock on first visit. Get Meteorite Staff from Street of Sages Ruins swamp. ⚠ CRITICAL: Ruins Greatsword becomes permanently unobtainable once you trigger the Radahn Festival (starting the Radahn fight sequence) — get it from Redmane Castle BEFORE approaching Radahn.",items:[{id:"a07_i000",text:"Radagon's Soreseal (Legendary talisman)",note:"Fort Faroth, Caelid — chest inside the fort.",cat:"talisman"},{id:"a07_i001",text:"Ruins Greatsword (Legendary)",note:"Crucible Knight + Misbegotten Warrior duo boss, Redmane Castle. ⚠ MISSABLE after Radahn Festival triggers.",cat:"weapon",miss:true},{id:"a07_i002",text:"Stars of Ruin (Legendary Sorcery)",note:"Master Lusat, Sellia Hideaway — Sellen questline reward (bring Lusat to her).",cat:"spell"},{id:"a07_i003",text:"Greyoll's Roar (Legendary Incantation)",note:"Cathedral of Dragon Communion — purchase for 3 Dragon Hearts after killing Greyoll.",cat:"spell"},{id:"a07_i004",text:"Starscourge Greatsword",note:"Enia — Remembrance of the Starscourge (Radahn) exchange option.",cat:"weapon"},{id:"a07_i005",text:"Lion Greatbow",note:"Enia — Radahn Remembrance alt option. Walking mausoleum to duplicate.",cat:"weapon"},{id:"a07_i006",text:"Moonveil",note:"Magma Wyrm boss, Gael Tunnel.",cat:"weapon"},{id:"a07_i007",text:"Serpent-God's Curved Sword",note:"Sellia, Town of Sorcery.",cat:"weapon"},{id:"a07_i008",text:"Gargoyle's Blackblade",note:"Black Blade Kindred at Bestial Sanctum, Dragonbarrow.",cat:"weapon"},{id:"a07_i009",text:"Redmane Knight Ogha Ashes (Legendary)",note:"Putrid Tree Spirit boss, War-Dead Catacombs.",cat:"spirit"},{id:"a07_i010",text:"Radahn Soldier Ashes",note:"War-Dead Catacombs, Scarlet Rot room guarded by a Cleanrot Knight spirit.",cat:"spirit"},{id:"a07_i011",text:"Miranda Sprout Ashes",note:"Hidden behind illusory wall in Caelid Catacombs (post-first grace).",cat:"spirit"},{id:"a07_i012",text:"Rotten Stray Ashes",note:"South of Sellia Under-Stair grace — rotten dog corpse.",cat:"spirit"},{id:"a07_i013",text:"Putrid Corpse Ashes",note:"Frenzied Duelist boss, Gaol Cave.",cat:"spirit"},{id:"a07_i014",text:"Kindred of Rot Ashes",note:"Cemetery Shade, Caelid Catacombs (Minor Erdtree).",cat:"spirit"},{id:"a07_i015",text:"Mad Pumpkin Head Ashes",note:"Erdtree Burial Watchdog duo, end of Minor Erdtree Catacombs.",cat:"spirit"},{id:"a07_i016",text:"Battlemage Hugues Ashes",note:"Sellia Evergaol.",cat:"spirit"},{id:"a07_i017",text:"Crystalian Ashes",note:"Chest guarded by 3 Glintstone Sorcerers, Sellia Hideaway.",cat:"spirit"},{id:"a07_i018",text:"Arrow's Sting Talisman",note:"Impassable Greatbridge tower chest.",cat:"talisman"},{id:"a07_i019",text:"Bull-Goat's Talisman",note:"Dragonbarrow Cave corpse.",cat:"talisman"},{id:"a07_i020",text:"Dragoncrest Shield Talisman",note:"Behind Bestial Sanctum, Caelid.",cat:"talisman"},{id:"a07_i021",text:"Faithful's Canvas Talisman",note:"Sellia Crystal Tunnel corpse.",cat:"talisman"},{id:"a07_i022",text:"Gold Scarab",note:"Cleanrot Knights duo boss, Abandoned Cave.",cat:"talisman"},{id:"a07_i023",text:"Sacred Scorpion Charm",note:"Anastasia, Tarnished-Eater invader at Smoldering Church.",cat:"talisman"},{i
